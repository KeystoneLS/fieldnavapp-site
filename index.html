a heat pump system (UA-29)"},{rank:4,text:"Mixed generation equipment — old indoor units on new outdoor or vice versa"},{rank:5,text:"Daikin Altherma hydrobox detected on a VRV system that doesn't support it"}],checks:["Check the subcode — identifies the specific combination issue","Verify all indoor unit model numbers are compatible with the outdoor unit","Check total connected indoor capacity vs outdoor capacity (typically 50-130%)","Verify HP vs HR system type matches all connected components","Check Daikin compatibility charts for the specific system"],branches:[{condition:"UA-17 — too many indoors",target:"Remove excess indoor units or upgrade outdoor"},{condition:"UA-18 — wrong model",target:"Verify indoor models are VRV-compatible for this outdoor series"},{condition:"UA-29 — BS box on HP system",target:"BS box is HR-only — remove or switch to HR outdoor unit"}]}},{code:"UC",category:"System",desc:"Centralized controller address duplication (system continues)",action:"Check AIRNET addresses (mode 2-13). Each system must have unique address.",details:{meaning:"Two or more systems on the AIRNET/DIII-NET centralized control network have the same address. Each VRV system needs a unique address for the centralized controller (BMS, iTM, or DCS) to communicate with them individually. System continues running but centralized control may malfunction.",causes:[{rank:1,text:"Two outdoor units set to same AIRNET address"},{rank:2,text:"Address not changed from factory default during commissioning"}],checks:["Check AIRNET address on each system using Monitor Mode 2-13","Assign unique addresses to each system","Power cycle after changing addresses"],branches:[{condition:"Duplicate addresses found",target:"Change one system to a unique address and power cycle"}]}},{code:"UE",category:"System",desc:"Transmission error — centralized controller to IDU",action:"Check DIII-NET wiring to centralized controller.",details:{meaning:"Communication has failed between the centralized controller (BMS gateway, iTM, or DCS) and the indoor units on the DIII-NET bus. The centralized controller can't see or control the indoor units.",causes:[{rank:1,text:"DIII-NET wiring to centralized controller disconnected or damaged"},{rank:2,text:"Centralized controller has failed or lost power"},{rank:3,text:"DIII-NET adapter PCB on outdoor unit has failed"},{rank:4,text:"Address or protocol settings wrong on centralized controller"}],checks:["Check DIII-NET wiring from centralized controller to the VRV system","Verify centralized controller has power and is operational","Check DIII-NET adapter settings and connections","Verify communication protocol settings match (BACnet, Modbus, etc.)"],branches:[{condition:"Wiring issue",target:"Repair DIII-NET communication wiring"},{condition:"Controller failed",target:"Replace or repair centralized controller"}]}},{code:"UF",category:"System",desc:"Wrong wiring / system not set / stop valves closed",action:"Verify F1/F2 not swapped. Check all stop valves fully open. Run Check Operation.",subcodes:[{code:"UF-01",desc:"Wrong wiring check error"},{code:"UF-05",desc:"Defective stop valve for test operation"}],details:{meaning:"The Check Operation detected that something is fundamentally wrong with the installation: F1/F2 communication wires may be swapped, stop valves may be closed, or the system isn't configured. This is a commissioning error that must be resolved before the system can operate normally.",causes:[{rank:1,text:"F1 and F2 communication wires are swapped (reversed)"},{rank:2,text:"Liquid or gas stop valves are not fully opened"},{rank:3,text:"System was never commissioned — Check Operation not run"},{rank:4,text:"Stop valve defective — UF-05 indicates valve not passing flow during test"}],checks:["Verify F1/F2 wiring polarity — F1 to F1, F2 to F2 at every unit","Check ALL stop valves — both liquid and gas on every indoor and outdoor unit — fully back-seated (open)","Run Check Operation after correcting issues (ho rly"},{rank:4,text:"Ambient temperature too low for proper Auto Charge"}],checks:["Close gauges and let the indoor coil thaw completely","Check all indoor air filters — clean if dirty","Verify all indoor units have unobstructed airflow","Check indoor fan operation","Restart Auto Charge after resolving airflow issues"],branches:[{condition:"Filters dirty",target:"Clean filters, thaw coils, restart Auto Charge"},{condition:"Airflow blocked",target:"Remove obstructions, restart procedure"}]}},{code:"P9",category:"Charge",desc:"Auto Charge complete (normal)",action:"Press MODE button to end Auto Charge. Close gauges and disconnect tank.",details:{meaning:"Auto Charge has completed successfully — the system has metered in the correct amount of refrigerant. This is not an error — it's a completion notification. Press MODE to acknowledge, close your gauges, and disconnect the tank.",causes:[{rank:1,text:"Normal completion — system is fully charged"}],checks:["Press the MODE button on the outdoor unit to end Auto Charge mode","Close manifold gauge valves","Disconnect refrigerant hoses and tank","System is ready for normal operation — run Check Operation if not already done"],branches:[{condition:"P9 displayed",target:"Press MODE, close gauges, disconnect tank — charging is done"}]}},{code:"PA",category:"Charge",desc:"Auto Charge — refrigerant tank empty",action:"Close gauges, replace tank, purge hose, reopen gauges. Must complete within 5 min or P2 occurs.",details:{meaning:"The refrigerant tank ran empty during Auto Charge. The system needs more refrigerant to complete the charge. You must swap the tank within 5 minutes or the procedure will abort (P2). Close your gauges before disconnecting the empty tank.",causes:[{rank:1,text:"Tank didn't have enough refrigerant for the full system charge"}],checks:["Close manifold gauge valves immediately","Disconnect empty tank and connect a full tank","Purge the charging hose to remove air","Reopen manifold gauges","Must complete thi {code:"403",category:"City Multi",desc:"Comms fault between control board and inverter board",action:"Check wiring between control PCB and inverter PCB. Detail code 1=inverter, 5=fan board.",details:{meaning:"Internal communication between the main control board and the inverter board (detail 1) or fan board (detail 5) inside the outdoor unit has failed. These boards are connected by ribbon cables or internal harnesses. This is an internal fault — not related to M-NET wiring between units.",causes:[{rank:1,text:"Loose ribbon cable or connector between control board and inverter/fan board"},{rank:2,text:"Inverter board failure — communication IC damaged"},{rank:3,text:"Fan board failure (detail code 5)"},{rank:4,text:"Main control board failure"},{rank:5,text:"Water or condensation damage on board connectors"}],checks:["Read the detail code: 1 = inverter board, 5 = fan board","Power off and reseat all ribbon cables and internal connectors between boards","Inspect boards for visible damage — burnt components, corrosion, swollen capacitors","Check for water ingress inside the outdoor unit control box","If detail 1 — check connector between main PCB and inverter PCB","If detail 5 — check connector between main PCB and fan control PCB"],branches:[{condition:"Detail 1 and reseating cables doesn't fix it",target:"Replace inverter board or main control board"},{condition:"Detail 5 and reseating cables doesn't fix it",target:"Replace fan board or main control board"},{condition:"Visible water damage on connectors",target:"Clean and dry connectors, seal control box, replace damaged board"}]}},{code:"900",category:"City Multi",desc:"Lossnay unit in test run mode (informational)",action:"Not a fault. Unit is in test run mode.",details:{meaning:"This is not a fault. A Lossnay (energy recovery ventilator) connected to the system is currently in test run mode. The unit is operating normally — someone initiated a test run from the controller or during commissioning. It will clear a g — low subcooling with low suction pressure = low charge","Listen for compressor cycling on and off rapidly — sign of repeated protection trips"],branches:[{condition:"TH4 reading matches actual temp and discharge is genuinely high",target:"Charge or airflow problem — check suction superheat, subcooling, condenser airflow"},{condition:"TH4 reads high but actual temp is normal",target:"TH4 sensor fault — check resistance at thermistor table, replace if out of spec"},{condition:"Suction pressure is very low with high superheat",target:"Low charge — leak check, repair, vacuum, recharge"},{condition:"Head pressure is high with normal suction",target:"Condenser problem — clean coil, check fans, check for recirculation"}]}},{code:"1301",category:"City Multi",desc:"Low pressure fault — LP sensor below 1 bar before startup",action:"Check refrigerant charge. Check for leaks. Verify LP sensor reading.",details:{meaning:"The low-pressure sensor detected system pressure below 1 bar (14.5 psi) before the compressor even starts. The board will not attempt to start the compressor at this pressure. This almost always indicates a significant refrigerant loss or a sensor issue — the system should have standing pressure well above 1 bar at any ambient temperature.",causes:[{rank:1,text:"Refrigerant leak — major loss, system is nearly empty"},{rank:2,text:"Stop valve closed on suction or liquid line — isolating outdoor unit"},{rank:3,text:"LP pressure sensor fault — reading low falsely"},{rank:4,text:"Previous service left system in vacuum — charge was never restored"},{rank:5,text:"Massive restriction in liquid line (TXV, filter drier, kink) — only during operation"}],checks:["Connect gauges — what is the actual standing pressure? It should equalize to saturation temperature matching ambient","If gauges read 0 psi — system is empty. Find the leak before recharging","If gauges show normal standing pressure but MST reads low — LP sensor is faulty","Check all stop valves are fully open ","Review error history — repeating HP trips suggest charge or airflow issue, not sensor"],branches:[{condition:"63HS reads high and gauges confirm high pressure",target:"Airflow or charge problem — clean condenser, check fans, verify charge by weight"},{condition:"63HS reads high but gauges show normal pressure",target:"Pressure transducer fault — check 63HS wiring and replace sensor if reading drifts"},{condition:"All condenser fans are not running",target:"Check fan motor windings, fan board output, and THHS heat sink temp"},{condition:"System was recently serviced or charged",target:"Likely non-condensables or overcharge — recover, vacuum, weigh in correct charge"}]}},{code:"1520",category:"City Multi",desc:"Low discharge superheat (U7 on P-Series A)",action:"Check TH4 reading. Check LEV operation.",details:{meaning:"Discharge superheat is too low — the compressor is not superheating the refrigerant enough before it leaves. This means liquid refrigerant may be reaching the compressor (liquid slugging risk). The system reduces compressor speed or shuts down to protect it. Low superheat at discharge usually means too much refrigerant is returning to the compressor.",causes:[{rank:1,text:"LEV (electronic expansion valve) stuck open or over-feeding — flooding the evaporator"},{rank:2,text:"Refrigerant overcharge — too much liquid in the system"},{rank:3,text:"TH4 discharge thermistor reading low falsely"},{rank:4,text:"Low load condition — indoor units not calling for capacity but compressor still running"},{rank:5,text:"Liquid line solenoid valve not closing properly"}],checks:["Check TH4 reading vs actual discharge temp — verify sensor accuracy","Check LEV operation — is the valve stepping correctly or stuck fully open?","Check suction line temperature — if cold/sweating at the compressor, liquid is returning","Verify refrigerant charge — overcharge can cause low superheat","Check how many indoor units are running vs total capacity"],branches:[{condition:"LEV is stuck open or not responding to commands",target:"Check LEV coil, wiring, and driver circuit on outdoor PCB"},{condition:"TH4 reads lower than actual temperature",target:"Replace TH4 thermistor — check resistance against table"},{condition:"System was recently charged",target:"Possible overcharge — recover excess and weigh in correct amount"}]}},{code:"2000",category:"City Multi",desc:"Pump interlock error",action:"Pump interlock open while system operating. Check pump and interlock wiring.",details:{meaning:"The pump interlock contact is open while the system is trying to operate. On water-source or hydronic City Multi systems, a pump must be running to provide water flow through the heat exchanger. The interlock proves the pump is running — if it's open, the system won't operate to prevent heat exchanger damage.",causes:[{rank:1,text:"Water pump not running — check pump power and starter"},{rank:2,text:"Pump interlock wiring disconnected or broken"},{rank:3,text:"Flow switch tripped — no water flow even though pump is running"},{rank:4,text:"Interlock relay or auxiliary contact failure"}],checks:["Verify the water pump is actually running — check visually and listen","Check pump interlock wiring between pump starter and outdoor unit","Verify the interlock contact closes when the pump runs","Check water flow — pump may be running but flow is blocked (closed valve, air lock)"],branches:[{condition:"Pump is not running",target:"Check pump power, starter, overload, and control wiring"},{condition:"Pump runs but interlock stays open",target:"Check auxiliary contact on pump starter or flow switch"}]}},{code:"2134",category:"City Multi",desc:"Abnormal water temperature — TH6 exceeded 85°C",action:"Check water flow rate and TH6 sensor.",details:{meaning:"The water temperature sensor (TH6) has detected water temperature above 85°C in the heat exchanger. This is dangerously high and the system shuts down to protect the heat exchanger from damage. Either the water is genuinely too hot or the sensor is faulty.",causes:[{rank:1,text:"Insufficient water flow — heat exchanger overheating due to low flow rate"},{rank:2,text:"Water pump failure — no circulation through heat exchanger"},{rank:3,text:"TH6 thermistor fault — reading higher than actual temperature"},{rank:4,text:"Boiler supply water too hot — supply temp exceeds design parameters"},{rank:5,text:"Valve closed or restricted on water circuit"}],checks:["Check water flow rate — is it at or above minimum required GPM?","Verify water pump is running and circulating","Compare TH6 reading to actual water temperature with a probe thermometer","Check supply water temperature from the boiler or source","Inspect water circuit valves — all should be open"],branches:[{condition:"TH6 reads high but actual water temp is normal",target:"TH6 sensor fault — check resistance and replace"},{condition:"Water is genuinely too hot",target:"Reduce boiler supply temperature or increase water flow rate"},{condition:"No water flow",target:"Check pump, valves, and strainer for blockage"}]}},{code:"2135",category:"City Multi",desc:"Water source heat exchanger frozen — TH6/TH8 reading 2°C",action:"Check water flow. Check TH6 and TH8 sensors.",details:{meaning:"The water-side heat exchanger temperature has dropped to 2°C, indicating it's at risk of freezing. The system shuts down to prevent the heat exchanger from cracking due to ice formation. This typically happens on water-source heat pump systems when water flow stops or drops too low during heating mode.",causes:[{rank:1,text:"Water flow stopped — pump failure, closed valve, or air lock"},{rank:2,text:"Water source temperature too low — ground loop or tower water near freezing"},{rank:3,text:"TH6 or TH8 thermistor fault — reading lower than actual"},{rank:4,text:"Glycol concentration too low for conditions — inadequate freeze protection"}],checks:["Check water flow immediately — is the pump running?","Check TH6 and TH8 readings against actual water temperature","Verify water source temperature — is it within operating range?","If glycol system, check glycol concentration with a refractometer","Check for ice formation on heat exchanger — if frozen, do NOT force restart"],branches:[{condition:"No water flow",target:"Restore flow before restarting — check pump, valves, strainer"},{condition:"Water source temp is near freezing",target:"Increase source water temp or add/increase glycol concentration"},{condition:"Sensors reading incorrectly",target:"Replace TH6/TH8 — check resistance against thermistor table"}]}},{code:"4100",category:"City Multi",desc:"Compressor overcurrent protection (Mr Slim M-NET)",action:"Check inverter or compressor. Does not apply to R-22/R-407C/R-410A City Multi.",details:{meaning:"Compressor overcurrent detected on a Mr Slim unit connected via M-NET. The compressor is drawing more current than the protection threshold allows. Note: this code applies only to Mr Slim units on M-NET — not standard City Multi R-410A systems.",causes:[{rank:1,text:"Compressor mechanical failure — seized bearings, internal short"},{rank:2,text:"Inverter board fault — driving compressor incorrectly"},{rank:3,text:"High head pressure forcing compressor to work harder"},{rank:4,text:"Loose compressor power wiring causing current spikes"}],checks:["Measure compressor winding resistance — should be balanced","Megger test compressor to ground — should be >1MΩ","Check head pressure — clean condenser if high","Inspect inverter board for damage"],branches:[{condition:"Compressor windings unbalanced or shorted",target:"Replace compressor"},{condition:"Compressor tests good",target:"Check inverter board and power wiring"}]}},{code:"4101",category:"City Multi",desc:"Compressor overcurrent protection (Mr Slim M-NET)",action:"Check inverter or compressor. Does not apply to R-22/R-407C/R-410A City Multi.",details:{meaning:"Same as 4100 — compressor overcurrent on Mr Slim M-NET unit. The second code variant indicates a different detection circuit triggered. Diagnostic approach is identical to 4100.",causes:[{rank:1,text:"Compressor mechanical failure — seized bearings, internal short"},{rank:2,text:"Inverter board fault"},{rank:3,text:"High head pressure"},{rank:4,text:"Loose compressor power wiring"}],checks:["Measure compressor winding resistance — should be balanced","Megger test compressor to ground — should be >1MΩ","Check head pressure and condenser airflow","Inspect inverter board for damage"],branches:[{condition:"Compressor tests bad",target:"Replace compressor"},{condition:"Compressor tests good",target:"Replace inverter board"}]}},{code:"4102",category:"City Multi",desc:"Open phase fault",action:"Check all 3 phases at disconnect. Verify phase rotation.",details:{meaning:"The outdoor unit has detected that one of the three power supply phases is missing. The board will not start the compressor without all three phases present. This is a power supply fault — either the supply is incomplete or the board's detection circuit has a problem.",causes:[{rank:1,text:"Blown fuse on one phase — check all 3 fuses at the disconnect"},{rank:2,text:"Loose wire at the disconnect, breaker, or outdoor unit terminal block"},{rank:3,text:"Tripped breaker on one pole — single pole of a 3-pole breaker not engaging"},{rank:4,text:"Contactor failure — one pole not pulling in or burnt contact"},{rank:5,text:"Phase detection circuit on outdoor PCB is faulty"}],checks:["Measure voltage on all 3 phases at the outdoor unit terminal block — L1-L2, L2-L3, L1-L3","All three readings should be within ±10% of rated voltage and balanced within 2%","If one phase reads 0V — trace back to the disconnect, breaker, and utility","Check all fuses at the disconnect with a meter (not just visually)","Inspect contactor contacts — look for pitting, burning, or a stuck pole","Toggle the disconnect off and on — sometimes a loose connection reseats"],branches:[{condition:"One phase reads 0V at outdoor terminal block",target:"Trace the dead phase back — check fuse, breaker, contactor, wiring"},{condition:"All 3 phases read correct voltage",target:"Phase detection circuit on PCB may be faulty — check board"},{condition:"Voltage present but unbalanced >5%",target:"Utility issue — contact electrician or power company"}]}},{code:"4103",category:"City Multi",desc:"Phase failure / reverse phase (F1 on P-Series A)",action:"Check power supply phases. Swap phases if reversed.",details:{meaning:"The phase sequence detector has found that the 3-phase power supply is in the wrong rotation order (reverse phase) or one phase has failed. Compressors in VRF systems require correct phase rotation to spin in the right direction. Running in reverse would cause severe damage.",causes:[{rank:1,text:"Power supply phases wired in wrong order — swap any two phases to correct"},{rank:2,text:"Phase lost after the disconnect — one leg dropped"},{rank:3,text:"Phase detection circuit on outdoor PCB faulty"}],checks:["Verify all 3 phases present at outdoor unit terminals","Use a phase rotation meter to confirm correct sequence","Swap any two phases at the disconnect to reverse rotation","If phases are correct but fault persists — PCB detection circuit may be faulty"],branches:[{condition:"Phase rotation is reversed",target:"Swap any two phases at the disconnect"},{condition:"Phase rotation is correct and all phases present",target:"Outdoor PCB phase detection circuit fault — replace board"}]}},{code:"4106",category:"City Multi",desc:"Transmission power supply fault",action:"Check wiring, high current, incorrect voltage on transmission line and/or M-NET board. R-410A City Multi only.",details:{meaning:"The M-NET transmission line power supply circuit has a fault. The outdoor unit supplies ~12VDC to the M-NET bus for communication. If too much current is drawn (short circuit) or the voltage is wrong, this fault triggers. R-410A City Multi systems only.",causes:[{rank:1,text:"M-NET wiring shorted — M1 and M2 touching or shorted to ground"},{rank:2,text:"Too many devices on the M-NET bus drawing excessive current"},{rank:3,text:"Incorrect voltage on the transmission line — wrong wiring to TB7"},{rank:4,text:"M-NET board or communication circuit failure on outdoor PCB"}],checks:["Disconnect all M-NET wiring from TB7 and clear the fault — if it clears, problem is in the field wiring","Check M-NET wiring for shorts, damage, or incorrect connections","Measure voltage at TB7 with wiring disconnected — should be ~12VDC","Reconnect wiring one branch at a time to isolate the faulty run"],branches:[{condition:"Fault clears with M-NET disconnected",target:"Short circuit in field wiring — trace and repair"},{condition:"Fault persists with M-NET disconnected",target:"Outdoor PCB M-NET circuit failure — replace board"}]}},{code:"4108",category:"City Multi",desc:"Input circuit fault (FA on P-Series A)",action:"Check outdoor input circuit and PCB.",details:{meaning:"The outdoor unit's input power circuit has detected an abnormality. This is an internal board-level fault related to how the PCB monitors incoming power. Corresponds to FA on P-Series A units.",causes:[{rank:1,text:"Outdoor PCB input monitoring circuit failure"},{rank:2,text:"Incoming power quality issue — voltage spikes or sags"},{rank:3,text:"Loose power connections at the outdoor unit terminal block"}],checks:["Measure incoming voltage — all phases within ±10% of rated","Inspect power terminal connections for tightness","Check for voltage spikes with a power quality meter if available","If power is clean and connections tight — PCB fault"],branches:[{condition:"Power quality is poor",target:"Address utility power issue — may need power conditioner or electrician"},{condition:"Power is clean and connections good",target:"Replace outdoor PCB"}]}},{code:"4115",category:"City Multi",desc:"Power supply abnormal",action:"Check mains voltage and power supply components.",details:{meaning:"The outdoor unit has detected an abnormal power supply condition. The incoming mains voltage is outside acceptable range or the internal power supply circuit on the PCB has failed.",causes:[{rank:1,text:"Incoming voltage too high or too low — outside ±10% of rated"},{rank:2,text:"Voltage fluctuation — brownout or unstable utility supply"},{rank:3,text:"Internal power supply components on PCB failed (capacitors, rectifier)"},{rank:4,text:"Loose power connections causing intermittent supply"}],checks:["Measure all 3 phases at the outdoor unit — verify within rated range","Check for voltage imbalance between phases","Monitor voltage over time if fault is intermittent — may be utility issue","Inspect internal power supply components on PCB for visible damage"],branches:[{condition:"Voltage is out of range",target:"Contact electrician or utility — may need voltage regulator"},{condition:"Voltage is normal",target:"Internal power supply circuit failure — replace outdoor PCB"}]}},{code:"4118",category:"City Multi",desc:"Phase detection circuit fault (F7 on P-Series A)",action:"Faulty outdoor board. Replace outdoor PCB.",details:{meaning:"The phase detection circuit on the outdoor PCB has failed internally. This is a board-level fault — the circuit that monitors phase sequence and presence is damaged. The system cannot verify correct power supply.",causes:[{rank:1,text:"Outdoor PCB phase detection IC damaged — often from power surge"},{rank:2,text:"Previous lightning strike or power surge event"}],checks:["Verify all 3 phases are present and correct rotation at the unit","If power is good but fault persists — board is confirmed faulty","Check if there was a recent power surge or lightning event"],branches:[{condition:"Power supply checks out normal",target:"Replace outdoor PCB — phase detection circuit is damaged"}]}},{code:"4119",category:"City Multi",desc:"Two or more protection devices open simultaneously (F9)",action:"Check protection devices for disconnection or contact failure.",details:{meaning:"Multiple protection devices (thermal switches, pressure switches, overcurrent relays) have opened at the same time. The board sees more than one protection circuit open simultaneously, which is unusual and suggests either a wiring issue or multiple real faults.",causes:[{rank:1,text:"Multiple protection device wiring disconnected during service"},{rank:2,text:"Common wiring fault affecting multiple protection circuits"},{rank:3,text:"Genuine multiple faults — e.g., high pressure AND overcurrent at the same time"},{rank:4,text:"Protection device connector loose or corroded"}],checks:["Check all protection devices: 63HS (high pressure), 49C (thermal), 51CM (overcurrent)","Verify each device is properly wired and connected","Check if any devices were disconnected during previous service","If multiple devices genuinely tripped — investigate the root cause of both"],branches:[{condition:"Wiring was disturbed during service",target:"Reconnect all protection devices and verify continuity"},{condition:"Multiple devices genuinely tripped",target:"Investigate root cause — likely a major system issue causing cascading faults"}]}},{code:"4124",category:"City Multi",desc:"Thermal switch (49C) open circuit (Mr Slim M-NET / F4 P-Series A)",action:"Reset and check pressures and airflow.",details:{meaning:"The compressor thermal protection switch (49C) has opened. This switch is mounted on or near the compressor and opens when the compressor shell temperature gets too high. It's a hard-wired safety — the board sees it as an open circuit. Common on Mr Slim M-NET units.",causes:[{rank:1,text:"Compressor genuinely overheated — high head pressure, low airflow, or low charge"},{rank:2,text:"49C switch wire disconnected or broken"},{rank:3,text:"49C switch failed open permanently"},{rank:4,text:"Dirty condenser or blocked airflow causing compressor overheat"}],checks:["Let the compressor cool down — the 49C may auto-reset after cooling","Check condenser coil for dirt and airflow restrictions","Check refrigerant pressures — high head or low suction indicates the root cause","Verify 49C switch continuity when cool — should be closed (0Ω)","Check 49C wiring for damage or disconnection"],branches:[{condition:"49C resets after cooling and system runs",target:"Root cause is overheat — check airflow, charge, and condenser"},{condition:"49C stays open even when compressor is cool",target:"Replace 49C switch"},{condition:"49C wiring is disconnected",target:"Reconnect wiring — verify switch closes when cool"}]}},{code:"4220",category:"City Multi",desc:"Bus voltage error",action:"Detail 108=low bus <200VDC, 109=high bus >380VDC, 1=PAM damage, 121=replace inverter board. Check mains power.",details:{meaning:"The inverter board's DC bus voltage is outside acceptable range. The DC bus is the rectified mains power that feeds the inverter — it should be roughly 1.4x the AC input voltage (e.g., ~560VDC on 400V 3-phase). The detail code tells you exactly what went wrong.",causes:[{rank:1,text:"Low incoming voltage — brownout, undersized wiring, or loose connection (detail 108)"},{rank:2,text:"High incoming voltage — utility overvoltage or incorrect supply tap (detail 109)"},{rank:3,text:"PAM (Power Active Module) board failure — DC bus regulation circuit damaged (detail 1)"},{rank:4,text:"Inverter board failure — internal bus voltage sensing or regulation fault (detail 121)"},{rank:5,text:"Loose power terminal — intermittent connection causes voltage fluctuation"}],checks:["Read the detail code first — it tells you exactly where to look","Measure incoming 3-phase voltage at the disconnect — all phases should be within ±10% of rated","Check for voltage imbalance between phases — >2% imbalance can cause bus issues","Inspect all power wiring terminals for tightness — especially at the disconnect and main PCB","Check if fault is intermittent (power quality) or constant (board failure)","If detail 1 or 121 — visual inspect PAM and inverter boards for burnt components"],branches:[{condition:"Detail 108 — low bus voltage",target:"Check incoming voltage, wire sizing, breaker connections. May need electrician for utility issue"},{condition:"Detail 109 — high bus voltage",target:"Verify supply voltage. Check transformer tap setting. May need utility correction"},{condition:"Detail 1 — PAM damage",target:"Replace PAM board. Check incoming power quality before powering new board"},{condition:"Detail 121 — inverter board",target:"Replace inverter PCB. Verify power supply is clean before commissioning replacement"}]}},{code:"4230",category:"City Multi",desc:"Heat sink temp exceeded 85°C (U5 on P-Series A)",action:"Check airflow, inverter fan, THHS thermistor.",details:{meaning:"The inverter heat sink temperature sensor (THHS) has detected the heat sink exceeding 85°C. The heat sink dissipates heat from the inverter power module (IPM). If it gets too hot, the IPM can be permanently damaged. The system reduces compressor speed or shuts down.",causes:[{rank:1,text:"Inverter cooling fan not running — fan motor failed or blocked"},{rank:2,text:"Airflow restriction around the inverter heat sink — dirty or blocked"},{rank:3,text:"High ambient temperature combined with high compressor load"},{rank:4,text:"THHS thermistor fault — reading higher than actual temp"},{rank:5,text:"Heat sink thermal compound degraded — poor heat transfer from IPM to sink"}],checks:["Check the inverter cooling fan — is it running? Spin freely?","Clean dust and debris from the heat sink fins","Compare THHS reading to actual heat sink temp with a contact thermometer","Check ambient temp — high ambient in an enclosed space can cause this","Inspect thermal compound between IPM and heat sink"],branches:[{condition:"Inverter fan not running",target:"Check fan motor, wiring, and fan board output"},{condition:"THHS reads high but actual temp is normal",target:"Replace THHS thermistor"},{condition:"Heat sink is genuinely hot with fan running",target:"Clean heat sink, improve ventilation, check thermal compound"}]}},{code:"4250",category:"City Multi",desc:"Overcurrent — inverter IPM problem or compressor lock",action:"Detail 101=IPM fault, 102=ACCT 34.5A peak/16A rms detected. Check compressor or inverter board.",details:{meaning:"The inverter board detected an overcurrent condition. Detail code 101 means the IPM (Intelligent Power Module) on the inverter board triggered its internal protection. Detail code 102 means the ACCT (AC Current Transformer) detected current exceeding 34.5A peak or 16A RMS. This fault can be an expensive misdiagnosis — it could be the inverter board OR the compressor.",causes:[{rank:1,text:"Compressor mechanical failure — seized, locked rotor, or internal short drawing excessive current"},{rank:2,text:"Inverter board IPM failure — the power module itself is damaged (detail 101)"},{rank:3,text:"Wiring issue between inverter board and compressor — loose connection causing arc/spike"},{rank:4,text:"Liquid slugging — liquid refrigerant reaching compressor causes current spike on startup"},{rank:5,text:"Incorrect refrigerant charge — severe overcharge can hydraulic lock the compressor"}],checks:["Check detail code: 101 = IPM internal fault, 102 = measured overcurrent via ACCT sensor","Measure compressor winding resistance (U-V, V-W, U-W) — should be balanced within 0.5Ω","Measure compressor insulation to ground (megger test) — should be >1MΩ","Check for compressor lock — try to start manually and listen for hum without rotation","Inspect inverter board for burnt components, discolored IPM module, or swollen capacitors","Check wiring between inverter board and compressor terminals — tighten all connections"],branches:[{condition:"Detail 101 and compressor windings test good",target:"Inverter board IPM failure — replace inverter PCB"},{condition:"Detail 102 and compressor windings are unbalanced or shorted to ground",target:"Compressor failure — replace compressor"},{condition:"Detail 102 but compressor tests fine",target:"Check for liquid slugging, overcharge, or wiring — ACCT sensor may also be faulty"},{condition:"Fault occurs only on startup in cold weather",target:"Likely liquid migration — check crankcase heater operation"}]}},{code:"5102",category:"City Multi",desc:"Thermistor TH22 failure",action:"Check TH22 connection and resistance.",details:{meaning:"Thermistor TH22 (outdoor ambient or secondary outdoor sensor) has an open circuit, short circuit, or is reading out of range. The board cannot get a valid temperature reading from this sensor.",causes:[{rank:1,text:"TH22 connector loose or disconnected from the outdoor PCB"},{rank:2,text:"TH22 thermistor wire damaged — open or shorted"},{rank:3,text:"TH22 thermistor failed — resistance out of spec"}],checks:["Check TH22 connector on the outdoor PCB — reseat it","Measure TH22 resistance — compare to thermistor table (typically 10kΩ @ 25°C)","Check wiring for damage between sensor and PCB"],branches:[{condition:"Resistance is open (∞) or zero",target:"Replace TH22 thermistor"},{condition:"Resistance is in spec but fault persists",target:"Check PCB connector or replace outdoor PCB"}]}},{code:"5103",category:"City Multi",desc:"Thermistor TH13 or TH23 failure",action:"Check TH13/TH23 connection and resistance.",details:{meaning:"Thermistor TH13 (suction gas superheat) or TH23 has failed — open, shorted, or out of range. These sensors monitor suction line temperature for superheat calculation.",causes:[{rank:1,text:"Connector loose or disconnected"},{rank:2,text:"Thermistor wire damaged"},{rank:3,text:"Thermistor failed — resistance out of spec"}],checks:["Check TH13/TH23 connector on the PCB — reseat","Measure resistance — compare to thermistor table","Check wiring for physical damage"],branches:[{condition:"Resistance out of spec",target:"Replace the thermistor"},{condition:"Resistance OK",target:"Check connector pins and PCB input circuit"}]}},{code:"5104",category:"City Multi",desc:"Thermistor TH11 failure",action:"Check TH11 connection and resistance. If indoor fault, check SW7-3 is OFF.",details:{meaning:"Thermistor TH11 (high pressure gas pipe temperature) has failed. On some indoor units, this can also trigger if SW7-3 DIP switch is incorrectly set to ON. TH11 monitors the liquid/gas line temperature for system protection.",causes:[{rank:1,text:"TH11 connector loose or disconnected"},{rank:2,text:"TH11 thermistor wire damaged or failed"},{rank:3,text:"SW7-3 set to ON on indoor unit when it should be OFF"}],checks:["Check TH11 connector and reseat","Measure TH11 resistance — compare to thermistor table","If this appears on an indoor unit, verify SW7-3 DIP switch is OFF"],branches:[{condition:"SW7-3 is ON",target:"Set SW7-3 to OFF and clear fault"},{condition:"Resistance out of spec",target:"Replace TH11 thermistor"}]}},{code:"5105",category:"City Multi",desc:"Pressure sensor fault (U4 on P-Series A)",action:"Check pressure sensor connection and calibration.",details:{meaning:"A pressure sensor (typically suction or discharge pressure transducer) is reading out of range or has failed. The board cannot get a valid pressure reading. Corresponds to U4 on P-Series A.",causes:[{rank:1,text:"Pressure sensor connector loose or disconnected"},{rank:2,text:"Pressure sensor wiring damaged"},{rank:3,text:"Pressure transducer failed internally"},{rank:4,text:"Pressure sensor port blocked or clogged"}],checks:["Check pressure sensor connector on the PCB — reseat","Measure sensor output voltage — should correspond to actual pressure","Compare sensor reading to gauge pressure","Check sensor port for blockage"],branches:[{condition:"Sensor reads 0V or 5V constantly",target:"Sensor failed — replace pressure transducer"},{condition:"Sensor reads correctly but fault persists",target:"PCB input circuit fault — check or replace board"}]}},{code:"5106",category:"City Multi",desc:"Thermistor TH6 failure",action:"Check TH6 connection and resistance.",details:{meaning:"Thermistor TH6 (water temperature sensor on water-source systems, or heat exchanger liquid pipe temperature) has failed — open, shorted, or reading out of range.",causes:[{rank:1,text:"TH6 connector loose or disconnected"},{rank:2,text:"TH6 thermistor wire damaged"},{rank:3,text:"TH6 thermistor failed — resistance out of spec"},{rank:4,text:"Water or moisture damage at sensor connection"}],checks:["Check TH6 connector on the PCB — reseat","Measure TH6 resistance — compare to thermistor table","Check wiring for water damage or corrosion (common on water-source units)"],branches:[{condition:"Resistance out of spec",target:"Replace TH6 thermistor"},{condition:"Connector corroded",target:"Clean or replace connector, check for water intrusion"}]}},{code:"5108",category:"City Multi",desc:"Thermistor TH8 failure",action:"Check TH8 connection and resistance.",details:{meaning:"Thermistor TH8 (water outlet temperature on water-source systems or secondary heat exchanger sensor) has failed — open, shorted, or out of range.",causes:[{rank:1,text:"TH8 connector loose or disconnected"},{rank:2,text:"TH8 thermistor wire damaged"},{rank:3,text:"TH8 thermistor failed — resistance out of spec"}],checks:["Check TH8 connector on the PCB — reseat","Measure TH8 resistance — compare to thermistor table","Check wiring for damage"],branches:[{condition:"Resistance out of spec",target:"Replace TH8 thermistor"},{condition:"Resistance OK",target:"Check PCB connector and input circuit"}]}},{code:"5110",category:"City Multi",desc:"Thermistor THHS failure",action:"Check THHS (heat sink) connection and resistance.",details:{meaning:"The heat sink thermistor (THHS) has failed — open, shorted, or reading out of range. This sensor monitors the inverter heat sink temperature. Without a valid reading, the board cannot protect the inverter from overheating.",causes:[{rank:1,text:"THHS connector loose or disconnected"},{rank:2,text:"THHS thermistor wire damaged"},{rank:3,text:"THHS thermistor failed — resistance out of spec"}],checks:["Check THHS connector on the inverter/outdoor PCB — reseat","Measure THHS resistance — compare to heat sink thermistor table (different spec than standard thermistors)","Check wiring for damage near the heat sink area"],branches:[{condition:"Resistance out of spec",target:"Replace THHS thermistor — use correct heat sink type"},{condition:"Resistance OK",target:"Check PCB input circuit"}]}},{code:"5201",category:"City Multi",desc:"High pressure sensor fault (F5 on P-Series A)",action:"Verify pressure >1 bar. Check 63HS transducer operation.",details:{meaning:"The high-pressure sensor (63HS transducer) is reading abnormally or has failed. This could mean the sensor reads pressure below 1 bar when the system should have standing pressure, or the sensor output is out of the expected voltage range.",causes:[{rank:1,text:"63HS pressure transducer failed — stuck reading or erratic output"},{rank:2,text:"63HS wiring damaged or connector loose"},{rank:3,text:"System actually has no pressure — empty from a leak (would also see 1301)"},{rank:4,text:"Sensor port blocked"}],checks:["Connect gauges — verify actual system pressure vs 63HS reading on MST","If system has pressure but 63HS reads wrong — sensor is faulty","Check 63HS connector and wiring","Measure sensor output voltage — should correlate with pressure"],branches:[{condition:"Gauges show pressure but 63HS reads zero or erratic",target:"Replace 63HS pressure transducer"},{condition:"System genuinely has no pressure",target:"Major leak — see code 1301 diagnostic"}]}},{code:"5202",category:"City Multi",desc:"Pressure sensor fault (F3 on P-Series A)",action:"Check pressure sensor wiring and connector.",details:{meaning:"A pressure sensor (typically the suction or intermediate pressure transducer) has a wiring or connection fault. The board detects an abnormal signal from the sensor — likely open circuit or shorted wiring rather than a genuine pressure reading issue.",causes:[{rank:1,text:"Pressure sensor connector disconnected or loose"},{rank:2,text:"Pressure sensor wiring damaged — open or shorted"},{rank:3,text:"Pressure sensor failed internally"}],checks:["Check pressure sensor connector on the PCB — reseat","Inspect wiring from sensor to PCB for damage","Measure sensor output — should be within 0.5V to 4.5V range"],branches:[{condition:"Connector was loose",target:"Reseat and clear fault — monitor for recurrence"},{condition:"Wiring damaged",target:"Repair or replace wiring"},{condition:"Sensor output abnormal with good wiring",target:"Replace pressure sensor"}]}},{code:"5203",category:"City Multi",desc:"Pressure sensor fault PS3 in BC box",action:"Specifically PS3 in the BC box — not a generic outdoor fault like 5201.",details:{meaning:"Pressure sensor PS3 inside the BC (Branch Controller) box has failed or is reading out of range. This is NOT the outdoor unit pressure sensor — it's specifically the sensor inside the BC box that monitors refrigerant pressure in the branch piping.",causes:[{rank:1,text:"PS3 sensor connector loose inside the BC box"},{rank:2,text:"PS3 sensor failed"},{rank:3,text:"BC box PCB fault — sensor input circuit"},{rank:4,text:"PS3 wiring damaged inside the BC box"}],checks:["Open the BC box and locate PS3 sensor","Check PS3 connector on the BC PCB — reseat","Measure PS3 output vs actual branch pressure","Check for moisture or corrosion inside the BC box"],branches:[{condition:"PS3 reads incorrectly vs gauges",target:"Replace PS3 pressure sensor in the BC box"},{condition:"PS3 connector issue",target:"Reseat connector, check for corrosion"}]}},{code:"5301",category:"City Multi",desc:"Current sensor fault",action:"Detail 115=low output current <1.5A rms during inverter operation. Check current sensor and compressor.",details:{meaning:"The current sensor (ACCT — AC Current Transformer) is reading abnormally low output current during inverter operation. Detail 115 means less than 1.5A RMS was detected while the inverter is driving the compressor — this shouldn't happen if the compressor is actually running.",causes:[{rank:1,text:"ACCT current sensor failed or disconnected"},{rank:2,text:"Compressor not actually running despite inverter output — open winding"},{rank:3,text:"Loose compressor power wiring — intermittent connection"},{rank:4,text:"Inverter board outputting voltage but no load — compressor wiring issue"}],checks:["Verify compressor is actually running — listen and check suction/discharge pressure change","Check ACCT sensor connection on the inverter board","Measure actual compressor current with a clamp meter — compare to MST reading","Check compressor power wiring for loose connections"],branches:[{condition:"Compressor is running but ACCT reads zero",target:"ACCT sensor failed — replace current transformer"},{condition:"Compressor is not running",target:"Check compressor windings and power wiring from inverter to compressor"}]}},{code:"6600",category:"City Multi",desc:"Indoor comms error (A0 on P-Series A)",action:"Check indoor unit communication wiring. Check CN40 connector.",details:{meaning:"Communication between the outdoor unit and one or more indoor units has failed on the M-NET transmission line. The outdoor unit cannot see or talk to an indoor unit that should be on the network. This is the most common communication fault on City Multi systems and corresponds to P-code A0 (2 green, 5 red LED flashes on the indoor board).",causes:[{rank:1,text:"Loose or disconnected M-NET wiring at TB7 (outdoor) or CN40/TB3 (indoor)"},{rank:2,text:"M-NET wire shorted, pinched, or damaged during installation"},{rank:3,text:"Incorrect polarity — M1/M2 wires swapped at one or more units"},{rank:4,text:"Indoor PCB failure — transmission circuit damaged"},{rank:5,text:"BC Controller not powered or M-NET connection through BC is broken"},{rank:6,text:"Address conflict — two units with same M-NET address"}],checks:["Check which indoor unit is faulting — the outdoor unit error log should show the address","Inspect CN40 connector at the faulting indoor unit — reseat the connector","Check M-NET wiring continuity from outdoor TB7 to the faulting indoor CN40","Verify M-NET polarity is consistent — M1 to M1, M2 to M2 throughout the chain","Measure M-NET voltage at outdoor TB7 — should be ~12VDC between M1 and M2","Check that all BC Controllers in the circuit are powered and online"],branches:[{condition:"One indoor unit is faulting",target:"Check that specific unit's CN40 connection, wiring run, and address setting"},{condition:"Multiple indoor units faulting",target:"Problem is upstream — check TB7 at outdoor, BC Controller, or main trunk wiring"},{condition:"M-NET voltage is 0V at outdoor TB7",target:"Outdoor PCB M-NET circuit fault or blown fuse — check board"},{condition:"Wiring checks good but fault persists",target:"Swap indoor PCB — transmission IC may be damaged"}]}},{code:"6602",category:"City Multi",desc:"Indoor comms error (A2)",action:"Check indoor communication wiring and connectors.",details:{meaning:"Communication error with a specific indoor unit — variant A2. Similar to 6600 but indicates a different communication protocol failure or timing issue on the M-NET bus. Same diagnostic approach as 6600.",causes:[{rank:1,text:"M-NET wiring loose at the faulting indoor unit"},{rank:2,text:"M-NET wire damaged or shorted"},{rank:3,text:"Indoor PCB communication circuit failure"},{rank:4,text:"Address conflict on M-NET"}],checks:["Identify which indoor unit is faulting from the error log","Check M-NET wiring at that unit's CN40 connector","Check continuity of M-NET wiring from outdoor to faulting unit","Verify no duplicate addresses"],branches:[{condition:"One unit faulting",target:"Check that unit's CN40, wiring, and address"},{condition:"Multiple units faulting",target:"Check main trunk wiring and BC controllers"}]}},{code:"6603",category:"City Multi",desc:"Indoor comms error (A3)",action:"Check indoor communication wiring and connectors.",details:{meaning:"Communication error variant A3 — similar root causes to 6600/6602. Different timing or protocol layer failure. Same diagnostic approach applies.",causes:[{rank:1,text:"M-NET wiring issue at faulting indoor unit"},{rank:2,text:"Indoor PCB failure"},{rank:3,text:"M-NET bus overloaded or noisy"}],checks:["Check M-NET wiring at faulting unit","Reseat CN40 connector","Verify M-NET bus voltage (~12VDC at TB7)"],branches:[{condition:"Wiring checks good",target:"Swap indoor PCB"}]}},{code:"6606",category:"City Multi",desc:"Indoor comms error (A6)",action:"Check indoor communication wiring and connectors.",details:{meaning:"Communication error variant A6 — the outdoor unit received corrupted or invalid data from an indoor unit. This often indicates electrical noise on the M-NET bus or a partially failed indoor PCB.",causes:[{rank:1,text:"Electrical noise on M-NET bus — wiring run near power cables"},{rank:2,text:"Indoor PCB communication IC partially failed"},{rank:3,text:"Poor connection at CN40 causing intermittent contact"}],checks:["Check M-NET wiring routing — should be separated from power cables","Reseat CN40 at faulting unit","If intermittent, may need to replace indoor PCB"],branches:[{condition:"M-NET runs alongside power cables",target:"Re-route M-NET wiring away from power — maintain separation"},{condition:"Wiring is clean",target:"Replace indoor PCB — communication IC failing"}]}},{code:"6607",category:"City Multi",desc:"Indoor comms error (A7 / EF on P-Series A)",action:"Check indoor communication wiring and connectors.",details:{meaning:"Communication error variant A7 / EF — no response from indoor unit after repeated attempts. The outdoor unit is sending to the address but getting no reply. Unit may be powered off, disconnected, or PCB failed.",causes:[{rank:1,text:"Indoor unit has no power — breaker tripped or transformer failed"},{rank:2,text:"M-NET wiring completely disconnected at the indoor unit"},{rank:3,text:"Indoor PCB failed — not responding to M-NET commands"},{rank:4,text:"Wrong address programmed — unit doesn't recognize the command"}],checks:["Verify the faulting indoor unit has power — check indicator LEDs","Check M-NET wiring at CN40","Verify the unit's address matches the system configuration"],branches:[{condition:"Indoor unit has no power",target:"Restore power — check breaker, transformer, fuse"},{condition:"Unit has power but not responding",target:"Check address setting, then swap PCB if correct"}]}},{code:"6608",category:"City Multi",desc:"Indoor comms error (A8)",action:"Check indoor communication wiring and connectors.",details:{meaning:"Communication error variant A8 — similar to other 66xx codes. Indicates a communication protocol issue with a specific indoor unit.",causes:[{rank:1,text:"M-NET wiring fault at indoor unit"},{rank:2,text:"Indoor PCB communication failure"},{rank:3,text:"Address or configuration mismatch"}],checks:["Check CN40 connector at faulting unit","Verify M-NET wiring continuity","Check address settings"],branches:[{condition:"Wiring checks good",target:"Replace indoor PCB"}]}},{code:"6700",category:"City Multi",desc:"K-control communication error",action:"R-22 type unit connected onto M-NET circuit. Wrong bus type.",details:{meaning:"An R-22 K-control type unit has been detected on the M-NET communication bus. K-control units use a different communication protocol than City Multi M-NET. They cannot coexist on the same bus without proper interface equipment.",causes:[{rank:1,text:"R-22 K-control unit wired directly onto M-NET TB7 bus — incompatible"},{rank:2,text:"Missing K-to-M interface adapter"},{rank:3,text:"Wrong wiring connection point — K-control should be on its own bus"}],checks:["Identify which unit is the K-control R-22 unit","Verify it's not wired directly onto M-NET TB7","Check if a K-to-M interface is required for this installation"],branches:[{condition:"K-control wired to M-NET directly",target:"Remove from M-NET bus — install proper interface or separate bus"}]}},{code:"6701",category:"City Multi",desc:"K-control communication error",action:"R-22 type unit connected onto M-NET circuit. Wrong bus type.",details:{meaning:"Same as 6700 — R-22 K-control unit on M-NET bus. Second variant of the same incompatibility fault.",causes:[{rank:1,text:"R-22 K-control unit on M-NET bus — wrong bus type"}],checks:["Same checks as 6700 — identify and isolate the K-control unit"],branches:[{condition:"K-control on M-NET",target:"Remove and install proper interface"}]}},{code:"6702",category:"City Multi",desc:"K-control duplicate address error",action:"Two or more R-22 type units on M-NET with same address.",details:{meaning:"Two or more R-22 K-control units have been assigned the same address. Each unit on the bus must have a unique address for communication to work.",causes:[{rank:1,text:"Multiple K-control units set to the same DIP switch address"},{rank:2,text:"Address not changed from factory default on one or more units"}],checks:["Check DIP switch address settings on each K-control unit","Verify each unit has a unique address","Re-address and re-run auto-addressing if needed"],branches:[{condition:"Duplicate addresses found",target:"Set unique addresses on each unit and restart"}]}},{code:"6830",category:"City Multi",desc:"Comms fault — indoor unit to MA remote controller",action:"Check connections, verify 12VDC, check remote controller is not set as sub controller.",details:{meaning:"Communication between an indoor unit and its MA-type wired remote controller has failed. The indoor unit supplies 12VDC to the remote — if the remote doesn't get power or the communication signal is lost, this fault appears.",causes:[{rank:1,text:"Remote controller wiring disconnected at indoor unit or behind the remote"},{rank:2,text:"Remote controller set as sub controller when it should be main (or vice versa)"},{rank:3,text:"12VDC not reaching the remote — indoor PCB power circuit issue"},{rank:4,text:"Remote controller hardware failure"},{rank:5,text:"Wiring too long — exceeds maximum cable run for remote type"}],checks:["Measure voltage between remote controller signal terminals — should see ~12VDC from indoor unit","Check remote controller wiring at both ends","Verify remote is set as main controller (not sub) if it's the only remote on this unit","Try a different remote controller to rule out hardware failure"],branches:[{condition:"No 12VDC at remote terminals",target:"Indoor PCB power output circuit fault — check board"},{condition:"12VDC present but no communication",target:"Check main/sub setting, try new remote"},{condition:"Remote set as sub controller",target:"Change to main controller setting"}]}},{code:"6840",category:"City Multi",desc:"A-Control E6/E8 cross-reference",action:"Check A-Control communication wiring.",details:{meaning:"Communication fault on the A-Control bus — cross-references to P-Series E6 or E8 fault codes. A-Control is the legacy communication bus for older Mitsubishi indoor units.",causes:[{rank:1,text:"A-Control wiring disconnected or damaged"},{rank:2,text:"Indoor unit A-Control PCB failure"},{rank:3,text:"Address or bus configuration error"}],checks:["Check A-Control communication wiring","Verify connections at indoor unit terminals","Check for address conflicts on the A-Control bus"],branches:[{condition:"Wiring fault found",target:"Repair A-Control wiring"},{condition:"Wiring good",target:"Check indoor PCB A-Control circuit"}]}},{code:"6841",category:"City Multi",desc:"A-Control E7/E9 cross-reference",action:"Check A-Control communication wiring.",details:{meaning:"Communication fault on A-Control bus — cross-references to P-Series E7 or E9. Same diagnostic approach as 6840.",causes:[{rank:1,text:"A-Control wiring issue"},{rank:2,text:"Indoor unit PCB failure"}],checks:["Check A-Control wiring","Verify connections and addresses"],branches:[{condition:"Same as 6840",target:"Check wiring first, then PCB"}]}},{code:"7100",category:"City Multi",desc:"Over capacity",action:"R2-Series=150% index exceeded. Y-Series=130% index exceeded. Reduce connected capacity.",details:{meaning:"The total connected indoor unit capacity exceeds the outdoor unit's allowed connection ratio. R2-Series systems allow up to 150% capacity index, while Y-Series systems allow up to 130%. This is a commissioning/design error — too many indoor units (or too-large indoor units) are connected for the outdoor unit's capacity.",causes:[{rank:1,text:"Too many indoor units connected — total capacity index exceeds outdoor unit limit"},{rank:2,text:"Indoor unit model swapped to larger size without recalculating capacity index"},{rank:3,text:"Wrong outdoor unit model installed — smaller than design called for"},{rank:4,text:"SW5 or capacity DIP switches set incorrectly — outdoor unit thinks it's a smaller model"},{rank:5,text:"Design error — engineer specified more indoor capacity than the outdoor unit supports"}],checks:["Calculate the total indoor capacity index: sum all indoor unit capacities and divide by outdoor unit capacity × 100","Verify the outdoor unit model matches the engineering schedule — confirm tonnage/kW rating","Check SW5 DIP switch settings on outdoor unit — ensure model and capacity settings are correct","Compare installed indoor unit models against the original design — look for upsized units","If over limit, remove indoor units or upgrade to a larger outdoor unit"],branches:[{condition:"Capacity index is within limit but code still appears",target:"Check SW5 settings — outdoor unit may be identifying itself as a smaller model"},{condition:"Capacity index genuinely exceeds limit",target:"Remove indoor units or replace outdoor unit with higher-capacity model"},{condition:"Indoor units were recently added or swapped",target:"Recalculate capacity index with new unit sizes and verify compliance"}]}},{code:"7101",category:"City Multi",desc:"Capacity setting error",action:"SW2 set wrong on indoor units, SW5 on YHMA outdoor (or SW3-10 on older equipment).",details:{meaning:"The indoor unit's capacity DIP switch (SW2) doesn't match its actual model size, or the outdoor unit's SW5 (or SW3-10 on older models) is set incorrectly. The system uses these switches to identify unit sizes for capacity calculations and refrigerant control. When they're wrong, the system can't properly manage refrigerant distribution.",causes:[{rank:1,text:"SW2 on indoor unit PCB set to wrong capacity — doesn't match the model installed"},{rank:2,text:"SW5 on YHM-A outdoor unit set incorrectly for the system configuration"},{rank:3,text:"SW3-10 on older outdoor units not matching the installed capacity"},{rank:4,text:"Indoor unit PCB replaced but SW2 not reset to match the unit model"},{rank:5,text:"Wrong indoor unit model installed — DIP switches left at factory default"}],checks:["Check SW2 DIP switch on each indoor unit PCB — compare setting against the model number on the unit nameplate","Check SW5 on YHM-A outdoor unit — verify setting matches engineering schedule","On older equipment, check SW3 through SW10 settings against manufacturer documentation","If a PCB was replaced, verify all DIP switches were restored to correct positions","Run auto-address after correcting switches to refresh system configuration"],branches:[{condition:"SW2 on indoor unit doesn't match model",target:"Correct SW2 to match unit nameplate capacity and re-run auto-address"},{condition:"Outdoor unit SW5 incorrect",target:"Set SW5 per installation manual for this system configuration"},{condition:"PCB was recently replaced",target:"Set all DIP switches to match original board settings — refer to commissioning record"}]}},{code:"7102",category:"City Multi",desc:"Error in number of connected units",action:"M-NET voltage loss (short/break), no power to BC Controller, wrong SW5 setting, wrong box type.",details:{meaning:"The outdoor unit has completed auto-addressing but the number of indoor units it found on the M-NET network doesn't match what it expects based on the system configuration. This typically happens during commissioning or after a BC Controller loses power. The outdoor unit knows how many units should be connected and is telling you something is missing or extra.",causes:[{rank:1,text:"BC Controller not powered — indoor units behind it can't communicate"},{rank:2,text:"M-NET wiring broken or shorted — units downstream of the break are invisible"},{rank:3,text:"SW5 DIP switch on outdoor unit set incorrectly — wrong system configuration"},{rank:4,text:"Wrong BC box type installed — CMB vs CMDB vs BS box mismatch"},{rank:5,text:"Indoor unit PCB replaced but address not restored — unit shows as new/unknown"},{rank:6,text:"System was expanded but auto-address was not re-run"}],checks:["Count indoor units physically vs what the outdoor unit sees in the MST service monitor","Verify every BC Controller has power (LED should be on) and M-NET connection","Check SW5 settings on outdoor unit against the engineering drawing/schedule","Verify BC box type matches the installation drawing — CMB for branch, CMDB for double branch","Re-run auto-addressing from the outdoor unit and compare results","Check M-NET wiring from outdoor TB7 through each BC to each indoor unit"],branches:[{condition:"BC Controller has no power or LED is off",target:"Restore power to BC — check breaker, transformer, wiring to BC box"},{condition:"All BCs powered but some indoor units missing",target:"Check M-NET wiring between BC and missing indoor units"},{condition:"SW5 settings don't match drawing",target:"Correct SW5 DIP switches and re-run auto-address"},{condition:"System was recently modified or expanded",target:"Re-run full auto-address sequence from outdoor unit"}]}},{code:"7105",category:"City Multi",desc:"Address setting error",action:"Outdoor unit or BC Controller addressed incorrectly.",details:{meaning:"The M-NET address assigned to an outdoor unit or BC Controller is invalid, duplicated, or conflicts with another device on the network. Every device on M-NET needs a unique address — the outdoor unit is typically address 0 (or 50 for slave), and BC Controllers follow a specific addressing scheme based on their position in the system.",causes:[{rank:1,text:"Duplicate address — two devices share the same M-NET address"},{rank:2,text:"BC Controller address rotary switch set incorrectly"},{rank:3,text:"Outdoor unit address not set to 0 (master) or correct slave address"},{rank:4,text:"Address was changed accidentally during service or PCB replacement"},{rank:5,text:"Auto-address failed partway through — some devices have stale addresses"}],checks:["Check the rotary address switch on each BC Controller — verify unique addresses per the engineering schedule","Verify outdoor unit address is set to 0 for master (or 50 for slave unit in twin/triple systems)","Use the MST service tool to read all device addresses on the M-NET network","Compare addressed devices against the system schematic — look for duplicates or gaps","Re-run auto-addressing from the outdoor unit to reset all addresses"],branches:[{condition:"Two devices have the same address",target:"Change one device's rotary switch to a unique address and re-run auto-address"},{condition:"Outdoor unit address is not 0",target:"Set outdoor unit to address 0 (master) and re-run auto-address"},{condition:"Error appears after PCB replacement",target:"Set replacement board's address to match original and re-run auto-address"}]}},{code:"7106",category:"City Multi",desc:"Attribute setting error (R-407C, R-410A)",action:"Check SW3-1 setting on GUF unit.",details:{meaning:"The attribute settings (which define unit type and function) don't match the actual equipment installed. On GUF (floor-standing) units, SW3-1 defines the unit type attribute. When this is wrong, the outdoor unit doesn't know what kind of indoor unit it's controlling and can't manage it properly.",causes:[{rank:1,text:"SW3-1 on GUF indoor unit set incorrectly — wrong unit type attribute"},{rank:2,text:"Indoor unit replaced with different model but attribute switch not updated"},{rank:3,text:"PCB replaced and SW3-1 not restored to correct position"},{rank:4,text:"Unit was configured for R-407C system but installed on R-410A system (or vice versa)"}],checks:["Check SW3-1 DIP switch on the GUF indoor unit PCB — verify correct position per installation manual","Confirm the indoor unit model matches what was specified in the engineering schedule","If PCB was replaced, verify all DIP switches match the original board configuration","Verify the refrigerant type matches the system — R-407C vs R-410A settings differ"],branches:[{condition:"SW3-1 is in wrong position",target:"Correct SW3-1 per installation manual and re-run auto-address"},{condition:"Unit model was changed",target:"Update all attribute switches to match new model and reconfigure system"}]}},{code:"7107",category:"City Multi",desc:"Port setting error",action:"Too much capacity on a single port, wiring issue, wrong SW14, wrong units on box in multi-box config.",details:{meaning:"A BC Controller port has too much indoor capacity connected, or the port configuration doesn't match the physical piping. Each port on a BC Controller has a maximum capacity limit. SW14 on the BC box defines port assignments. In multi-box configurations, indoor units may be assigned to the wrong box.",causes:[{rank:1,text:"Too much indoor capacity piped to a single BC Controller port — exceeds port limit"},{rank:2,text:"SW14 DIP switch on BC Controller set incorrectly — wrong port assignment"},{rank:3,text:"Indoor units connected to wrong BC box in a multi-box configuration"},{rank:4,text:"M-NET wiring doesn't match the physical piping — unit addressed to wrong port"},{rank:5,text:"BC Controller replaced but SW14 not configured to match original"}],checks:["Verify the capacity on each BC Controller port — sum indoor units on each port against the port limit","Check SW14 DIP switch settings on the BC Controller against the installation drawing","In multi-box systems, verify each indoor unit is wired (M-NET) and piped to the correct BC box","Compare the MST port map with the physical piping layout","If a BC was replaced, restore SW14 settings to match the original commissioning record"],branches:[{condition:"Single port is over capacity",target:"Redistribute indoor units across multiple ports or use a larger BC Controller"},{condition:"SW14 doesn't match piping",target:"Correct SW14 to match the physical port connections and re-run auto-address"},{condition:"Multi-box config with wrong assignments",target:"Verify each indoor unit's M-NET address matches the correct BC box"}]}},{code:"7110",category:"City Multi",desc:"Switch setting error (R-410A only)",action:"Check SW5-7 is correctly set.",details:{meaning:"A DIP switch on the outdoor unit (specifically SW5-7) is set incorrectly for the R-410A system configuration. SW5-7 defines critical system parameters — when it's wrong, the outdoor unit operates with incorrect assumptions about the system it's controlling.",causes:[{rank:1,text:"SW5-7 DIP switch set to wrong position — doesn't match system configuration"},{rank:2,text:"DIP switch accidentally bumped during service or PCB access"},{rank:3,text:"PCB replaced and SW5-7 not restored to correct setting"},{rank:4,text:"Installation manual for wrong model referenced during commissioning"}],checks:["Locate SW5 on the outdoor unit main PCB and check position of switch 7","Reference the installation manual for the specific outdoor unit model — verify correct SW5-7 position","Compare current SW5-7 setting against the original commissioning record if available","After correcting, power cycle the outdoor unit to apply the new setting"],branches:[{condition:"SW5-7 is clearly in wrong position",target:"Correct switch position per installation manual and power cycle"},{condition:"No commissioning record exists",target:"Reference installation manual for the outdoor unit model number on the nameplate"}]}},{code:"7111",category:"City Multi",desc:"Remote control sensor fault (R-22, R-407C, R-410A)",action:"SW1-1 is ON but no controllers fitted, or faulty remote controller.",details:{meaning:"The indoor unit expects a wired remote controller with a built-in room temperature sensor (SW1-1 is ON, telling the unit to use the remote's sensor), but either no remote controller is connected or the remote controller's sensor has failed. The unit can't read room temperature from the expected source.",causes:[{rank:1,text:"SW1-1 is ON (use remote sensor) but no wired remote controller is installed"},{rank:2,text:"Wired remote controller is installed but its temperature sensor has failed"},{rank:3,text:"Wiring between indoor unit and remote controller is broken or loose"},{rank:4,text:"Remote controller PCB failure — sensor circuit damaged"},{rank:5,text:"Wrong remote controller model — may not have built-in sensor"}],checks:["Check SW1-1 on the indoor unit PCB — if no wired remote is installed, turn SW1-1 OFF to use the unit's own return air sensor","If a wired remote is installed, verify wiring continuity between indoor unit and remote","Check the remote controller display — does it show a room temperature reading?","Try replacing the wired remote controller to rule out a faulty sensor","Verify the remote controller model is compatible with this indoor unit"],branches:[{condition:"No wired remote installed",target:"Turn SW1-1 OFF so the indoor unit uses its own return air thermistor"},{condition:"Remote installed but not displaying temperature",target:"Check wiring first, then replace remote controller if wiring is good"},{condition:"Remote displays temperature but code persists",target:"Check wiring at indoor unit terminal block — may have intermittent connection"}]}},{code:"7113",category:"City Multi",desc:"Function setting error (R-407C, R-410A)",action:"Wrong SW5 setting or wrong resistors fitted on YHM-A.",details:{meaning:"The function configuration on the outdoor unit doesn't match the actual system setup. On YHM-A outdoor units, function settings are defined by both SW5 DIP switches and resistor packs. When these don't match reality, the outdoor unit runs with wrong operating parameters — wrong defrost timing, wrong oil return cycles, or wrong capacity steps.",causes:[{rank:1,text:"SW5 DIP switches on outdoor unit set incorrectly for the installed configuration"},{rank:2,text:"Wrong resistor pack installed on YHM-A outdoor unit PCB"},{rank:3,text:"Resistors fitted for a different model or system configuration"},{rank:4,text:"PCB replaced but resistor configuration not transferred from old board"},{rank:5,text:"System modified (units added/removed) but function settings not updated"}],checks:["Check SW5 DIP switch settings on the outdoor unit against the installation manual for your specific model","On YHM-A units, verify the resistor pack on the PCB matches the system configuration","Compare current settings against the original commissioning documentation","If PCB was replaced, verify resistors were transferred or new correct ones installed","After correcting, power cycle and re-run auto-address"],branches:[{condition:"SW5 settings are wrong",target:"Correct SW5 per installation manual for the outdoor unit model and system configuration"},{condition:"Resistors don't match on YHM-A",target:"Install correct resistor pack per the installation manual — reference model number on nameplate"},{condition:"Not sure what the correct setting should be",target:"Contact Mitsubishi tech support with the outdoor unit model number and system layout"}]}},{code:"7117",category:"City Multi",desc:"Model setting error (R-407C, R-410A)",action:"SW5 set wrong or wrong resistors installed.",details:{meaning:"The outdoor unit's model identification settings don't match the actual hardware. SW5 and/or resistors tell the control board what model it is — tonnage, series, and refrigerant type. When wrong, the unit runs with incorrect compressor maps, fan speeds, and protection limits, which can damage equipment or trigger cascading faults.",causes:[{rank:1,text:"SW5 DIP switches set for a different outdoor unit model"},{rank:2,text:"Wrong resistors installed on the PCB — model ID doesn't match nameplate"},{rank:3,text:"PCB replaced with a board from a different model — resistors carry over wrong identity"},{rank:4,text:"Factory error — rarely, switches ship in wrong position"}],checks:["Read the outdoor unit model number from the nameplate","Check SW5 DIP switch positions against the installation manual for that specific model","Verify resistor values on the PCB match the model — refer to service manual resistor chart","If PCB was replaced, confirm the replacement is for the correct model number","After correcting, power cycle the outdoor unit completely (off for 30+ seconds)"],branches:[{condition:"SW5 doesn't match the model per the manual",target:"Correct SW5 positions and power cycle the unit"},{condition:"PCB was recently replaced",target:"Verify replacement board part number matches the outdoor unit model — install correct resistors"},{condition:"Settings appear correct but code persists",target:"Check for a firmware mismatch — the PCB may need a software update"}]}},{code:"7130",category:"City Multi",desc:"Incompatible equipment on M-NET (R-407C, R-410A)",action:"Check split with MAC 399 wired onto TB5 line, not TB7.",details:{meaning:"An incompatible device has been detected on the M-NET communication bus. This commonly happens when a split system controller (like MAC-399IF) is wired to the wrong terminal block — TB7 is for City Multi M-NET, while TB5 is for split/P-Series communication. Mixing incompatible protocols on the same bus causes communication errors.",causes:[{rank:1,text:"MAC-399IF (or similar controller) wired to TB7 instead of TB5 — wrong communication bus"},{rank:2,text:"Split system indoor unit connected to City Multi M-NET bus"},{rank:3,text:"Incompatible generation of equipment mixed on the same M-NET network"},{rank:4,text:"Third-party controller or BMS gateway not compatible with this M-NET version"},{rank:5,text:"Wrong firmware version on a network device — not compatible with other devices"}],checks:["Verify all controllers are wired to the correct terminal block — MAC-399IF goes to TB5 for split, TB7 for City Multi","Check that no split system components are connected to the City Multi M-NET bus","Verify all equipment on the M-NET network is compatible generation — don't mix R-22 era controllers with R-410A systems without adapters","Check BMS gateway compatibility — verify model and firmware support the installed system generation","Disconnect suspect devices one at a time to identify the incompatible unit"],branches:[{condition:"MAC-399IF is on TB7",target:"Move MAC-399IF wiring from TB7 to TB5 — it communicates with splits on a different protocol"},{condition:"Mixed generation equipment",target:"Install a protocol adapter/converter between old and new generation devices"},{condition:"BMS gateway causing the error",target:"Verify gateway firmware and compatibility — update or replace if not supported"}]}},// ── K-Control Legacy (R-22 on M-NET) ──
{code:"6751",category:"K-Control",desc:"R/A thermistor fault (P1)",action:"Check return air thermistor resistance and connection.",details:{meaning:"The return air thermistor (TH1/P1) on the K-Control indoor unit is reading out of range or open/shorted. This sensor measures room return air temperature for capacity control. On legacy R-22 K-Control units, this maps to the P1 fault LED on the indoor PCB.",causes:[{rank:1,text:"Thermistor connector loose or disconnected from indoor PCB"},{rank:2,text:"Thermistor failed open — reads infinite resistance"},{rank:3,text:"Thermistor wire damaged — pinched or chewed through"},{rank:4,text:"Corrosion on PCB connector pins"},{rank:5,text:"Indoor PCB thermistor input circuit failure"}],checks:["Disconnect TH1 thermistor and measure resistance — should be ~10kΩ at 25°C (77°F)","Check connector is fully seated on the indoor unit PCB","Inspect wiring for damage, pinching, or rodent damage","Clean connector pins if corrosion is present"],branches:[{condition:"Thermistor reads open or shorted",target:"Replace the return air thermistor"},{condition:"Thermistor resistance is normal",target:"Check wiring and connector — if good, replace indoor PCB"}]}},{code:"6752",category:"K-Control",desc:"Frost protection at indoor unit (P6)",action:"Check airflow restriction or refrigerant charge.",details:{meaning:"The indoor coil temperature dropped below the frost protection threshold. The K-Control system shut down to prevent coil freezing. Maps to P6 fault on the indoor unit — something is preventing proper heat absorption at the indoor coil.",causes:[{rank:1,text:"Dirty air filter — reduced airflow causes coil temperature to plummet"},{rank:2,text:"Low refrigerant charge — reduced mass flow means less heat absorption"},{rank:3,text:"Blower motor running slow or failing"},{rank:4,text:"Dirty indoor coil — reduced heat transfer"},{rank:5,text:"TXV or metering device stuck partially closed"}],checks:["Check and clean air filter — #1 cause","Check refrigerant charge — measure superheat at indoor coil","Verify blower motor is running at correct speed — check capacitor if PSC motor","Inspect indoor coil for dirt buildup","Check TXV operation — superheat should be stable, not hunting"],branches:[{condition:"Filter is clogged",target:"Clean or replace filter — monitor coil temp"},{condition:"Superheat is high (starved coil)",target:"Check charge, check TXV, check for liquid line restrictions"},{condition:"Blower is slow or not running",target:"Check motor capacitor, windings, and blower relay"}]}},{code:"6753",category:"K-Control",desc:"Comms fault between indoor and outdoor",action:"Check communication wiring between units.",details:{meaning:"The K-Control indoor unit lost communication with its outdoor unit. On legacy R-22 systems, communication runs on a 2-wire signal between indoor and outdoor PCBs. This is the direct unit-to-unit link, different from M-NET.",causes:[{rank:1,text:"Communication wiring broken, shorted, or loose at terminal block"},{rank:2,text:"Outdoor unit has no power — can't respond"},{rank:3,text:"Outdoor PCB failure — communication circuit dead"},{rank:4,text:"Indoor PCB communication circuit failure"},{rank:5,text:"Wiring picking up electrical noise from nearby power cables"}],checks:["Verify outdoor unit has power and is operational","Check communication wiring at both terminal blocks — ensure tight connections","Measure continuity on communication wires end-to-end","Check for wiring running parallel to high-voltage cables — separate if needed"],branches:[{condition:"Outdoor unit has no power",target:"Restore power — check breaker, disconnect, fuses"},{condition:"Wiring is damaged or loose",target:"Repair or replace communication wiring"},{condition:"Wiring good, both units powered",target:"Check DC voltage on comm terminals — suspect PCB if absent"}]}},{code:"6754",category:"K-Control",desc:"Drain fault (P4 or P5)",action:"Check drain piping, pump, and float switch.",details:{meaning
