s","Monitor for communication errors (6600-6608 series = indoor comms fault)"]},{step:"Step 4",title:"Refrigerant Charge",icon:"🧪",items:["Calculate additional charge based on liquid line length and diameter per installation manual","Charge through liquid service valve in cooling mode","Outdoor ambient must be above 50°F (10°C) for cooling charge","Monitor subcooling and superheat during charge — target values per model","Record total charge amount on unit nameplate","If using auto-charge function: follow controller prompts, system stops automatically"]},{step:"Step 5",title:"Verification & Handover",icon:"🏁",items:["Run system in COOL and HEAT modes — verify all zones reach setpoint","Check each BC controller is directing refrigerant correctly (heat recovery systems)","Verify MA remote controller operation — on/off, mode change, setpoint, fan speed","Check all drain pumps cycle and condensate flows","Configure schedule timers and setpoint limits if required","Record all commissioning data, charge amounts, and settings for building owner"]}];// ── LED Flash Cross-Reference (P-Series A → City Multi) ──

ext:"Condenser fan not running or running slow"},{rank:3,text:"Refrigerant overcharge"},{rank:4,text:"Service valve not fully open"},{rank:5,text:"Non-condensibles (air) in system"}],checks:["Check condenser coil — clean if dirty","Verify all condenser fans are running","Check all service/stop valves are fully open","Connect gauges — check high-side pressure and subcooling"],branches:[{condition:"Dirty condenser",target:"Clean coil, verify fans running"},{condition:"Valve closed",target:"Open service valve fully"},{condition:"Overcharged",target:"Recover excess refrigerant"}]}},{code:"CH25",category:"Outdoor",desc:"Input voltage too high or too low",action:"Voltage ≤140V or ≥300V (208-230V) or ≤414V / ≥528V (460V). Check mains supply and connections.",details:{meaning:"The input power voltage is outside the acceptable operating range. On 208-230V systems: shuts down at ≤140V or ≥300V. On 460V systems: shuts down at ≤414V or ≥528V. The inverter cannot safely operate outside these limits.",causes:[{rank:1,text:"Utility voltage out of range — brownout or overvoltage"},{rank:2,text:"Loose power connections causing voltage drop under load"},{rank:3,text:"Wrong transformer tap — voltage too high or low"},{rank:4,text:"Undersized wiring causing excessive voltage drop"}],checks:["Measure voltage at outdoor disconnect under load — within spec?","Check voltage at main panel — compare to unit terminals for voltage drop","Tighten all power connections","Check transformer tap settings if applicable"],branches:[{condition:"Voltage too low",target:"Check connections, wire sizing, utility supply"},{condition:"Voltage too high",target:"Check transformer tap, contact utility"}]}},{code:"CH26",category:"Outdoor",desc:"Inverter compressor failed to start",action:"Compressor operation error. Check compressor winding resistance, power supply, and inverter board.",details:{meaning:"The inverter attempted to start the compressor but failed to achieve proper rotation. The inverter couldn't synchronize with the compressor motor — either the compressor is seized, the wiring is wrong, or the inverter can't drive the motor.",causes:[{rank:1,text:"Compressor mechanically seized"},{rank:2,text:"Compressor wiring fault — loose or corroded terminals"},{rank:3,text:"Inverter board output stage failure"},{rank:4,text:"Low voltage at startup"},{rank:5,text:"Liquid refrigerant flooding — hydraulic lock"}],checks:["Measure compressor winding resistance — balanced and within spec?","Megohm test to ground — >1MΩ","Check terminal connections at compressor","Check supply voltage during startup attempt","Verify crankcase heater is working"],branches:[{condition:"Compressor seized",target:"Replace compressor"},{condition:"Windings OK, inverter damaged",target:"Replace inverter board"},{condition:"Liquid flooded",target:"Let compressor warm up, check crankcase heater"}]}},{code:"CH29",category:"Outdoor",desc:"Inverter compressor overcurrent",action:"Current draw too high. Check for compressor defect or refrigerant piping restriction.",details:{meaning:"The compressor is drawing sustained overcurrent — the inverter is delivering more current than normal operating limits. This indicates the compressor is mechanically overloaded or electrically degraded.",causes:[{rank:1,text:"Compressor winding degradation — partial short"},{rank:2,text:"Refrigerant piping restriction — compressor working too hard"},{rank:3,text:"Very high ambient or head pressure"},{rank:4,text:"Compressor bearing wear"}],checks:["Measure compressor winding resistance — balanced?","Check for piping restrictions — kinks, closed valves, blocked filter drier","Check operating pressures — head pressure normal?","Monitor current with clamp meter"],branches:[{condition:"Windings unbalanced",target:"Compressor failing — plan replacement"},{condition:"Piping restriction",target:"Locate and clear restriction"}]}},{code:"CH32",category:"Outdoor",desc:"Compressor discharge temp too high (>115°C)",action:"Discharge pipe >115°C for 10s or dome >105°C for 10s. Check refrigerant charge, EEV, liquid spray valve, discharge thermistor.",details:{meaning:"The compressor discharge temperature exceeded 115°C (239°F) at the pipe or 105°C (221°F) at the dome for more than 10 seconds. The compressor is severely overheating — this level risks oil breakdown and compressor damage.",causes:[{rank:1,text:"Low refrigerant charge — compressor overheats without suction gas cooling"},{rank:2,text:"EEV malfunction — not feeding enough refrigerant"},{rank:3,text:"Liquid spray valve not working — can't cool discharge gas"},{rank:4,text:"Dirty condenser — high head pressure"},{rank:5,text:"Discharge thermistor reading falsely high"}],checks:["Check refrigerant charge — connect gauges, check superheat","Check EEV operation","Verify liquid spray valve operation (if equipped)","Check condenser cleanliness and fan operation","Compare discharge thermistor reading to actual temp"],branches:[{condition:"Low charge",target:"Find leak, repair, recharge"},{condition:"EEV stuck",target:"Replace or repair EEV"},{condition:"Thermistor wrong",target:"Replace discharge thermistor"}]}},{code:"CH33",category:"Outdoor",desc:"Compressor 2 discharge temp too high",action:"Same as CH32 but for second compressor. Check discharge sensor and refrigerant charge.",details:{meaning:"Same as CH32 but for the second compressor in a dual-compressor outdoor unit. The second compressor's discharge temperature exceeded the safety limit.",causes:[{rank:1,text:"Low refrigerant charge"},{rank:2,text:"EEV malfunction on circuit feeding compressor 2"},{rank:3,text:"Compressor 2 discharge thermistor fault"}],checks:["Same checks as CH32 but focus on compressor 2 circuit","Compare discharge temps between compressor 1 and 2","Check compressor 2 discharge thermistor"],branches:[{condition:"Both compressors high",target:"System-wide issue — charge, condenser, fan"},{condition:"Only compressor 2 high",target:"Check compressor 2 circuit — EEV, thermistor, winding"}]}},{code:"CH34",category:"Outdoor",desc:"High pressure safety tripped",action:"HP >4000 kPa (580 psi) for 10s at ≥30Hz. Check HP sensor, fans, refrigerant, EEV, service valve. Check outdoor clearance.",details:{meaning:"The high-pressure transducer measured >4000 kPa (580 psi) for more than 10 seconds while the compressor was running at 30Hz or above. This is a software-based HP protection (different from the mechanical switch in CH24).",causes:[{rank:1,text:"Service valve not fully open"},{rank:2,text:"Dirty condenser coil"},{rank:3,text:"Fan not running or running slow"},{rank:4,text:"Insufficient outdoor unit clearance — recirculating hot air"},{rank:5,text:"Refrigerant overcharge"},{rank:6,text:"HP sensor fault — reading falsely high"}],checks:["Check all service valves — fully open","Clean condenser coil","Verify all fans running at correct speed","Check outdoor unit clearance — meets minimum specs?","Connect gauges — compare to HP sensor reading","Check EEV operation"],branches:[{condition:"Valve closed",target:"Open fully — most common cause on new installs"},{condition:"Poor clearance",target:"Improve airflow around outdoor unit"},{condition:"HP sensor reads wrong vs gauges",target:"Replace HP sensor"}]}},{code:"CH35",category:"Outdoor",desc:"Low pressure below allowable limits",action:"Cooling: LP <400 kPa for 1 min. Heating: LP <230 kPa for 1 min. Check for leaks, low charge, defective EEV.",details:{meaning:"Low-side pressure dropped below minimum operating limits — <400 kPa in cooling mode for 1 minute, or <230 kPa in heating mode for 1 minute. The evaporator is starved of refrigerant.",causes:[{rank:1,text:"Low refrigerant charge — leak"},{rank:2,text:"EEV stuck closed or restricted — not feeding enough refrigerant"},{rank:3,text:"Liquid line restriction — filter drier, kink"},{rank:4,text:"LP sensor reading falsely low"}],checks:["Connect gauges — verify actual low-side pressure","Check refrigerant charge — look for leaks","Check EEV operation — stuck closed?","Check for liquid line restrictions"],branches:[{condition:"Charge low",target:"Find and repair leak, recharge"},{condition:"EEV stuck",target:"Check EEV coil and driver — replace if needed"}]}},{code:"CH36",category:"Outdoor",desc:"Low compression ratio",action:"Compression ratio <1.6 for 2-5 min after reversing valve change. Check reversing valve and refrigerant charge.",details:{meaning:"The compression ratio (HP÷LP) is below 1.6 for 2-5 minutes after a reversing valve changeover. This indicates the reversing valve may not have shifted completely, or there's a refrigerant issue preventing normal pressure differential.",causes:[{rank:1,text:"Reversing valve stuck mid-position — not fully shifted"},{rank:2,text:"Reversing valve pilot solenoid failed"},{rank:3,text:"Reversing valve body leaking through internally"},{rank:4,text:"Refrigerant charge significantly off"}],checks:["Listen for reversing valve shifting — should hear a click/thud on mode change","Check pilot solenoid coil — voltage present? Coil resistance OK?","Check HP and LP during mode change — pressures should separate","If pressures equalize quickly after compressor stops, valve is leaking through"],branches:[{condition:"Valve not shifting",target:"Check pilot solenoid, try tapping valve body lightly"},{condition:"Valve leaking through",target:"Replace reversing valve"}]}},{code:"CH40",category:"Outdoor",desc:"CT sensor error",action:"Current transducer detection sensor disconnected or shorted. Check CT sensor connections on inverter board.",details:{meaning:"The current transducer (CT) sensor that monitors compressor motor current has an open or short circuit. Without this sensor, the inverter can't monitor motor current for protection.",causes:[{rank:1,text:"CT sensor connector disconnected from inverter board"},{rank:2,text:"CT sensor failed"},{rank:3,text:"Wiring damaged between CT and inverter board"}],checks:["Check CT sensor connector on inverter board — reseat","Inspect CT sensor for damage","Check wiring between CT and board"],branches:[{condition:"Connector loose",target:"Reseat and test"},{condition:"CT sensor failed",target:"Replace CT sensor"}]}},{code:"CH41",category:"Outdoor",desc:"Compressor 1 discharge pipe temperature sensor error",action:"Thermistor disconnected or shorted. Check connection on outdoor PCB.",details:{meaning:"Compressor 1 discharge pipe thermistor is out of range — open or short circuit. This sensor protects the compressor from overheating.",causes:[{rank:1,text:"Connector disconnected from outdoor PCB"},{rank:2,text:"Thermistor failed"},{rank:3,text:"Sensor detached from discharge pipe"}],checks:["Check connector on PCB","Measure resistance","Verify mounted on discharge pipe"],branches:[{condition:"Open or short",target:"Replace thermistor"}]}},{code:"CH42",category:"Outdoor",desc:"Low pressure sensor error",action:"LP sensor disconnected or shorted. Check connection on outdoor PCB.",details:{meaning:"The low-pressure transducer has an open or short circuit — sensor hardware failure, not a pressure issue.",causes:[{rank:1,text:"LP sensor connector disconnected"},{rank:2,text:"LP sensor failed internally"}],checks:["Check LP sensor connector on PCB","Measure sensor output voltage"],branches:[{condition:"Sensor failed",target:"Replace LP pressure sensor"}]}},{code:"CH43",category:"Outdoor",desc:"High pressure sensor error",action:"HP sensor disconnected or shorted. Check connection on outdoor PCB.",details:{meaning:"The high-pressure transducer has an open or short circuit — sensor hardware failure.",causes:[{rank:1,text:"HP sensor connector disconnected"},{rank:2,text:"HP sensor failed internally"}],checks:["Check HP sensor connector on PCB","Measure sensor output voltage"],branches:[{condition:"Sensor failed",target:"Replace HP pressure sensor"}]}},{code:"CH44",category:"Outdoor",desc:"Ambient temperature sensor error",action:"Outdoor ambient thermistor disconnected or shorted. Check connection on outdoor PCB.",details:{meaning:"The outdoor ambient air temperature sensor is out of range — critical for compressor speed control, defrost logic, and capacity management.",causes:[{rank:1,text:"Connector disconnected"},{rank:2,text:"Thermistor failed"},{rank:3,text:"Wiring damaged by weather"}],checks:["Check connector on outdoor PCB","Measure resistance","Inspect for weather damage"],branches:[{condition:"Open or short",target:"Replace ambient thermistor"}]}},{code:"CH45",category:"Outdoor",desc:"Heat exchanger pipe temperature sensor error",action:"Check suction sensor (cooling) or hot gas sensor near HX (heating). Thermistor disconnected or shorted.",details:{meaning:"The outdoor heat exchanger pipe thermistor is out of range. In cooling mode this monitors the suction side; in heating mode it monitors the hot gas side of the outdoor coil.",causes:[{rank:1,text:"Connector disconnected"},{rank:2,text:"Thermistor failed"},{rank:3,text:"Sensor detached from pipe"}],checks:["Check connector on PCB","Measure resistance","Verify proper mounting"],branches:[{condition:"Open or short",target:"Replace HX pipe thermistor"}]}},{code:"CH46",category:"Outdoor",desc:"Suction pipe temperature sensor error",action:"Suction thermistor disconnected or shorted. Check connection on outdoor PCB.",details:{meaning:"The suction pipe thermistor is out of range — monitors suction gas temperature for superheat calculation and compressor protection.",causes:[{rank:1,text:"Connector disconnected"},{rank:2,text:"Thermistor failed"}],checks:["Check connector on PCB","Measure resistance"],branches:[{condition:"Open or short",target:"Replace suction pipe thermistor"}]}},{code:"CH47",category:"Outdoor",desc:"Compressor 2 discharge temperature sensor error",action:"Compressor 2 discharge thermistor disconnected or shorted.",details:{meaning:"Same as CH41 but for the second compressor in dual-compressor units.",causes:[{rank:1,text:"Connector disconnected"},{rank:2,text:"Thermistor failed"}],checks:["Check connector on PCB","Measure resistance"],branches:[{condition:"Open or short",target:"Replace compressor 2 discharge thermistor"}]}},{code:"CH49",category:"Outdoor",desc:"IPM temperature sensor error",action:"IPM (inverter module) thermistor disconnected or shorted.",details:{meaning:"The IPM (Intelligent Power Module) temperature sensor is out of range. This sensor monitors the inverter power transistor temperature to prevent thermal damage.",causes:[{rank:1,text:"IPM thermistor connector disconnected"},{rank:2,text:"IPM thermistor failed"}],checks:["Check IPM thermistor connector on inverter board","Measure resistance"],branches:[{condition:"Open or short",target:"Replace IPM thermistor or inverter board"}]}},{code:"CH50",category:"Outdoor",desc:"Three-phase power not connected properly",action:"One or more of R(L1), S(L2), T(L3) input power lines missing. Check all phase connections.",details:{meaning:"The outdoor unit detected that one or more of the three power phases is missing. All three phases — R(L1), S(L2), T(L3) — must be connected for the unit to operate.",causes:[{rank:1,text:"One phase not connected at the outdoor disconnect"},{rank:2,text:"Fuse blown on one phase"},{rank:3,text:"Breaker tripped on one phase"},{rank:4,text:"Loose wire connection on one phase"}],checks:["Measure all three phase-to-phase voltages: R-S, S-T, R-T","Check all fuses","Check breaker — all poles closed?","Tighten all power connections at disconnect and unit terminals"],branches:[{condition:"Phase missing",target:"Restore missing phase — check fuse, breaker, connections"},{condition:"All phases present",target:"Check phase detection circuit on outdoor PCB"}]}},{code:"CH51",category:"System",desc:"Combination ratio out of range",action:"Indoor capacity is <50% or >130% of outdoor capacity. Recalculate system sizing.",details:{meaning:"The total connected indoor unit capacity is outside the allowed ratio. Must be between 50% and 130% of the outdoor unit rated capacity. Too low means inefficient operation; too high means insufficient refrigerant for all units.",causes:[{rank:1,text:"Too many or too few indoor units for the outdoor unit size"},{rank:2,text:"Indoor unit capacity settings (DIP switches) incorrect"},{rank:3,text:"Wrong outdoor unit model installed"}],checks:["Calculate total indoor capacity ÷ outdoor capacity × 100 — must be 50-130%","Verify indoor unit capacity DIP switch settings","Verify outdoor unit model matches design"],branches:[{condition:"Over 130%",target:"Remove indoor units or upgrade outdoor"},{condition:"Under 50%",target:"Add indoor units or downsize outdoor"}]}},{code:"CH52",category:"Outdoor",desc:"Main PCB to inverter PCB communication error",action:"Check CN-29 on main PCB and CN-MAIN COM/RD on inverter PCB. Inspect interconnecting cable.",details:{meaning:"The main outdoor PCB and inverter PCB can't communicate. Check the specific connectors: CN-29 on the main board and CN-MAIN COM/RD on the inverter board, plus the cable between them.",causes:[{rank:1,text:"Interconnecting cable loose at CN-29 or CN-MAIN COM/RD"},{rank:2,text:"Cable damaged"},{rank:3,text:"PCB communication circuit failure"}],checks:["Reseat cable at CN-29 (main PCB) and CN-MAIN COM/RD (inverter PCB)","Inspect cable for damage","Check both connectors for bent pins"],branches:[{condition:"Cable loose",target:"Reseat at both ends"},{condition:"Cable damaged",target:"Replace interconnecting cable"}]}},{code:"CH53",category:"System",desc:"Outdoor to indoor unit communication error",action:"Check outdoor-to-indoor comm cable for disconnection or short. Verify A/B terminal connections.",details:{meaning:"The outdoor unit can't communicate with one or more indoor units on the A/B communication bus. Similar to CH05 but reported from the outdoor unit side.",causes:[{rank:1,text:"A/B communication cable disconnected or shorted"},{rank:2,text:"Indoor unit not powered"},{rank:3,text:"Cable damaged or wrong type"}],checks:["Check A/B terminal connections at outdoor and all indoor units","Verify all indoor units are powered","Check for shorts on A/B cable"],branches:[{condition:"Cable fault",target:"Repair A/B communication wiring"},{condition:"Indoor not powered",target:"Restore power to indoor unit"}]}},{code:"CH57",category:"Outdoor",desc:"Main PCB and inverter PCB communication error",action:"Inverter PCB not receiving signal from main PCB. Check cable connections between boards.",details:{meaning:"Similar to CH52 but detected from the inverter side — the inverter PCB isn't receiving commands from the main PCB.",causes:[{rank:1,text:"Cable loose between boards"},{rank:2,text:"Cable damaged"},{rank:3,text:"PCB fault"}],checks:["Reseat cable between main and inverter PCBs","Inspect cable for damage"],branches:[{condition:"Cable issue",target:"Reseat or replace cable"},{condition:"PCB fault",target:"Replace faulty PCB"}]}},{code:"CH60",category:"Outdoor",desc:"Inverter PCB EPROM error",action:"Verify EPROM present and seated correctly. Check all pins. Verify notch aligns with socket arrow.",details:{meaning:"The inverter PCB can't read its EPROM chip. The EPROM stores firmware and configuration data. If it's missing, loose, or inserted backwards, the inverter can't operate.",causes:[{rank:1,text:"EPROM chip not seated properly in socket"},{rank:2,text:"EPROM inserted backwards — notch not aligned with arrow"},{rank:3,text:"EPROM pins corroded or bent"},{rank:4,text:"EPROM data corrupted"}],checks:["Verify EPROM is present in socket","Check notch alignment — must match socket arrow marking","Reseat EPROM — check all pins","If data corrupted, replace EPROM or inverter board"],branches:[{condition:"EPROM loose/misaligned",target:"Reseat correctly with notch aligned"},{condition:"EPROM corrupted",target:"Replace EPROM chip or entire inverter PCB"}]}},{code:"CH62",category:"Outdoor",desc:"Inverter heatsink high temperature",action:"System shutdown due to high inverter heatsink temperature. Check heatsink fan and airflow.",details:{meaning:"The inverter heatsink (heat sink fins that cool the power transistors) has overheated. The system shuts down to prevent inverter damage.",causes:[{rank:1,text:"Heatsink fins clogged with dust"},{rank:2,text:"Heatsink cooling fan not running"},{rank:3,text:"High ambient temperature"},{rank:4,text:"Thermal paste dried out between IPM and heatsink"}],checks:["Clean heatsink fins","Verify heatsink fan is running","Check ambient temperature","Check thermal interface between IPM and heatsink"],branches:[{condition:"Fins dirty",target:"Clean thoroughly"},{condition:"Fan dead",target:"Replace heatsink cooling fan"}]}},{code:"CH65",category:"Outdoor",desc:"Inverter heatsink temperature sensor error",action:"Heatsink thermistor disconnected or shorted. Check connections.",details:{meaning:"The heatsink temperature sensor is out of range — can't monitor inverter cooling.",causes:[{rank:1,text:"Connector disconnected"},{rank:2,text:"Thermistor failed"}],checks:["Check connector on inverter board","Measure resistance"],branches:[{condition:"Open or short",target:"Replace heatsink thermistor"}]}},{code:"CH67",category:"Outdoor",desc:"Outdoor fan locked up",action:"Fan not spinning. Check fan motor, blade obstruction, and wiring.",details:{meaning:"The outdoor fan motor is not spinning — either mechanically locked or electrically dead.",causes:[{rank:1,text:"Fan blade physically blocked — debris, ice, foreign object"},{rank:2,text:"Fan motor bearing seized"},{rank:3,text:"Fan motor wiring disconnected"},{rank:4,text:"Fan motor has failed"}],checks:["Check for obstructions around fan","Spin fan by hand — should rotate freely","Check motor wiring connector","Check motor winding resistance"],branches:[{condition:"Obstruction found",target:"Remove obstruction"},{condition:"Motor seized",target:"Replace fan motor"}]}},{code:"CH71",category:"Outdoor",desc:"Inverter CT sensor restriction error",action:"Outdoor unit restricted. Check CT sensor and refrigerant flow.",details:{meaning:"The CT sensor is detecting abnormal current patterns that suggest the outdoor unit refrigerant circuit is restricted — the compressor is working against excessive resistance.",causes:[{rank:1,text:"Refrigerant piping restriction"},{rank:2,text:"CT sensor fault giving false reading"},{rank:3,text:"EEV malfunction causing restriction"}],checks:["Check for piping restrictions — kinks, blocked drier","Check EEV operation","Verify CT sensor reading"],branches:[{condition:"Restriction found",target:"Clear or replace restricted component"},{condition:"CT sensor fault",target:"Replace CT sensor"}]}},{code:"CH75",category:"Outdoor",desc:"Fan CT sensor error",action:"Fan current detection sensor disconnected or shorted.",details:{meaning:"The fan motor current transducer sensor has failed — open or short circuit.",causes:[{rank:1,text:"Fan CT sensor connector disconnected"},{rank:2,text:"Sensor failed"}],checks:["Check fan CT sensor connector","Inspect sensor"],branches:[{condition:"Sensor failed",target:"Replace fan CT sensor"}]}},{code:"CH77",category:"Outdoor",desc:"Fan overcurrent",action:"Fan current >10A (208-230V) or >5A (460V). Check fan motor and wiring.",details:{meaning:"The outdoor fan motor is drawing excessive current — over 10A on 208-230V systems or over 5A on 460V systems. The fan motor is overloaded or failing.",causes:[{rank:1,text:"Fan motor winding short — drawing excess current"},{rank:2,text:"Fan blade hitting something — increased load"},{rank:3,text:"Fan motor bearing tight — increased friction"}],checks:["Check fan blade clearance","Measure motor winding resistance","Spin fan by hand — friction?","Measure current with clamp meter"],branches:[{condition:"Motor drawing high current",target:"Replace fan motor"},{condition:"Blade contact",target:"Realign fan blade"}]}},{code:"CH79",category:"Outdoor",desc:"Fan operation failure — position sensor",action:"Fan first position sensor failure. Check fan motor and sensor.",details:{meaning:"The fan motor position sensor (Hall sensor) is not providing valid feedback. The controller can't confirm fan speed or rotation.",causes:[{rank:1,text:"Hall sensor in motor failed"},{rank:2,text:"Motor connector loose"},{rank:3,text:"Motor not spinning"}],checks:["Check motor connector","Verify fan is spinning","If fan spins but no feedback, Hall sensor has failed"],branches:[{condition:"Hall sensor failed",target:"Replace fan motor (sensor is internal)"}]}},{code:"CH86",category:"Outdoor",desc:"Main PCB EPROM error",action:"Verify EPROM present and seated correctly. Check pins and notch alignment.",details:{meaning:"The main outdoor PCB can't read its EPROM. Same issue as CH60 but on the main board instead of the inverter board.",causes:[{rank:1,text:"EPROM not seated properly"},{rank:2,text:"EPROM corrupted"},{rank:3,text:"Pins corroded"}],checks:["Check EPROM seating and notch alignment","Reseat and power cycle","Replace EPROM or PCB if corrupted"],branches:[{condition:"EPROM loose",target:"Reseat correctly"},{condition:"Corrupted",target:"Replace main PCB"}]}},{code:"CH87",category:"Outdoor",desc:"Fan PCB EPROM error",action:"Communication error between fan MICOM and EPROM. Verify EPROM seated correctly.",details:{meaning:"The fan control PCB can't read its EPROM — firmware/configuration data unavailable for fan speed control.",causes:[{rank:1,text:"EPROM not seated"},{rank:2,text:"EPROM corrupted"}],checks:["Check EPROM seating on fan PCB","Reseat and power cycle"],branches:[{condition:"EPROM issue",target:"Reseat or replace fan PCB EPROM"}]}},{code:"CH104",category:"System",desc:"Communication error between master and slave outdoor units",action:"Master PCB not receiving signals from slave units. Check inter-unit communication wiring.",details:{meaning:"In multi-outdoor unit systems, the master outdoor unit can't communicate with one or more slave units. Each outdoor module must be connected via inter-unit communication wiring.",causes:[{rank:1,text:"Inter-unit communication cable disconnected"},{rank:2,text:"Master/slave address settings incorrect"},{rank:3,text:"Slave unit not powered"}],checks:["Check inter-unit communication wiring at all outdoor modules","Verify master/slave DIP switch settings","Verify all slave units are powered"],branches:[{condition:"Cable fault",target:"Repair inter-unit communication wiring"},{condition:"Address wrong",target:"Correct master/slave settings"}]}},{code:"CH105",category:"Outdoor",desc:"Fan PCB communication error",action:"Main PCB not receiving signal from fan PCB. Check cable connections.",details:{meaning:"The main outdoor PCB and the fan control PCB can't communicate. The cable between them is likely loose or damaged.",causes:[{rank:1,text:"Cable loose between main and fan PCBs"},{rank:2,text:"Cable damaged"},{rank:3,text:"PCB fault"}],checks:["Reseat cable at both ends","Inspect cable for damage"],branches:[{condition:"Cable issue",target:"Reseat or replace cable"}]}},{code:"CH106",category:"Outdoor",desc:"Fan IPM error — instant overcurrent",action:"Instant overcurrent peak at fan IPM. Check fan motor and IPM board.",details:{meaning:"The fan IPM detected an instantaneous overcurrent spike — the fan motor driver experienced a current surge that exceeded protection limits.",causes:[{rank:1,text:"Fan motor winding short"},{rank:2,text:"Fan IPM on PCB failed"},{rank:3,text:"Fan motor bearing seized"}],checks:["Check fan motor winding resistance","Spin fan by hand","Inspect fan IPM for burn marks"],branches:[{condition:"Motor shorted",target:"Replace fan motor, then check IPM"},{condition:"IPM burned",target:"Replace fan PCB — verify motor is good first"}]}},{code:"CH107",category:"Outdoor",desc:"Fan DC link low voltage",action:"Fan inverter capacitor fault. DC link voltage <50V for 250μs. Check DC link and capacitor.",details:{meaning:"The fan inverter's DC bus voltage dropped below 50V for 250μs — the fan drive capacitors can't maintain voltage. Similar to CH23 but specific to the fan circuit.",causes:[{rank:1,text:"Fan circuit DC link capacitor degraded"},{rank:2,text:"Power supply issue"}],checks:["Inspect fan circuit DC link capacitors — bulging?","Check power supply stability"],branches:[{condition:"Capacitor bad",target:"Replace capacitor"}]}},{code:"CH113",category:"Outdoor",desc:"Liquid pipe temperature sensor error",action:"Thermistor disconnected or shorted. Check connection on outdoor PCB.",details:{meaning:"The outdoor liquid pipe thermistor is out of range.",causes:[{rank:1,text:"Connector disconnected"},{rank:2,text:"Thermistor failed"}],checks:["Check connector on PCB","Measure resistance"],branches:[{condition:"Open or short",target:"Replace thermistor"}]}},{code:"CH114",category:"Outdoor",desc:"Subcooling inlet temperature sensor error",action:"Thermistor disconnected or shorted. Check connection on outdoor PCB.",details:{meaning:"The subcooling circuit inlet thermistor is out of range.",causes:[{rank:1,text:"Connector disconnected"},{rank:2,text:"Thermistor failed"}],checks:["Check connector on PCB","Measure resistance"],branches:[{condition:"Open or short",target:"Replace thermistor"}]}},{code:"CH115",category:"Outdoor",desc:"Subcooling outlet temperature sensor error",action:"Thermistor disconnected or shorted. Check connection on outdoor PCB.",details:{meaning:"The subcooling circuit outlet thermistor is out of range.",causes:[{rank:1,text:"Connector disconnected"},{rank:2,text:"Thermistor failed"}],checks:["Check connector on PCB","Measure resistance"],branches:[{condition:"Open or short",target:"Replace thermistor"}]}},{code:"CH116",category:"Outdoor",desc:"Low oil level or oil level sensor error",action:"Low oil levels or oil level sensor disconnected/shorted. Check oil sight glass and sensor.",details:{meaning:"The compressor oil level is low or the oil level sensor has failed. Low oil can cause compressor bearing damage. Check the sight glass — oil should be visible at the indicated level.",causes:[{rank:1 rmal contact with the evaporator outlet pipe. The sensor reading does not match expected refrigerant behavior, indicating it has come loose.",causes:[{rank:1,text:"Thermistor clamp loosened or fell off the pipe"},{rank:2,text:"Insulation tape deteriorated, allowing sensor to shift"},{rank:3,text:"Sensor was never properly secured during installation"}],checks:["Locate the EVA OUT sensor on the evaporator outlet pipe — verify it is firmly clamped","Clean the pipe surface and apply thermal paste before reattaching","Secure with a metal clamp and wrap with insulation tape"],branches:[{condition:"If sensor is loose or fallen off",target:"Reattach with thermal paste, clamp, and insulation — error should clear"},{condition:"If sensor appears attached but error persists",target:"Check thermistor resistance to rule out E123 sensor failure"}]}},{code:"E130",category:"Indoor",desc:"Heat exchanger sensor detachment",action:"Reattach sensor to heat exchanger. Secure with clamp and insulation.",details:{meaning:"A temperature sensor mounted on the indoor heat exchanger has become detached. The system detects this when sensor readings do not track with expected coil temperatures during operation.",causes:[{rank:1,text:"Sensor clamp loosened due to vibration or thermal cycling"},{rank:2,text:"Insulation wrap deteriorated or missing"},{rank:3,text:"Sensor was improperly mounted during installation"}],checks:["Locate the heat exchanger sensor and verify it is firmly attached to the coil or pipe","Clean the mounting surface and apply thermal paste","Reattach with proper clamp and wrap with insulation tape"],branches:[{condition:"If sensor is loose",target:"Reattach securely with clamp and insulation — power cycle to clear"},{condition:"If error persists after reattachment",target:"Check thermistor resistance — sensor may have failed"}]}},{code:"E135",category:"Indoor",desc:"Indoor cleaning fan RPM feedback failure",action:"Check fan motor connector and wiring. Verify fan blade rotates freely. Replace motor if faulty.",details:{meaning:"The indoor unit's cleaning fan (auto-clean function) is not returning a valid RPM feedback signal. The PCB commands the fan to spin but receives no tachometer pulse, indicating the fan is not rotating or the feedback circuit is faulty.",causes:[{rank:1,text:"Cleaning fan motor connector disconnected from PCB"},{rank:2,text:"Fan blade physically obstructed — lint, debris, or foreign object"},{rank:3,text:"Fan motor failed — bearings seized or winding open"}],checks:["Check fan motor connector on the indoor PCB — reseat firmly","Verify the fan blade rotates freely by hand","Listen for motor hum without rotation — indicates seized bearing"],branches:[{condition:"If blade is obstructed",target:"Clear obstruction and power cycle unit"},{condition:"If motor does not spin with power applied",target:"Replace cleaning fan motor"}]}},{code:"E151",category:"Indoor",desc:"EEV opening error (2nd detection)",action:"Electronic expansion valve failed to open. Check EEV coil resistance and wiring. Replace EEV if faulty.",details:{meaning:"The electronic expansion valve (EEV) has failed to open on the second detection attempt. This is a confirmed fault — the system first detected the issue as E703 (1st detection) and the EEV still failed to respond on retry. The EEV is stuck closed or the drive circuit is faulty.",causes:[{rank:1,text:"EEV coil wiring disconnected or broken"},{rank:2,text:"EEV mechanically stuck closed — debris or corrosion in valve body"},{rank:3,text:"EEV coil burned out — measure coil resistance"},{rank:4,text:"Indoor PCB EEV driver circuit failure"}],checks:["Check EEV coil connector on indoor PCB — verify secure connection","Measure EEV coil resistance (typically 30-60Ω depending on model)","Check for 12VDC signal at EEV coil during operation command","If coil and wiring are good, the valve body may need replacement"],branches:[{condition:"If coil resistance is open or very low",target:"Replace EEV coil or complete EEV assembly"},{condition:"If coil is good but valve does not respond",target:"Replace complete EEV — valve body is stuck internally"},{condition:"If no drive signal from PCB",target:"Replace indoor PCB"}]}},{code:"E152",category:"Indoor",desc:"EEV closing error (2nd detection)",action:"Electronic expansion valve failed to close. Check EEV coil and wiring. Check for debris in valve.",details:{meaning:"The electronic expansion valve has failed to close on the second detection attempt. This is a confirmed fault — the system first detected the issue as E702 (1st detection) and the EEV still failed to close on retry. A stuck-open EEV can cause liquid flood-back to the compressor.",causes:[{rank:1,text:"EEV mechanically stuck open — debris or contaminant in valve seat"},{rank:2,text:"EEV coil wiring disconnected or broken"},{rank:3,text:"EEV coil burned out"},{rank:4,text:"Indoor PCB EEV driver circuit failure"}],checks:["Check EEV coil connector on indoor PCB","Measure EEV coil resistance (typically 30-60Ω)","Verify EEV closes when commanded — monitor pipe temperatures for temperature change","Check for system contamination that could lodge in valve seat"],branches:[{condition:"If coil resistance is out of range",target:"Replace EEV coil or complete EEV assembly"},{condition:"If coil is good but valve stays open",target:"Replace complete EEV — debris or damage in valve body"}]}},{code:"E153",category:"Indoor",desc:"Float switch error — condensate overflow (2nd detection)",action:"Check condensate drain line for blockage. Verify float switch operation. Check drain pump if equipped.",details:{meaning:"The condensate float switch has tripped for the second time, indicating persistent condensate overflow. The drain pan water level is too high, which means condensate is not draining properly. The unit shuts down to prevent water damage.",causes:[{rank:1,text:"Condensate drain line clogged — algae, sludge, or debris blockage"},{rank:2,text:"Condensate pump failed or not running (if equipped)"},{rank:3,text:"Drain line not properly sloped — trapped or sagging section"},{rank:4,text:"Float switch stuck in tripped position"}],checks:["Check condensate drain line for blockage — blow out with nitrogen or use wet/dry vac","Verify drain pan is not full of standing water","Test float switch operation manually — should toggle freely","If pump-equipped, verify pump operates when float rises"],branches:[{condition:"If drain is clogged",target:"Clear drain line, flush with water, and treat with algae tablets"},{condition:"If pump is not running",target:"Check pump power, float switch, and replace pump if faulty"},{condition:"If float switch is stuck",target:"Clean or replace float switch assembly"}]}},{code:"E154",category:"Indoor",desc:"Indoor fan RPM feedback error",action:"Fan motor not spinning or RPM signal lost. Check motor connector, wiring, and blade obstruction.",details:{meaning:"The indoor blower fan motor is not returning a valid RPM feedback signal to the PCB. The motor is either not spinning or the tachometer signal wire is faulty. Without fan operation, the unit cannot deliver conditioned air.",causes:[{rank:1,text:"Fan motor connector disconnected from indoor PCB"},{rank:2,text:"Fan blade physically obstructed — ice, debris, or foreign object"},{rank:3,text:"Fan motor bearings seized or motor winding failed"},{rank:4,text:"PCB fan output circuit failure"}],checks:["Check fan motor connector on PCB — verify all pins seated","Spin fan blade by hand to check for free rotation","Measure motor winding resistance between motor leads","Check for voltage output from PCB to motor during run command"],branches:[{condition:"If blade is obstructed",target:"Clear obstruction and power cycle"},{condition:"If motor hums but does not spin",target:"Replace fan motor — bearings or winding failure"},{condition:"If no voltage from PCB",target:"Replace indoor PCB"}]}},{code:"E161",category:"Indoor",desc:"Mixed operation mode conflict (cool/heat)",action:"Indoor units on same refrigerant circuit requesting different modes. Verify system mode settings.",details:{meaning:"Indoor units connected to the same outdoor unit (refrigerant circuit) are requesting conflicting modes — some want cooling while others want heating. In a 2-pipe VRF system, all indoor units on the same circuit must operate in the same mode. Heat recovery (3-pipe) systems handle this differently.",causes:[{rank:1,text:"Individual controllers set to different modes (cool vs heat) on a 2-pipe system"},{rank:2,text:"Auto mode selecting different modes on different units based on setpoint"},{rank:3,text:"System mode priority setting not configured correctly"}],checks:["Check all indoor unit controller mode settings on this refrigerant circuit","Set all units to the same mode or use centralized mode control","Verify if this is a 2-pipe (heat pump) or 3-pipe (heat recovery) system"],branches:[{condition:"If 2-pipe system",target:"Set all indoor units to the same mode — use master controller for group mode"},{condition:"If 3-pipe heat recovery system",target:"Check BS box solenoid valves and piping — mixed mode should be supported"}]}},{code:"E162",category:"Indoor",desc:"MICOM EEPROM physical failure",action:"Indoor PCB EEPROM damaged. Replace indoor unit PCB.",details:{meaning:"The indoor unit PCB microcomputer's EEPROM (non-volatile memory) has physically failed. The EEPROM stores configuration data, operating parameters, and fault history. When it cannot be read or written, the unit cannot operate.",causes:[{rank:1,text:"EEPROM chip failure due to age or power surge"},{rank:2,text:"PCB damage from moisture intrusion or corrosion"},{rank:3,text:"Manufacturing defect in the EEPROM IC"}],checks:["Power cycle the indoor unit — remove power for 30 seconds and restart","If error persists after power cycle, PCB replacement is required","Record all field settings before replacing PCB — they will need to be reprogrammed"],branches:[{condition:"If error clears after power cycle",target:"Monitor unit — intermittent EEPROM issues may recur"},{condition:"If error persists",target:"Replace indoor PCB and reprogram all field settings"}]}},{code:"E163",category:"Indoor",desc:"Remote controller option setting incorrect",action:"Verify wired controller DIP switch and option settings match indoor unit configuration.",details:{meaning:"The wired remote controller's option or DIP switch settings do not match the indoor unit's expected configuration. The controller and indoor unit must agree on group settings, address, and function assignments.",causes:[{rank:1,text:"Controller DIP switch settings changed accidentally or set incorrectly"},{rank:2,text:"Wrong controller model installed for this indoor unit type"},{rank:3,text:"Controller replaced without matching original settings"}],checks:["Compare controller DIP switch settings against installation manual requirements","Verify controller model is compatible with the indoor unit","Check master/slave controller designation if multiple controllers are wired"],branches:[{condition:"If DIP switches are wrong",target:"Correct DIP switch settings per installation manual and power cycle"},{condition:"If controller model is incompatible",target:"Install correct controller model for this indoor unit"}]}},{code:"E180",category:"Indoor",desc:"Simultaneous cooling/heating solenoid valve opening (1st)",action:"Both solenoid valves energized simultaneously. Check valve wiring and indoor PCB.",details:{meaning:"Both the cooling and heating solenoid valves on the indoor unit have been detected as open simultaneously. In a heat recovery system, only one should be energized at a time. This is a first detection — if it recurs, it becomes a lockout fault.",causes:[{rank:1,text:"Solenoid valve wiring crossed or shorted together"},{rank:2,text:"Indoor PCB relay or driver circuit stuck — both outputs energized"},{rank:3,text:"Solenoid valve mechanically stuck open"}],checks:["Check solenoid valve wiring at the indoor PCB — verify correct terminals","Measure voltage at each solenoid coil individually during mode operation","Verify PCB relay outputs — only one should be energized at a time"],branches:[{condition:"If wiring is crossed",target:"Correct solenoid valve wiring to proper PCB terminals"},{condition:"If PCB outputs are both energized",target:"Replace indoor PCB — relay driver circuit failure"}]}},{code:"E185",category:"Indoor",desc:"Cross-wiring between communication and power cables",action:"Communication and power cables swapped. Rewire correctly — comm cable to F1/F2, power to L/N.",details:{meaning:"The indoor unit has detected that communication cables and power cables are swapped — line voltage is present on communication terminals or vice versa. This is a serious wiring error that can damage PCBs if not corrected immediately.",causes:[{rank:1,text:"Installer connected power cable to F1/F2 communication terminals"},{rank:2,text:"Communication cable connected to power terminals L/N"},{rank:3,text:"Cables labeled incorrectly at the junction or distribution point"}],checks:["DISCONNECT POWER IMMEDIATELY before inspecting wiring","Verify communication cable connects to F1/F2 terminals at both indoor and outdoor units","Verify power cable connects to L/N (or appropriate power) terminals","Check cable labeling at all junction points"],branches:[{condition:"If cables are swapped",target:"Correct wiring immediately — power to L/N, communication to F1/F2. Inspect PCBs for damage before re-energizing"},{condition:"If PCB damaged from cross-wiring",target:"Replace damaged PCB after correcting wiring"}]}},{code:"E186",category:"Indoor",desc:"SPI connection problem",action:"Internal PCB serial communication fault. Check PCB connectors. Replace PCB if persistent.",details:{meaning:"The SPI (Serial Peripheral Interface) bus on the indoor PCB has a communication fault. This is an internal PCB-to-PCB or chip-to-chip communication issue, not related to external wiring between units.",causes:[{rank:1,text:"Internal ribbon cable or connector between PCB sections is loose"},{rank:2,text:"PCB component failure — SPI controller IC damaged"},{rank:3,text:"Moisture or corrosion on PCB affecting circuit traces"}],checks:["Power cycle the indoor unit — remove power for 30 seconds","Check all internal ribbon cables and connectors on the indoor PCB","Inspect PCB for signs of moisture damage, corrosion, or burnt components"],branches:[{condition:"If error clears after power cycle",target:"Monitor unit — may be intermittent connector issue"},{condition:"If error persists",target:"Replace indoor PCB"}]}},{code:"E190",category:"Indoor",desc:"No temperature change during pipe inspection",action:"EVA IN temp didn't change during auto pipe pairing. Check refrigerant piping and EEV operation.",details:{meaning:"During the automatic pipe inspection (auto pipe pairing) process, the EVA IN temperature sensor did not detect the expected temperature change. This means refrigerant is not flowing through this indoor unit's coil when the system expected it to.",causes:[{rank:1,text:"EEV not opening during pipe inspection — stuck closed or wiring fault"},{rank:2,text:"Refrigerant piping not connected to this indoor unit"},{rank:3,text:"Service valve closed on the liquid or gas line"},{rank:4,text:"EVA IN sensor detached — not reading actual pipe temperature"}],checks:["Verify refrigerant piping is connected and service valves are open","Check EEV operation — listen for stepping motor clicks during pipe inspection","Verify EVA IN sensor is firmly attached to the pipe","Re-run auto pipe pairing after correcting any issues"],branches:[{condition:"If piping is not connected",target:"Complete piping installation, pressure test, evacuate, and re-run pipe pairing"},{condition:"If EEV is not responding",target:"Check EEV coil and wiring — resolve before re-running pipe inspection"}]}},{code:"E191",category:"Indoor",desc:"No EVA OUT temperature change during pipe inspection",action:"EVA OUT temp didn't change during auto pipe pairing. Check refrigerant piping connections.",details:{meaning:"During auto pipe pairing, the EVA OUT temperature sensor did not detect the expected temperature change. Refrigerant is not flowing through the evaporator outlet of this indoor unit as expected.",causes:[{rank:1,text:"Refrigerant piping not connected or gas-side service valve closed"},{rank:2,text:"EEV not opening properly during pipe inspection"},{rank:3,text:"EVA OUT sensor detached — not reading actual pipe temperature"},{rank:4,text:"Refrigerant restriction in the indoor coil"}],checks:["Verify gas-side piping is connected and service valves are fully open","Check EVA OUT sensor is firmly attached to the outlet pipe","Verify EEV operation during pipe inspection mode","Re-run auto pipe pairing after corrections"],branches:[{condition:"If piping issue found",target:"Correct piping and re-run auto pipe pairing"},{condition:"If sensor is detached",target:"Reattach EVA OUT sensor and re-run pipe inspection"}]}},{code:"E198",category:"Indoor",desc:"Thermal fuse disconnection",action:"Indoor unit thermal fuse open. Check for overheating condition. Replace fuse after finding root cause.",details:{meaning:"The indoor unit's thermal fuse has opened, indicating an overheating condition was detected. The thermal fuse is a one-time safety device that blows when temperature exceeds its rated limit, protecting against fire or component damage.",causes:[{rank:1,text:"Blocked airflow — dirty filter, obstructed return or supply"},{rank:2,text:"Fan motor failure causing heat buildup in the unit"},{rank:3,text:"Electrical short or high-resistance connection causing localized heating"},{rank:4,text:"Thermal fuse degraded and tripped at lower than rated temperature"}],checks:["Check for blocked airflow — clean or replace air filters, verify no obstructions","Verify fan motor operates properly","Inspect wiring for signs of overheating, melting, or discoloration","Find and address the root cause of overheating BEFORE replacing the thermal fuse"],branches:[{condition:"If airflow was blocked",target:"Clear blockage, replace thermal fuse, and monitor operation"},{condition:"If wiring shows heat damage",target:"Repair or replace damaged wiring, then replace thermal fuse"},{condition:"If no obvious cause found",target:"Replace thermal fuse and monitor closely — check all electrical connections for tightness"}]}},// ── Communication / System ──
{code:"E201",category:"System",desc:"Communication error between indoor and outdoor units",action:"Installation number mismatch or cable fault. Verify MCU address settings. Check comm cable F1/F2 connections at all units.",details:{meaning:"Indoor-to-outdoor communication link lost due to address mismatch or wiring fault on the F1/F2 bus.",causes:[{rank:1,text:"MCU address rotary switch set incorrectly"},{rank:2,text:"F1/F2 communication cable damaged, loose, or reversed"},{rank:3,text:"Outdoor PCB communication circuit failure"}],checks:["Verify MCU rotary switch address matches system design","Inspect F1/F2 cable connections at indoor and outdoor terminals","Measure F1/F2 voltage (~12V DC idle)","Check for cable damage or EMI near power wiring"],branches:[{condition:"If address mismatch found",target:"→ Correct rotary switch and power cycle"},{condition:"If wiring and address OK",target:"→ Replace outdoor main PCB"}]}},{code:"E202",category:"System",desc:"All indoor units communication failure",action:"Complete communication loss. Check main comm bus, outdoor unit PCB, and power supply to outdoor unit.",details:{meaning:"Outdoor unit has lost communication with every indoor unit on the system bus simultaneously.",causes:[{rank:1,text:"Main F1/F2 communication bus trunk cable severed or disconnected"},{rank:2,text:"Outdoor unit PCB communication circuit failure"},{rank:3,text:"Power loss to outdoor unit causing comm chip reset"}],checks:["Check F1/F2 trunk cable from outdoor unit to first junction","Verify outdoor unit has stable power supply","Inspect outdoor PCB for burnt components near comm terminals","Check for comm bus short circuit (F1 to F2 shorted)"],branches:[{condition:"If trunk cable is damaged",target:"→ Repair or replace main F1/F2 bus cable"},{condition:"If cable OK but no comm output from outdoor",target:"→ Replace outdoor main PCB"}]}},{code:"E203",category:"System",desc:"Main and sub outdoor unit communication error",action:"Master-slave outdoor comm failure. Check inter-unit communication cable. Verify address settings.",details:{meaning:"Communication between master and slave outdoor units in a multi-module system has failed.",causes:[{rank:1,text:"Inter-unit communication cable between outdoor modules disconnected"},{rank:2,text:"Address conflict — multiple units set as master"},{rank:3,text:"Slave outdoor unit PCB fault"}],checks:["Check inter-unit comm cable connections between all outdoor modules","Verify only one outdoor unit is set as master (rotary switch 0)","Confirm each slave has unique address (1, 2, 3...)","Power cycle all outdoor modules in sequence"],branches:[{condition:"If cable loose or damaged",target:"→ Reseat or replace inter-unit comm cable"},{condition:"If address conflict exists",target:"→ Correct rotary switch settings and power cycle"}]}},{code:"E205",category:"System",desc:"C-Box PBA communication cable error",action:"Branch selector box communication fault. Check wiring between outdoor unit and branch selector box.",details:{meaning:"Communication between outdoor unit and branch selector (BS) box has failed.",causes:[{rank:1,text:"Communication cable between outdoor unit and BS box disconnected"},{rank:2,text:"BS box PCB fault"},{rank:3,text:"Incorrect BS box address settings"}],checks:["Check comm cable from outdoor unit to BS box — reseat connectors","Verify BS box has power (LED indicators on PCB)","Confirm BS box address DIP switches match installation design","Inspect cable for damage or pinching"],branches:[{condition:"If BS box has no power",target:"→ Check BS box power supply wiring"},{condition:"If cable and power OK",target:"→ Replace BS box PCB"}]}},{code:"E206",category:"System",desc:"HUB, FAN, or INV PBA communication error",action:"Internal outdoor PCB communication failure. Check ribbon cables and connectors between PCBs.",details:{meaning:"Internal serial communication between outdoor unit main PCB and sub-boards (HUB, fan controller, or inverter) has failed.",causes:[{rank:1,text:"Ribbon cable between PCBs loose or damaged"},{rank:2,text:"Sub-board (HUB, FAN, or INV PBA) failure"},{rank:3,text:"Main outdoor PCB communication port failure"}],checks:["Reseat all ribbon cables between main PCB and sub-boards","Check for bent or corroded connector pins","Look for water ingress or burnt components on sub-boards","Power cycle outdoor unit after reseating cables"],branches:[{condition:"If ribbon cable damaged",target:"→ Replace ribbon cable"},{condition:"If cable OK but fault persists",target:"→ Identify failing sub-board and replace it"}]}},{code:"E211",category:"System",desc:"Single indoor unit using non-series MCU ports",action:"MCU port configuration mismatch. Verify MCU port switch matches physical installation.",details:{meaning:"An indoor unit is connected to an MCU port that does not match the series configuration. Ports must be used sequentially.",causes:[{rank:1,text:"Indoor unit connected to wrong MCU port number"},{rank:2,text:"MCU port DIP switch set to non-sequential port"},{rank:3,text:"Wiring routed to wrong MCU terminal"}],checks:["Verify which MCU port the indoor unit is physically wired to","Check MCU port switch settings match physical connections","Ensure ports are used in series (no gaps in port numbering)"],branches:[{condition:"If wrong port used",target:"→ Rewire to correct sequential MCU port"},{condition:"If wiring correct",target:"→ Adjust MCU port switch settings to match"}]}},{code:"E212",category:"System",desc:"MCU address rotary switch duplicated (3+ same)",action:"Three or more MCUs with identical address. Reset rotary switches to unique values.",details:{meaning:"Three or more MCU controllers share the same rotary switch address, causing address collision on the communication bus.",causes:[{rank:1,text:"Installer set multiple MCU rotary switches to same value"},{rank:2,text:"Rotary switch not properly clicked into position"}],checks:["Check rotary switch position on every MCU in the system","Verify each MCU has a unique address value","Ensure switches are firmly clicked into correct detent position"],branches:[{condition:"If duplicates found",target:"→ Set each MCU to unique address and power cycle system"}]}},{code:"E213",category:"System",desc:"Indoor unit assignment mismatch / pipe pairing incomplete",action:"Auto pipe pairing not completed or failed. Re-run auto pipe pairing (K2 button x13). E213 = pairing not done.",details:{meaning:"Auto pipe pairing has not been completed, so the outdoor unit cannot identify which indoor units connect to which refrigerant ports.",causes:[{rank:1,text:"Auto pipe pairing never run after installation"},{rank:2,text:"Pipe pairing failed due to communication or EEV issue"},{rank:3,text:"Indoor unit added or replaced without re-running pairing"}],checks:["Check if auto pipe pairing has been completed (field setting menu)","Verify all indoor units are powered and communicating","Confirm EEV operation on each indoor unit before pairing"],branches:[{condition:"If pairing never done",target:"→ Run auto pipe pairing: press K2 button 13 times"},{condition:"If pairing fails repeatedly",target:"→ Check for EEV or communication faults on individual indoor units first"}]}},{code:"E215",category:"System",desc:"Multiple MCUs with identical address values",action:"Duplicate MCU addresses detected. Verify each MCU has unique rotary switch setting.",details:{meaning:"Two MCU controllers share the same address, causing a bus conflict.",causes:[{rank:1,text:"Two MCU rotary switches set to same value"},{rank:2,text:"Rotary switch moved or bumped during installation"}],checks:["Inspect rotary switch on each MCU in the system","Verify each MCU address is unique per the installation diagram","Confirm switches are in correct detent position"],branches:[{condition:"If duplicate found",target:"→ Change one MCU to unique address and power cycle"}]}},{code:"E216",category:"System",desc:"MCU port switch ON but no indoor unit installed",action:"MCU port enabled for a non-existent indoor unit. Turn OFF unused MCU port switches.",details:{meaning:"An MCU port is switched ON but no indoor unit is physically connected to it.",causes:[{rank:1,text:"MCU port switch left ON from a previous configuration"},{rank:2,text:"Indoor unit removed but port switch not updated"},{rank:3,text:"Wrong port switch toggled during setup"}],checks:["Identify which MCU port switches are ON","Cross-reference with actually installed indoor units","Turn OFF any port switch that has no connected indoor unit"],branches:[{condition:"If extra port is ON",target:"→ Turn OFF the unused MCU port switch and power cycle"}]}},{code:"E217",category:"System",desc:"Indoor unit installed but MCU port switch OFF",action:"MCU port not enabled for connected indoor unit. Turn ON the corresponding MCU port switch.",details:{meaning:"An indoor unit is physically connected but its MCU port switch is OFF, so the system ignores it.",causes:[{rank:1,text:"MCU port switch not turned ON during commissioning"},{rank:2,text:"New indoor unit added without updating port switches"}],checks:["Identify which indoor unit is not being recognized","Locate its MCU port and verify the switch position","Turn ON the corresponding MCU port switch"],branches:[{condition:"If port switch is OFF for a connected unit",target:"→ Turn ON the MCU port switch and power cycle"}]}},// ── Outdoor Sensors ──
{code:"E221",category:"Outdoor",desc:"Outdoor ambient temperature sensor error",action:"Outdoor temp thermistor disconnected or shorted. Check connector on outdoor main PCB.",details:{meaning:"The outdoor ambient temperature thermistor is reading open or shorted. The unit uses this sensor for defrost timing, capacity control, and operating limit decisions.",causes:[{rank:1,text:"Thermistor connector loose or disconnected at outdoor main PCB"},{rank:2,text:"Thermistor wire damaged — rodent chew, UV degradation, or pinched"},{rank:3,text:"Thermistor failed open or shorted internally"}],checks:["Check thermistor connector on outdoor main PCB — reseat firmly","Measure thermistor resistance — should be ~10kΩ at 25°C (NTC type)","Inspect wiring for damage between sensor and PCB"],branches:[{condition:"Resistance out of range or infinite/zero",target:"Replace outdoor ambient thermistor"},{condition:"Resistance normal but fault persists",target:"Check PCB connector pins for corrosion — replace outdoor PCB if faulty"}]}},{code:"E231",category:"Outdoor",desc:"Condenser outlet temperature sensor error",action:"COND OUT thermistor fault. Check connection on outdoor PCB.",details:{meaning:"The condenser outlet pipe temperature thermistor is reading open or shorted. This sensor monitors subcooling and condenser performance.",causes:[{rank:1,text:"Thermistor connector loose or disconnected at outdoor PCB"},{rank:2,text:"Thermistor wire damaged or corroded"},{rank:3,text:"Thermistor failed internally"}],checks:["Check thermistor connector on outdoor PCB — reseat","Measure thermistor resistance — should be ~10kΩ at 25°C","Inspect wire harness for damage"],branches:[{condition:"Resistance open or shorted",target:"Replace condenser outlet thermistor"},{condition:"Wiring and sensor OK",target:"Check outdoor PCB connector — replace PCB if input circuit faulty"}]}},{code:"E241",category:"Outdoor",desc:"Condenser outlet sensor detached from pipe",action:"Reattach COND OUT sensor to pipe. Secure with clamp and insulation.",details:{meaning:"The condenser outlet thermistor has come loose from the pipe, causing inaccurate temperature readings. The unit detects this when sensor readings do not track expected pipe temperatures.",causes:[{rank:1,text:"Sensor clamp loosened from vibration"},{rank:2,text:"Insulation tape deteriorated, sensor fell off pipe"},{rank:3,text:"Sensor never properly attached during installation"}],checks:["Locate the COND OUT sensor on the condenser outlet pipe","Verify sensor bulb is in full contact with the pipe surface","Reattach with proper clamp and wrap with insulation tape"],branches:[{condition:"Sensor physically detached",target:"Reattach sensor firmly to pipe with clamp and insulation"},{condition:"Sensor attached but fault persists",target:"Check thermistor resistance — may need replacement"}]}},{code:"E251",category:"Outdoor",desc:"Compressor 1 discharge temperature sensor error",action:"Discharge thermistor disconnected or shorted. Check connector on outdoor PCB.",details:{meaning:"The compressor 1 discharge pipe temperature thermistor is reading open or shorted. This sensor protects the compressor from overheating by monitoring discharge gas temperature.",causes:[{rank:1,text:"Thermistor connector loose at outdoor PCB"},{rank:2,text:"Thermistor wire damaged by heat near discharge pipe"},{rank:3,text:"Thermistor failed from prolonged high-temperature exposure"}],checks:["Check thermistor connector on outdoor PCB — reseat","Measure thermistor resistance — compare to temp/resistance chart","Inspect wire routing near hot discharge pipe for heat damage"],branches:[{condition:"Resistance open or shorted",target:"Replace discharge temperature thermistor"},{condition:"Connector corroded",target:"Clean or replace connector — check PCB pins"}]}},{code:"E257",category:"Outdoor",desc:"Compressor 2 discharge temperature sensor error",action:"Second compressor discharge thermistor fault. Check connector on outdoor PCB.",details:{meaning:"The compressor 2 discharge pipe temperature thermistor is reading open or shorted. Same function as E251 but for the second compressor in dual-compressor outdoor units.",causes:[{rank:1,text:"Thermistor connector loose at outdoor PCB"},{rank:2,text:"Thermistor wire damaged by heat near discharge pipe"},{rank:3,text:"Thermistor failed from prolonged high-temperature exposure"}],checks:["Check thermistor connector on outdoor PCB — reseat","Measure thermistor resistance — compare to temp/resistance chart","Inspect wire routing near hot discharge pipe for heat damage"],branches:[{condition:"Resistance open or shorted",target:"Replace comp 2 discharge thermistor"},{condition:"Connector corroded",target:"Clean or replace connector — check PCB pins"}]}},{code:"E262",category:"Outdoor",desc:"Compressor 1 discharge sensor detached",action:"Reattach discharge thermistor to compressor discharge pipe. Secure firmly.",details:{meaning:"The compressor 1 discharge thermistor has come loose from the pipe. The unit detects abnormal temperature tracking, indicating the sensor is not in proper contact with the discharge line.",causes:[{rank:1,text:"Sensor clamp loosened from vibration"},{rank:2,text:"Insulation deteriorated and sensor separated from pipe"}],checks:["Locate discharge thermistor on compressor 1 discharge pipe","Verify sensor bulb is clamped firmly against pipe surface","Reattach with clamp and wrap with insulation"],branches:[{condition:"Sensor detached",target:"Reattach firmly with clamp and insulation tape"},{condition:"Sensor attached but fault persists",target:"Check thermistor resistance — replace if faulty"}]}},{code:"E263",category:"Outdoor",desc:"Compressor 2 discharge sensor detached",action:"Reattach comp 2 discharge thermistor. Secure with clamp and insulation.",details:{meaning:"The compressor 2 discharge thermistor has come loose from the pipe. Same as E262 but for the second compressor.",causes:[{rank:1,text:"Sensor clamp loosened from vibration"},
