<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Field Nav — Dev Build</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; font-family: 'SF Mono', 'Fira Code', monospace; }
  #gate { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  #gate form { text-align: center; }
  #gate input { background: #1a1a2e; border: 1px solid #334155; color: #e2e8f0; padding: 12px 16px; border-radius: 8px; font-size: 16px; width: 240px; text-align: center; font-family: inherit; }
  #gate input:focus { outline: none; border-color: #60a5fa; }
  #gate button { display: block; margin: 12px auto 0; background: #2563eb; color: #fff; border: none; padding: 10px 32px; border-radius: 8px; font-size: 14px; cursor: pointer; font-family: inherit; }
  #gate .label { color: #6b7280; font-size: 11px; letter-spacing: 2px; margin-bottom: 12px; }
  #gate .err { color: #ef4444; font-size: 12px; margin-top: 8px; display: none; }
  #app { display: none; width: 100%; height: 100vh; border: none; }
</style>
</head>
<body>
<div id="gate">
  <form onsubmit="return unlock()">
    <div class="label">DEV BUILD — AUTHORIZED ONLY</div>
    <input type="password" id="pw" placeholder="Password" autofocus>
    <button type="submit">Enter</button>
    <div class="err" id="err">Wrong password</div>
  </form>
</div>
<iframe id="app"></iframe>
<script>
var K = [75,76,83,51,52,50]; // KLS342
function unlock() {
  var p = document.getElementById('pw').value;
  var k = K.map(function(c){return String.fromCharCode(c)}).join('');
  if (p === k) {
    document.getElementById('gate').style.display = 'none';
    var app = document.getElementById('app');
    app.style.display = 'block';
    app.src = 'dev-app.html';
    sessionStorage.setItem('fn_dev', '1');
  } else {
    document.getElementById('err').style.display = 'block';
  }
  return false;
}
if (sessionStorage.getItem('fn_dev') === '1') {
  document.getElementById('gate').style.display = 'none';
  var app = document.getElementById('app');
  app.style.display = 'block';
  app.src = 'dev-app.html';
}
</script>
</body>
</html>
