:"The condensate drain system triggered a fault — drain pan is full (float switch activated) or condensate pump failed. P4 = primary drain issue, P5 = secondary/overflow. Unit shuts down to prevent water damage.",causes:[{rank:1,text:"Drain line clogged — algae, debris, or sludge"},{rank:2,text:"Condensate pump failure — motor burned out or impeller stuck"},{rank:3,text:"Float switch stuck in alarm position"},{rank:4,text:"Drain pan cracked or improperly sloped"}],checks:["Check drain pan for standing water","Clear drain line with nitrogen, wet/dry vac, or cleaning solution","Test condensate pump — pour water in pan and verify pump activates","Check float switch — manually lift and lower to test"],branches:[{condition:"Drain pan full of water",target:"Clear drain line blockage — flush or vacuum"},{condition:"Pump doesn't activate",target:"Check pump power, float switch, and motor — replace if failed"},{condition:"Float switch stuck",target:"Clean or replace float switch"}]}},{code:"6755",category:"K-Control",desc:"Drain fault (P5)",action:"Check drain piping, pump, and float switch.",details:{meaning:"Secondary drain overflow detected. P5 means water reached the backup float switch — primary drain has already failed and water is backing up. More urgent than P4 — water damage may be imminent.",causes:[{rank:1,text:"Primary drain completely blocked — water bypassed to secondary"},{rank:2,text:"Primary condensate pump failed — overflow to secondary"},{rank:3,text:"Both primary and secondary drain lines clogged"},{rank:4,text:"Secondary float switch stuck or wiring issue"}],checks:["Immediately check for water damage below the unit","Clear both primary and secondary drain lines","Test primary condensate pump — likely failed first","Check both float switches — primary and secondary"],branches:[{condition:"Water actively overflowing",target:"Shut unit off, clear drains, clean up water before restarting"},{condition:"Primary pump failed",target:"Replace condensate pump, clear drain lines"},{condition:"Both drains blocked",target:"Flush both lines, install algae prevention tablets"}]}},{code:"6756",category:"K-Control",desc:"Frost protection at indoor unit (P6)",action:"Check airflow restriction or refrigerant charge.",details:{meaning:"Same as 6752 — indoor coil frost protection triggered on a different K-Control unit group. Coil temperature sensor detected freezing conditions. Root cause is inadequate heat absorption at the indoor coil.",causes:[{rank:1,text:"Dirty air filter — most common cause"},{rank:2,text:"Low refrigerant charge — coil is starved"},{rank:3,text:"Blower motor failure or reduced speed"},{rank:4,text:"Dirty indoor coil blocking airflow"},{rank:5,text:"Metering device malfunction"}],checks:["Check and clean air filter","Measure superheat at indoor coil — high superheat = starved coil","Verify blower motor speed","Inspect indoor coil for dirt or ice"],branches:[{condition:"Filter dirty",target:"Clean/replace and monitor"},{condition:"Charge low",target:"Find and repair leak, recharge"},{condition:"Blower issue",target:"Check capacitor and motor"}]}},{code:"6758",category:"K-Control",desc:"Comms fault between indoor and outdoor",action:"Check communication wiring between units.",details:{meaning:"Communication loss between K-Control indoor and outdoor units — same fault type as 6753 but different unit group. The 2-wire communication link is interrupted.",causes:[{rank:1,text:"Communication wiring loose, broken, or shorted"},{rank:2,text:"Outdoor unit power loss"},{rank:3,text:"PCB failure on indoor or outdoor unit"},{rank:4,text:"Electrical noise interference on communication wires"}],checks:["Verify outdoor unit has power","Check communication wiring connections at both ends","Test wiring continuity end-to-end","Separate communication wires from high-voltage runs"],branches:[{condition:"No power at outdoor unit",target:"Restore power — check breaker and disconnect"},{condition:"Wiring fault found",target:"Repair wiring and verify communication"},{condition:"Wiring good, both powered",target:"Check comm signal voltage — suspect PCB if absent"}]}},{code:"6761",category:"K-Control",desc:"R/A thermistor fault (P1)",action:"Check return air thermistor resistance and connection.",details:{meaning:"Return air thermistor (P1) fault on a K-Control indoor unit — different unit group than 6751, same issue. TH1 sensor reading room return air temperature is out of range, open, or shorted.",causes:[{rank:1,text:"Thermistor disconnected from PCB"},{rank:2,text:"Thermistor failed — open or shorted"},{rank:3,text:"Wiring damage between thermistor and PCB"},{rank:4,text:"PCB connector corrosion"}],checks:["Measure TH1 thermistor resistance — should be ~10kΩ at 25°C","Check connector is seated firmly on PCB","Inspect wiring for damage","Clean connector pins if corroded"],branches:[{condition:"Resistance out of range",target:"Replace return air thermistor"},{condition:"Resistance normal, connector good",target:"Replace indoor PCB"}]}},{code:"6762",category:"K-Control",desc:"TH2 fault — check resistance (P2)",action:"Check TH2 thermistor resistance. Spec: 6.4kΩ @ 20°C.",details:{meaning:"TH2 pipe/coil temperature sensor (P2 fault) is reading out of range. On K-Control units, TH2 monitors indoor coil pipe temperature for frost protection and capacity control. Important: spec resistance is 6.4kΩ at 20°C — different from the standard 10kΩ sensors on newer systems.",causes:[{rank:1,text:"TH2 thermistor failed — open or shorted"},{rank:2,text:"Thermistor connector loose on PCB"},{rank:3,text:"Thermistor not properly mounted against the coil pipe"},{rank:4,text:"Wrong replacement thermistor installed — must be 6.4kΩ type, not 10kΩ"},{rank:5,text:"Wiring damage or corrosion"}],checks:["Disconnect TH2 and measure resistance — should read 6.4kΩ at 20°C (68°F)","Verify thermistor is clamped tightly against the copper pipe with good thermal contact","Check connector is fully seated on PCB","If replaced previously, confirm the replacement is the correct 6.4kΩ type"],branches:[{condition:"Resistance wrong or open/short",target:"Replace TH2 with correct 6.4kΩ @ 20°C thermistor"},{condition:"Thermistor not clamped to pipe",target:"Re-mount with thermal paste and secure clamp"},{condition:"Wrong type installed (10kΩ)",target:"Replace with correct 6.4kΩ K-Control thermistor"}]}},{code:"6763",category:"K-Control",desc:"Comms fault between indoor and outdoor",action:"Check communication wiring between units.",details:{meaning:"Communication loss between K-Control indoor and outdoor units. Same root cause as 6753/6758 — the 2-wire serial link is interrupted. Different unit group code.",causes:[{rank:1,text:"Communication wiring broken, loose, or shorted"},{rank:2,text:"Outdoor unit not powered"},{rank:3,text:"PCB communication circuit failure"},{rank:4,text:"Electrical interference from nearby power wiring"}],checks:["Confirm outdoor unit has power","Check wiring at both terminal blocks","Test continuity on communication wires","Separate comm wires from power cables if running together"],branches:[{condition:"Outdoor unit off",target:"Restore power — check breaker and fuses"},{condition:"Wiring issue",target:"Repair and verify communication restores"},{condition:"All wiring good",target:"Check DC comm signal voltage — suspect PCB if absent"}]}},{code:"6764",category:"K-Control",desc:"Drain fault (P4 or P5)",action:"Check drain piping, pump, and float switch.",details:{meaning:"Condensate drain fault on K-Control unit — float switch activated due to full drain pan or blocked drain line. Unit shuts down to prevent water damage.",causes:[{rank:1,text:"Drain line clogged with algae or debris"},{rank:2,text:"Condensate pump failure"},{rank:3,text:"Float switch stuck in alarm position"},{rank:4,text:"Drain pan not properly sloped"}],checks:["Check drain pan for standing water","Clear drain line with nitrogen or vacuum","Test condensate pump operation","Check float switch — clean or replace if stuck"],branches:[{condition:"Pan full of water",target:"Clear drain blockage downstream"},{condition:"Pump not activating",target:"Replace condensate pump"},{condition:"Float stuck",target:"Clean or replace float switch"}]}},{code:"6765",category:"K-Control",desc:"Drain fault (P5)",action:"Check drain piping, pump, and float switch.",details:{meaning:"Secondary overflow drain fault — water reached the backup float switch. Primary drain has failed. Urgent — water damage risk.",causes:[{rank:1,text:"Primary drain completely blocked"},{rank:2,text:"Primary pump failed — overflow to secondary"},{rank:3,text:"Both drain paths blocked"},{rank:4,text:"Secondary float switch malfunction"}],checks:["Check for active water leakage below unit","Clear both primary and secondary drain lines","Test primary pump — likely the original failure","Check both float switches"],branches:[{condition:"Active water overflow",target:"Shut down unit, clear drains, clean up water"},{condition:"Primary pump dead",target:"Replace pump, clear all drain lines"},{condition:"Both drains blocked",target:"Flush both lines, install algae tablets"}]}},{code:"6766",category:"K-Control",desc:"Frost protection at indoor unit (P6)",action:"Check airflow restriction or refrigerant charge.",details:{meaning:"Frost protection trip on K-Control indoor unit — coil temperature dropped below freezing threshold due to airflow or refrigerant issues.",causes:[{rank:1,text:"Dirty filter restricting airflow"},{rank:2,text:"Low refrigerant charge"},{rank:3,text:"Blower motor issue — slow or failed"},{rank:4,text:"Dirty coil"}],checks:["Clean or replace air filter","Check superheat at indoor coil","Verify blower motor operation","Inspect coil for dirt or ice"],branches:[{condition:"Filter dirty",target:"Clean/replace and monitor"},{condition:"High superheat",target:"Check charge, find leaks if low"},{condition:"Blower problem",target:"Check capacitor and motor"}]}},{code:"6767",category:"K-Control",desc:"Comms fault between indoor and outdoor",action:"Check communication wiring between units.",details:{meaning:"Communication fault between K-Control indoor and outdoor units — 2-wire link interrupted. Different unit group code, same root cause as 6753/6758/6763.",causes:[{rank:1,text:"Wiring loose, broken, or shorted"},{rank:2,text:"Outdoor unit power loss"},{rank:3,text:"PCB comm circuit failure"},{rank:4,text:"Electrical noise interference"}],checks:["Confirm outdoor unit powered","Check wiring connections both ends","Test wire continuity","Separate from power cables"],branches:[{condition:"No outdoor power",target:"Restore power"},{condition:"Wiring fault",target:"Repair wiring"},{condition:"Wiring good",target:"Check comm signal — suspect PCB"}]}},{code:"6771",category:"K-Control",desc:"High or low pressure abnormality",action:"Check refrigerant pressures. Check for restrictions or leaks.",details:{meaning:"The outdoor unit's high-pressure or low-pressure safety tripped. On K-Control R-22 systems, this indicates the system is operating outside safe pressure limits. High pressure = condenser can't reject heat. Low pressure = evaporator is starved.",causes:[{rank:1,text:"Dirty condenser coil — high head pressure"},{rank:2,text:"Low refrigerant charge — low suction pressure"},{rank:3,text:"Condenser fan motor failure — no airflow across outdoor coil"},{rank:4,text:"Restriction in liquid line — filter drier, TXV, or kink"},{rank:5,text:"Non-condensibles in system — air or moisture"},{rank:6,text:"Pressure switch/transducer failure — false reading"}],checks:["Connect gauges — read both high and low side pressures","Check condenser coil for dirt, debris, or obstructions","Verify condenser fan is running at correct speed","Check subcooling (high side) and superheat (low side)","Feel across liquid line filter drier for temperature drop indicating restriction"],branches:[{condition:"High head pressure, dirty condenser",target:"Clean condenser coil, verify fan operation"},{condition:"Low suction pressure",target:"Check charge — look for leaks, check metering device"},{condition:"Pressures normal but switch trips",target:"Replace pressure switch or transducer"}]}},{code:"6772",category:"K-Control",desc:"Inner thermostat trip / discharge temp / overcurrent",action:"Check compressor thermostat, discharge temp, and current draw.",details:{meaning:"One of three compressor protections tripped: internal thermostat (winding overheat), discharge temperature sensor, or overcurrent protection. All indicate the compressor is being pushed beyond safe limits.",causes:[{rank:1,text:"Low refrigerant charge — compressor overheating from lack of suction gas cooling"},{rank:2,text:"Dirty condenser — high discharge temp from elevated head pressure"},{rank:3,text:"Compressor failing mechanically — high current, internal friction"},{rank:4,text:"Restriction in refrigerant circuit — high compression ratio"},{rank:5,text:"Low supply voltage causing high amperage"}],checks:["Measure compressor amp draw — compare to nameplate RLA/FLA","Check discharge line temperature — should be below 225°F (107°C) for R-22","Measure supply voltage — should be within ±10% of nameplate","Connect gauges and check operating pressures","Check condenser coil and fan operation"],branches:[{condition:"Amps exceed nameplate",target:"Check for mechanical failure, low voltage, or liquid slugging"},{condition:"Discharge temp over 225°F",target:"Check charge, condenser airflow, restrictions"},{condition:"Internal thermostat trips repeatedly",target:"Compressor may be failing — check oil, acid test"}]}},{code:"6773",category:"K-Control",desc:"Radiator plate thermostat function",action:"Check heat sink thermostat.",details:{meaning:"The heat sink (radiator plate) on the outdoor unit's inverter/power module exceeded its temperature limit. The thermostat on the heat sink tripped to protect power electronics from thermal damage.",causes:[{rank:1,text:"Insufficient airflow across heat sink — outdoor fan not running or obstructed"},{rank:2,text:"Heat sink dirty — dust insulating the fins"},{rank:3,text:"High ambient temperature combined with high load"},{rank:4,text:"Power module failing — generating excessive heat"},{rank:5,text:"Heat sink thermostat faulty — false trip"}],checks:["Verify outdoor fan is running when unit operates","Clean heat sink fins — remove dust, dirt, debris","Check for obstructions around outdoor unit","Check heat sink thermostat with multimeter — should have continuity at room temp"],branches:[{condition:"Fan not running",target:"Check fan motor, capacitor, and relay"},{condition:"Heat sink clogged",target:"Clean thoroughly and restart"},{condition:"Thermostat trips at normal temp",target:"Replace heat sink thermostat"}]}},{code:"6774",category:"K-Control",desc:"Outdoor thermistor abnormality",action:"Check outdoor thermistor resistance and connection.",details:{meaning:"An outdoor unit thermistor is reading out of range — ambient, coil, discharge, or liquid line sensor has failed open, shorted, or drifted out of spec.",causes:[{rank:1,text:"Thermistor failed open or shorted"},{rank:2,text:"Connector loose or corroded at outdoor PCB"},{rank:3,text:"Wiring damaged — weather, UV, or rodent damage"},{rank:4,text:"Wrong replacement thermistor — incorrect resistance curve"}],checks:["Identify which outdoor thermistor is faulting","Disconnect and measure resistance — compare to spec for current ambient temp","Check all thermistor connectors on outdoor PCB for corrosion","Inspect wiring for physical damage"],branches:[{condition:"Resistance out of spec",target:"Replace with correct thermistor type"},{condition:"Connector corroded",target:"Clean or replace connector, apply dielectric grease"},{condition:"Resistance correct, connector good",target:"Suspect outdoor PCB failure"}]}},{code:"6775",category:"K-Control",desc:"Pressure sensor abnormality / indoor-outdoor comm error",action:"Check pressure sensors and communication wiring.",details:{meaning:"Either a pressure transducer is reading out of range, or communication between indoor and outdoor units failed. This dual-fault code requires checking both systems.",causes:[{rank:1,text:"Pressure transducer failed or reading out of range"},{rank:2,text:"Communication wiring between indoor and outdoor faulty"},{rank:3,text:"Pressure transducer wiring damaged or connector loose"},{rank:4,text:"Schrader valve leak at transducer port"}],checks:["Connect gauges and compare actual pressure to transducer reading","Check pressure transducer wiring and connector at outdoor PCB","Check communication wiring between indoor and outdoor units","Inspect transducer port for refrigerant leak"],branches:[{condition:"Transducer reading doesn't match gauges",target:"Replace pressure transducer"},{condition:"Communication is intermittent",target:"Check and repair comm wiring"},{condition:"Leak at transducer port",target:"Replace Schrader core or transducer, recover/recharge"}]}},{code:"6776",category:"K-Control",desc:"Overcurrent shutoff",action:"Check compressor current draw and power supply.",details:{meaning:"Compressor current exceeded the overcurrent protection limit — hard shutdown. The compressor was drawing dangerously high amps due to mechanical, electrical, or extreme operating conditions.",causes:[{rank:1,text:"Compressor mechanical failure — seized bearings, broken valve reed"},{rank:2,text:"Low supply voltage — causes higher current draw"},{rank:3,text:"Liquid slugging — liquid refrigerant returning to compressor"},{rank:4,text:"High head pressure — dirty condenser or fan failure"},{rank:5,text:"Loose or corroded power connections"}],checks:["Measure compressor amps — compare to nameplate RLA","Check supply voltage at outdoor disconnect — within ±10%","Check all power connections for tightness and overheating signs","Connect gauges — check for high head pressure or liquid flood-back","Check compressor winding resistance (C-R, C-S, R-S)"],branches:[{condition:"Amps well over RLA",target:"Compressor likely failing — check windings, acid test oil"},{condition:"Low voltage",target:"Check wire sizing, connections, utility supply"},{condition:"High head pressure",target:"Clean condenser, check fan, verify no hot air recirculation"}]}},{code:"6777",category:"K-Control",desc:"System error",action:"Check system configuration and PCB.",details:{meaning:"General system error — the PCB detected an internal configuration or operational problem that doesn't fit a specific fault category. Often a PCB-level issue rather than mechanical.",causes:[{rank:1,text:"PCB failure — EEPROM corruption or processor error"},{rank:2,text:"DIP switch configuration error on PCB"},{rank:3,text:"Power surge or brownout corrupted PCB memory"},{rank:4,text:"Incompatible indoor/outdoor unit combination"}],checks:["Power cycle completely — off for 60 seconds, then restart","Check all DIP switch settings against installation manual","Verify indoor and outdoor unit compatibility","Check for surge damage — burnt components on PCB"],branches:[{condition:"Clears after power cycle",target:"Monitor — likely transient. Install surge protector"},{condition:"Persists after power cycle",target:"Check DIP switches — if correct, replace PCB"}]}},{code:"6778",category:"K-Control",desc:"Normal (informational)",action:"System operating normally. No action needed.",details:{meaning:"Informational code — K-Control system is operating normally. No fault present. May appear in M-NET fault log during startup or status queries. Confirms the unit is communicating and healthy.",causes:[{rank:1,text:"Normal operation — no fault exists"},{rank:2,text:"System completed startup sequence"},{rank:3,text:"Previous fault cleared, system returned to normal"}],checks:["No action required — normal status code","If displayed alongside other faults, investigate those instead","Verify system is conditioning the space as expected"],branches:[{condition:"System running normally",target:"No action needed"},{condition:"Not conditioning despite normal code",target:"Check thermostat settings and operating mode"}]}},{code:"6779",category:"K-Control",desc:"Refrigerant overcharge / abnormal voltage / CT sensor",action:"Check refrigerant charge, power supply voltage, and CT sensor.",details:{meaning:"Multi-condition fault — system overcharged with refrigerant, supply voltage is abnormal, or CT (current transformer) sensor is malfunctioning. The PCB can't distinguish between these at the code level.",causes:[{rank:1,text:"System overcharged — high subcooling, high head pressure"},{rank:2,text:"Supply voltage out of range — too high or too low"},{rank:3,text:"CT sensor failed or not properly installed on compressor power lead"},{rank:4,text:"CT sensor wiring damaged or connector loose"}],checks:["Connect gauges — if subcooling >20°F, system may be overcharged","Measure supply voltage at outdoor disconnect — within ±10% of nameplate","Locate CT sensor on compressor power lead — verify clamped around ONE wire","Check CT sensor connector on outdoor PCB"],branches:[{condition:"Subcooling very high",target:"Recover excess refrigerant to spec subcooling"},{condition:"Voltage out of range",target:"Address power supply — utility, wire sizing, connections"},{condition:"CT sensor not clamped properly",target:"Reposition CT around single power lead, ensure fully closed"}]}},// ── P-Series (K) ──
{code:"E0",category:"P-Series K",desc:"System transmission error",action:"Comms fault between indoor and remote controller, or incorrect group/master-slave settings. Check CN40, SW2, SW6.",details:{meaning:"Communication has failed between the indoor unit and its wired remote controller, OR between grouped indoor units in a multi-indoor configuration. The indoor board cannot talk to the remote or to other units in its group. This is the P-Series equivalent of City Multi code 6600.",causes:[{rank:1,text:"Loose or disconnected remote controller wiring at CN40 on the indoor board"},{rank:2,text:"Remote controller cable damaged — pinched, cut, or too long (max 200m)"},{rank:3,text:"Incorrect group or master/slave settings — SW2, SW6 DIP switches wrong"},{rank:4,text:"Remote controller fault — display blank or showing garbled data"},{rank:5,text:"Indoor PCB transmission circuit failure"},{rank:6,text:"Multiple remotes wired incorrectly — main vs sub controller conflict"}],checks:["Check CN40 connector on the indoor unit board — reseat it firmly","Check remote controller wiring at both ends — indoor board and behind the remote","Verify SW2 and SW6 DIP switches match the installation configuration","If multiple indoor units are grouped, verify master/slave addressing is correct","Try a different remote controller to rule out remote fault","Measure voltage between signal terminals — should see ~12VDC communication signal"],branches:[{condition:"Single split system, one remote",target:"Check CN40, check cable continuity, try a new remote"},{condition:"Grouped system, multiple indoor units",target:"Check SW2/SW6 master-slave settings on each indoor unit in the group"},{condition:"Remote display is blank",target:"Check power to remote — should get 12VDC from indoor board. If no voltage, indoor PCB fault"},{condition:"Wiring and settings all check out",target:"Swap indoor PCB — transmission IC likely failed"}]}},{code:"P1",category:"P-Series K",desc:"TH1 fault — return air thermistor",action:"Spec: 6.4kΩ @ 20°C. Check resistance and connection.",details:{meaning:"The return air thermistor (TH1) on the P-Series indoor unit is reading out of range, open, or shorted. This sensor measures the room return air temperature for capacity control and setpoint comparison. P-Series K units use a 6.4kΩ @ 20°C thermistor — different from the 10kΩ sensors on newer systems.",causes:[{rank:1,text:"TH1 thermistor connector loose or disconnected from indoor PCB"},{rank:2,text:"Thermistor failed open — infinite resistance reading"},{rank:3,text:"Wire damaged — pinched during installation or rodent damage"},{rank:4,text:"Wrong replacement thermistor — 10kΩ installed instead of 6.4kΩ"},{rank:5,text:"Indoor PCB thermistor input circuit failure"}],checks:["Disconnect TH1 and measure resistance — should be 6.4kΩ at 20°C (68°F)","Verify connector is fully seated on the indoor PCB","Inspect wiring for physical damage","If previously replaced, confirm it's the correct 6.4kΩ type"],branches:[{condition:"Resistance out of spec or open/short",target:"Replace TH1 with correct 6.4kΩ @ 20°C thermistor"},{condition:"Resistance correct, connector seated",target:"Suspect indoor PCB failure — check for voltage at thermistor input"}]}},{code:"P2",category:"P-Series K",desc:"TH2 fault — coil/pipe thermistor",action:"Spec: 6.4kΩ @ 20°C. Check resistance and connection.",details:{meaning:"The coil/pipe thermistor (TH2) is reading out of range. TH2 monitors the indoor coil pipe temperature for frost protection (cooling) and overheat protection (heating). Uses a 6.4kΩ @ 20°C spec — if this sensor reads wrong, protection thresholds will trip incorrectly.",causes:[{rank:1,text:"TH2 thermistor failed — open or shorted"},{rank:2,text:"Thermistor not properly clamped to the coil pipe — reading ambient instead of pipe temp"},{rank:3,text:"Connector loose on indoor PCB"},{rank:4,text:"Wrong replacement thermistor — must be 6.4kΩ type"},{rank:5,text:"Wire damage between sensor and PCB"}],checks:["Disconnect TH2 and measure resistance — should be 6.4kΩ at 20°C (68°F)","Check that thermistor is clamped tightly against the copper pipe with thermal paste","Verify connector is seated on indoor PCB","If replaced, confirm correct 6.4kΩ type was used"],branches:[{condition:"Resistance out of spec",target:"Replace TH2 with correct 6.4kΩ thermistor"},{condition:"Not mounted against pipe",target:"Re-mount with thermal paste, secure clamp, insulate from airflow"},{condition:"Resistance correct, mounting good",target:"Check PCB — may be input circuit failure"}]}},{code:"P3",category:"P-Series K",desc:"System transmission error — same as E0",action:"Check CN40, SW2, SW6. Potential board issue.",details:{meaning:"Communication failure between the indoor unit and remote controller, or between grouped indoor units — same root cause as E0. P3 indicates the indoor PCB detected repeated communication timeouts. Check the same points as E0: CN40 connector, SW2 address switches, SW6 group settings.",causes:[{rank:1,text:"CN40 connector loose or damaged on indoor PCB"},{rank:2,text:"Remote controller wiring broken or shorted"},{rank:3,text:"SW2 or SW6 DIP switches set incorrectly — address or group mismatch"},{rank:4,text:"Remote controller PCB failure"},{rank:5,text:"Indoor PCB communication circuit failure"}],checks:["Check CN40 connector on the indoor PCB — reseat firmly","Verify wiring between indoor unit and remote controller for continuity","Check SW2 (address) and SW6 (group/master-slave) settings match the system design","Try a known-good remote controller to isolate the fault"],branches:[{condition:"CN40 was loose",target:"Reseat connector and power cycle — monitor for recurrence"},{condition:"Wiring is damaged",target:"Repair or replace communication wiring"},{condition:"SW settings are wrong",target:"Correct SW2/SW6 per installation manual and power cycle"},{condition:"All connections good",target:"Replace remote controller first, then indoor PCB if fault persists"}]}},{code:"P4",category:"P-Series K",desc:"Drain sensor fault",action:"Check resistance, connection, continuity.",details:{meaning:"The drain sensor (float switch or resistance-type sensor) on the indoor unit is reading abnormally. This could mean the sensor itself has failed, not that there's actually a drainage problem — though you should check both. The sensor monitors condensate level in the drain pan.",causes:[{rank:1,text:"Drain sensor disconnected from indoor PCB"},{rank:2,text:"Drain sensor failed — stuck open or stuck closed"},{rank:3,text:"Wiring between sensor and PCB damaged"},{rank:4,text:"Corrosion on sensor or connector from moisture exposure"},{rank:5,text:"Drain pan actually full — sensor is doing its job"}],checks:["Check if drain pan actually has standing water — if so, clear the drain first","Check drain sensor connector at indoor PCB — ensure seated","Measure sensor resistance or continuity — compare to spec","Inspect sensor and wiring for corrosion or moisture damage"],branches:[{condition:"Drain pan is full",target:"Clear drain line — this is a real drainage issue, not just a sensor fault"},{condition:"Pan is dry but sensor trips",target:"Clean or replace drain sensor — may be corroded or stuck"},{condition:"Sensor disconnected",target:"Reconnect and verify operation"}]}},{code:"P5",category:"P-Series K",desc:"Drain fault — high condensate detected",action:"Blockage, pump failure, or sensor fault.",details:{meaning:"High condensate level detected in the drain pan — the water level has reached the alarm threshold. Unlike P4 (sensor fault), P5 specifically indicates the condensate is actually high. The drain system has failed and the unit shut down to prevent water damage.",causes:[{rank:1,text:"Drain line clogged — algae, sludge, or debris blockage"},{rank:2,text:"Condensate pump failure — motor burned out or impeller stuck"},{rank:3,text:"Drain line not properly pitched — water pooling"},{rank:4,text:"Drain pan cracked or overflowing at connection point"},{rank:5,text:"High humidity load producing more condensate than drain can handle"}],checks:["Check drain pan — confirm water level is high","Clear drain line with nitrogen blow-out, wet/dry vac, or chemical treatment","Test condensate pump — pour water in pan and verify pump activates and removes it","Check drain line pitch — minimum 1/8\" per foot slope","Inspect drain pan for cracks"],branches:[{condition:"Drain line blocked",target:"Clear blockage, flush line, install algae tablets"},{condition:"Pump not working",target:"Replace condensate pump"},{condition:"Line not pitched properly",target:"Rework drain line with proper slope"}]}},{code:"P6",category:"P-Series K",desc:"Frost protection (cooling) / overheat protection (heating)",action:"Indoor coil sensor. Causes: airflow restriction or refrigerant charge problem.",details:{meaning:"In cooling mode: the indoor coil temperature dropped below the frost protection threshold — the coil is freezing up. In heating mode: the indoor coil temperature exceeded the overheat protection threshold. Either way, the system shuts down to protect itself. This is one of the most common P-Series faults and almost always points to an airflow or charge issue.",causes:[{rank:1,text:"Dirty air filter — restricted airflow causes coil to freeze in cooling or overheat in heating"},{rank:2,text:"Low refrigerant charge — low suction pressure drops evaporator temp below freezing"},{rank:3,text:"Fan motor failure or running at low speed — not enough air across the coil"},{rank:4,text:"TH2 coil thermistor fault — reading incorrectly, triggering false protection"},{rank:5,text:"Indoor coil blocked with ice — system ran too long with restricted airflow before tripping"},{rank:6,text:"Dirty indoor coil — lint, dust, or debris reducing heat transfer"}],checks:["Check the air filter — pull it out and inspect. This is the #1 cause","Check TH2 reading on the indoor board vs actual coil temperature","Verify the indoor fan motor is running and at correct speed","Look at the indoor coil — is there ice buildup? Let it defrost before restarting","Check refrigerant pressures — low suction in cooling = low charge or restriction","In heating: check if the outdoor unit is running and producing hot gas"],branches:[{condition:"Filter is dirty or coil is blocked",target:"Clean filter/coil, let ice melt if present, restart system"},{condition:"Filter clean but suction pressure is low",target:"Refrigerant charge issue — check for leaks, verify charge"},{condition:"TH2 reads abnormally vs actual coil temp",target:"TH2 sensor fault — check resistance (spec: 6.4kΩ @ 20°C), replace if out of range"},{condition:"Fan not running or very slow",target:"Check fan motor, capacitor (if applicable), and indoor PCB fan output"}]}},{code:"P7",category:"P-Series K",desc:"System error / address setting fault",action:"Check CN40, SW2, SW6. Potential board issue.",details:{meaning:"A system-level error or address configuration fault has been detected. The indoor unit's address or group settings don't match the system configuration, or the PCB has encountered an internal error it can't categorize. Check all configuration switches first before suspecting hardware.",causes:[{rank:1,text:"SW2 address switches set incorrectly — duplicate or invalid address"},{rank:2,text:"SW6 group/master-slave setting wrong"},{rank:3,text:"CN40 connector issue causing intermittent communication"},{rank:4,text:"Indoor PCB internal error — EEPROM or processor fault"},{rank:5,text:"Power surge corrupted PCB configuration memory"}],checks:["Check SW2 address switches — verify unique address per installation design","Check SW6 group and master/slave settings","Verify CN40 connector is seated and wiring is intact","Power cycle the unit completely — off for 60 seconds","If settings are correct and fault persists, suspect PCB failure"],branches:[{condition:"SW2 or SW6 incorrect",target:"Correct switch settings and power cycle"},{condition:"Clears after power cycle",target:"Monitor — may have been transient. Consider surge protector"},{condition:"Persists with correct settings",target:"Replace indoor PCB"}]}},{code:"P8",category:"P-Series K",desc:"Abnormal pipe/coil temperature",action:"No temp change at indoor unit after 9 min operation. Outdoor unit tripped, refrigerant charge, or airflow. TH2 faulty or not mounted correctly.",details:{meaning:"The indoor coil pipe temperature has not changed after 9 minutes of operation — the system expects to see temperature movement (cooling down in cooling mode, heating up in heating mode) but TH2 shows no change. Either refrigerant isn't flowing, the outdoor unit isn't running, or TH2 isn't reading correctly.",causes:[{rank:1,text:"Outdoor unit tripped on a fault — not sending refrigerant"},{rank:2,text:"Low or no refrigerant charge — nothing to circulate"},{rank:3,text:"TH2 thermistor not mounted against the pipe — reading ambient air instead of pipe temp"},{rank:4,text:"TH2 thermistor failed — reading a fixed value that doesn't change"},{rank:5,text:"Compressor not running — contactor not pulling in, capacitor failed"},{rank:6,text:"Reversing valve stuck — refrigerant not flowing through indoor coil"}],checks:["Check outdoor unit first — is it running? Any fault LEDs flashing?","Feel the liquid and suction lines at the indoor unit — any temperature change after startup?","Check TH2 mounting — must be clamped against copper pipe with thermal paste, insulated from air","Measure TH2 resistance — should change as pipe temp changes (6.4kΩ @ 20°C)","Connect gauges — verify refrigerant is present and pressures are reasonable","Check compressor contactor and capacitor at outdoor unit"],branches:[{condition:"Outdoor unit has a fault",target:"Diagnose and clear outdoor fault first — P8 is a symptom"},{condition:"No refrigerant pressure",target:"System has a major leak — find and repair, evacuate and recharge"},{condition:"TH2 not properly mounted",target:"Re-mount TH2 against pipe with thermal paste, clamp, and insulation"},{condition:"Outdoor running but no temp change at indoor",target:"Check reversing valve, check for restriction in refrigerant lines"}]}},{code:"LD1",category:"P-Series K",desc:"Reverse phase on mains supply",action:"Swap phases. Possible board fault.",details:{meaning:"The outdoor unit has detected that the 3-phase power supply phases are in the wrong sequence. Three-phase compressors and motors will run backwards with reversed phases, which can destroy the compressor. The unit locks out to protect itself. This is an outdoor unit LED fault code (LD = LED display).",causes:[{rank:1,text:"Phases wired in wrong sequence at the outdoor unit disconnect or terminal block"},{rank:2,text:"Utility power phase rotation changed — after power outage or utility work"},{rank:3,text:"Phase detection circuit on outdoor PCB has failed"},{rank:4,text:"One phase is missing — single-phasing detected as wrong rotation"}],checks:["Use a phase rotation meter to verify correct phase sequence (L1-L2-L3)","Swap any two of the three phase wires at the outdoor unit disconnect to correct rotation","Verify all three phases are present — check voltage L1-L2, L2-L3, L1-L3","If phases are correct by meter but fault persists, suspect outdoor PCB"],branches:[{condition:"Phase rotation is reversed",target:"Swap any two phase wires at the disconnect and restart"},{condition:"One phase is missing",target:"Check breaker, fuses, and utility supply — restore missing phase"},{condition:"Rotation correct by meter",target:"Outdoor PCB phase detection circuit may be faulty — replace PCB"}]}},{code:"LD2",category:"P-Series K",desc:"Component open circuit",action:"Check CH, 52C, 21S4, SV, 63H, 26C for open circuit or disconnection.",details:{meaning:"The outdoor PCB detected an open circuit on one of its safety or control components. The fault could be in any of several components: CH (crankcase heater), 52C (compressor contactor), 21S4 (fan relay), SV (solenoid valve), 63H (high-pressure switch), or 26C (compressor thermal switch). One of these is either disconnected or has failed open.",causes:[{rank:1,text:"63H high-pressure switch tripped or wire disconnected"},{rank:2,text:"26C compressor thermal switch tripped or disconnected"},{rank:3,text:"52C contactor coil open — burnt out or wire loose"},{rank:4,text:"SV solenoid valve coil open or connector loose"},{rank:5,text:"CH crankcase heater open or disconnected"},{rank:6,text:"21S4 fan relay coil open"}],checks:["Check each component one at a time — measure continuity across each device","Start with 63H (high-pressure switch) — most common, may have tripped on a real high-pressure condition","Check 26C thermal switch — if compressor is hot, let it cool and recheck","Verify all connectors on the outdoor PCB are seated","Check wiring to each component for damage or loose terminals"],branches:[{condition:"63H is open",target:"Check if high pressure is actually high — if so, fix the HP cause. If switch is faulty, replace it"},{condition:"26C is open",target:"Let compressor cool — if it resets, find why compressor overheated. If stays open, replace 26C"},{condition:"Contactor coil is open",target:"Replace 52C contactor"},{condition:"All components check OK",target:"Check wiring continuity back to PCB — may be a connector or PCB issue"}]}},{code:"LD3",category:"P-Series K",desc:"Outdoor coil thermistor open or short circuit",action:"Disconnected or outdoor board fault.",details:{meaning:"The outdoor coil thermistor is reading open or shorted. This sensor monitors the outdoor coil temperature for defrost control (heating mode) and high-pressure protection. Without it, the system can't manage defrost cycles or protect against condenser freezing/overheating.",causes:[{rank:1,text:"Thermistor disconnected from outdoor PCB"},{rank:2,text:"Thermistor failed — open circuit or short circuit"},{rank:3,text:"Wiring damaged — weather exposure, UV degradation, rodent damage"},{rank:4,text:"Connector corrosion from moisture"},{rank:5,text:"Outdoor PCB thermistor input failure"}],checks:["Disconnect outdoor coil thermistor and measure resistance — compare to spec for current ambient temp","Check connector on outdoor PCB — ensure seated and free of corrosion","Inspect wiring for weather damage, UV cracking, or rodent chewing","Apply dielectric grease to connector after cleaning"],branches:[{condition:"Thermistor open or shorted",target:"Replace outdoor coil thermistor"},{condition:"Connector corroded",target:"Clean connector, apply dielectric grease, reseat"},{condition:"Resistance correct, connector good",target:"Suspect outdoor PCB input circuit — replace PCB"}]}},{code:"LD4",category:"P-Series K",desc:"63H high pressure switch open",action:"Investigate HP causes. Check if switch is disconnected.",details:{meaning:"The 63H high-pressure cutout switch has opened — either the system pressure actually exceeded the safety limit, or the switch itself is faulty/disconnected. This is a critical safety protection. Never bypass this switch permanently — find and fix the root cause.",causes:[{rank:1,text:"Dirty condenser coil — heat can't be rejected, head pressure rises"},{rank:2,text:"Condenser fan not running — no airflow across outdoor coil"},{rank:3,text:"System overcharged with refrigerant"},{rank:4,text:"Non-condensibles (air) in system — artificially high pressure"},{rank:5,text:"Restriction in liquid line — filter drier or TXV blocked"},{rank:6,text:"63H switch wire disconnected or switch failed"}],checks:["Connect gauges — check actual high-side pressure","Clean condenser coil — wash with coil cleaner and water","Verify condenser fan is running and at correct speed","Check subcooling — very high subcooling can indicate overcharge","Check 63H switch — measure continuity (should be closed when pressure is normal)","Check 63H wiring — verify not disconnected at switch or PCB"],branches:[{condition:"High pressure is actually high",target:"Fix the cause — clean condenser, fix fan, recover overcharge"},{condition:"Pressure is normal but switch is open",target:"Replace 63H switch — it has failed"},{condition:"Switch wire is disconnected",target:"Reconnect — but verify pressures are safe first"}]}},{code:"LD5",category:"P-Series K",desc:"51CM overcurrent relay open",action:"Compressor locked or pulling excessive current. Check power supply.",details:{meaning:"The 51CM overcurrent relay has tripped — the compressor is drawing more current than the protection limit. This is a hard overcurrent protection, indicating a serious electrical or mechanical issue with the compressor or its power supply.",causes:[{rank:1,text:"Compressor mechanically locked — seized bearings or broken internal parts"},{rank:2,text:"Low supply voltage — causes compressor to draw excessive current"},{rank:3,text:"Compressor winding short — partial short between windings"},{rank:4,text:"Liquid slugging — liquid refrigerant entering compressor"},{rank:5,text:"Start capacitor or run capacitor failed (single-phase units)"},{rank:6,text:"Loose power connections — voltage drop causing high amps"}],checks:["Allow compressor to cool completely, then try to restart — measure amps immediately","Measure supply voltage at outdoor unit — must be within ±10% of nameplate","Check all power connections for tightness and signs of overheating","Measure compressor winding resistance (C-R, C-S, R-S) — check for shorts","Megohm test compressor windings to ground — check for ground fault","Check start/run capacitor if applicable"],branches:[{condition:"Compressor won't start, draws LRA and trips",target:"Compressor may be locked — try a hard-start kit. If still locked, replace compressor"},{condition:"Low voltage at unit",target:"Fix power supply — check wire gauge, connections, breaker"},{condition:"Winding resistance abnormal",target:"Compressor has internal short — replace compressor"},{condition:"Megohm test fails",target:"Compressor grounded — replace compressor"}]}},{code:"LD6",category:"P-Series K",desc:"26C thermal switch open",action:"Check refrigerant level. Check if 26C is disconnected.",details:{meaning:"The 26C compressor thermal protection switch has opened — the compressor shell or discharge temperature exceeded its safety limit. This switch is mounted on or near the compressor and opens when the compressor overheats. Low refrigerant is the most common cause because suction gas cools the compressor motor.",causes:[{rank:1,text:"Low refrigerant charge — compressor overheats without suction gas cooling"},{rank:2,text:"High head pressure — compressor working too hard"},{rank:3,text:"Compressor running continuously without cycling — thermostat or control issue"},{rank:4,text:"26C switch disconnected or wire broken"},{rank:5,text:"26C switch failed — opens at wrong temperature"},{rank:6,text:"Restricted airflow at condenser"}],checks:["Let compressor cool down — 26C should reset (close) when cool","Check refrigerant charge — connect gauges, check superheat","Verify 26C is connected — check wiring at switch and PCB","Check condenser airflow — clean coil, verify fan operation","If 26C doesn't reset after cooling, test continuity — replace if stuck open"],branches:[{condition:"Low charge confirmed",target:"Find and repair leak, evacuate and recharge to spec"},{condition:"26C stays open when compressor is cool",target:"Replace 26C switch"},{condition:"26C wire disconnected",target:"Reconnect and verify compressor temp is safe"},{condition:"Charge OK but compressor overheating",target:"Check for high head pressure, restricted condenser airflow"}]}},{code:"LD7",category:"P-Series K",desc:"Overheat protection — coil temp exceeded 67°C",action:"Reduced airflow, fan motor problem, or thermistor problem.",details:{meaning:"The outdoor coil temperature exceeded 67°C (153°F) in heating mode. During heating, the outdoor coil acts as a condenser and gets hot — but 67°C means it's too hot. This usually indicates the outdoor fan isn't moving enough air across the coil, or the thermistor reading is wrong.",causes:[{rank:1,text:"Outdoor fan motor failed or running slowly — not enough airflow"},{rank:2,text:"Outdoor coil blocked — debris, leaves, ice, or snow covering the coil"},{rank:3,text:"Outdoor fan capacitor failed — motor runs but at reduced speed"},{rank:4,text:"Outdoor coil thermistor fault — reading higher than actual temperature"},{rank:5,text:"System overcharged — excessive heat rejection"}],checks:["Check outdoor fan — is it running? Is it at full speed?","Inspect outdoor coil for obstructions — clear any debris, snow, or ice","Check outdoor fan capacitor — measure capacitance","Check outdoor coil thermistor resistance vs actual coil temperature","Connect gauges — check head pressure and subcooling"],branches:[{condition:"Fan not running or slow",target:"Check fan motor, capacitor, and fan relay"},{condition:"Coil blocked",target:"Clear obstruction, clean coil"},{condition:"Thermistor reads high but coil feels normal",target:"Replace outdoor coil thermistor"},{condition:"High head pressure with clean coil and good fan",target:"Check for overcharge — recover excess refrigerant"}]}},{code:"LD8",category:"P-Series K",desc:"Input circuit of outdoor board fault",action:"Replace outdoor board.",details:{meaning:"The outdoor PCB has detected a failure in its own input circuitry — the board can't reliably read its sensors or safety switches. This is a hardware-level PCB failure that typically can't be repaired in the field. The board needs replacement.",causes:[{rank:1,text:"Outdoor PCB internal component failure — blown input circuit"},{rank:2,text:"Power surge damaged the PCB input circuits"},{rank:3,text:"Moisture infiltration into the outdoor electrical box — corrosion on PCB"},{rank:4,text:"Insect infestation on PCB — ants or wasps shorting traces"}],checks:["Visually inspect outdoor PCB — look for burnt components, discoloration, or corrosion","Check for moisture or insect damage in the electrical compartment","Verify power supply is clean — check for voltage spikes with a meter","If board has obvious damage, replacement is confirmed"],branches:[{condition:"Visible PCB damage",target:"Replace outdoor PCB — order correct part number for the unit model"},{condition:"No visible damage",target:"Still replace PCB — internal circuit failure may not be visible. Transfer all DIP switch settings"},{condition:"Moisture or insect damage found",target:"Replace PCB and seal electrical compartment — add pest deterrent"}]}},// ── PWFY ──
{code:"PWFY-403",category:"PWFY",desc:"Comms fault between control board and inverter/fan board",action:"Detail 1=inverter board, 5=fan board. Check wiring between boards.",details:{meaning:"Internal communication failure between the PWFY main control board and either the inverter board (detail code 1) or the fan control board (detail code 5). These boards communicate via ribbon cable or connector inside the unit. This is an internal hardware communication issue, not an M-NET problem.",causes:[{rank:1,text:"Ribbon cable or connector between boards is loose or damaged"},{rank:2,text:"Inverter board failure (detail 1) — communication circuit dead"},{rank:3,text:"Fan control board failure (detail 5) — communication circuit dead"},{rank:4,text:"Main control board communication port failure"},{rank:5,text:"Power supply to sub-board interrupted — no power, no communication"}],checks:["Check the detail code — 1 = inverter board, 5 = fan board — to identify which board","Inspect ribbon cable/connector between main board and the faulting sub-board","Reseat all inter-board connectors firmly","Check for DC power at the sub-board — verify it's energized","If connectors are good and power is present, suspect the sub-board"],branches:[{condition:"Detail 1 — inverter board",target:"Check inverter board connector and power supply — replace inverter board if connections are good"},{condition:"Detail 5 — fan board",target:"Check fan board connector and power supply — replace fan board if connections are good"},{condition:"Connector was loose",target:"Reseat firmly and monitor — may be vibration-related"}]}},{code:"PWFY-1102",category:"PWFY",desc:"High discharge temp exceeded 115°C",action:"Low refrigerant or discharge thermistor fault.",details:{meaning:"The compressor discharge temperature has exceeded 115°C (239°F) — well above the safe operating limit. On PWFY water-source units, this is especially dangerous because the water-side heat exchanger should be providing stable heat rejection/absorption. If discharge temp is this high, something is seriously wrong with the refrigerant circuit or water flow.",causes:[{rank:1,text:"Low refrigerant charge — compressor overheating without adequate suction gas cooling"},{rank:2,text:"No water flow — water-side heat exchanger can't transfer heat"},{rank:3,text:"Water flow too low — undersized pump, clogged strainer, closed valve"},{rank:4,text:"Discharge thermistor fault — reading higher than actual temperature"},{rank:5,text:"Water temperature too high (cooling mode) — source water is too warm"},{rank:6,text:"Compressor valve failure — re-compressing discharge gas"}],checks:["Check water flow immediately — verify pump is running and flow switch is satisfied","Check water strainer/filter for blockage","Connect refrigerant gauges — check high-side pressure and superheat","Check discharge thermistor — compare reading to actual pipe temperature with contact thermometer","Measure entering and leaving water temperatures — verify proper ΔT"],branches:[{condition:"No water flow",target:"Restore water flow — check pump, valves, strainer, flow switch"},{condition:"Low refrigerant charge",target:"Find and repair leak, evacuate and recharge"},{condition:"Discharge thermistor reads wrong",target:"Replace discharge thermistor"},{condition:"Water temp too high for cooling",target:"Address water source temp — cooling tower, ground loop, or boiler issue"}]}},{code:"PWFY-1301",category:"PWFY",desc:"Low pressure fault — LP sensor below 1 bar before startup",action:"Check refrigerant charge and LP sensor.",details:{meaning:"The low-pressure sensor is reading below 1 bar (14.5 psi) before the compressor even starts. At standby, system pressure should equalize well above 1 bar at normal ambient temperatures. Pressure this low before startup means the system has lost most of its charge or the sensor is faulty.",causes:[{rank:1,text:"Major refrigerant leak — system has lost most of its charge"},{rank:2,text:"LP pressure sensor/transducer failure — reading falsely low"},{rank:3,text:"LP sensor wiring damaged or connector loose"},{rank:4,text:"Service valve left closed — sensor isolated from system"},{rank:5,text:"Schrader valve leak at sensor port"}],checks:["Connect gauges — verify actual system pressure at standby","If gauges also show low pressure, system has a major leak","If gauges show normal pressure but sensor reads low, sensor is faulty","Check LP sensor wiring and connector at the control board","Verify all service valves are fully open"],branches:[{condition:"Gauges confirm low pressure",target:"Major leak — find leak with electronic detector or nitrogen, repair, evacuate, recharge"},{condition:"Gauges show normal but sensor reads low",target:"Replace LP pressure sensor/transducer"},{condition:"Service valve is closed",target:"Open service valve — verify system pressures equalize"}]}},{code:"PWFY-1302",category:"PWFY",desc:"High pressure fault — exceeding 32.3 bar",action:"Check 63HS sensor against gauges.",details:{meaning:"The high-pressure sensor (63HS) is reading above 32.3 bar (468 psi) — the system has exceeded its high-pressure safety limit. On PWFY water-source units, this typically means the water-side heat exchanger can't reject heat (cooling mode) or the system is overcharged.",causes:[{rank:1,text:"No water flow or insufficient water flow — heat can't be rejected through water HX"},{rank:2,text:"Water temperature too high (cooling mode) — source water can't absorb heat"},{rank:3,text:"System overcharged with refrigerant"},{rank:4,text:"Water-side heat exchanger fouled or scaled — reduced heat transfer"},{rank:5,text:"Non-condensibles in refrigerant circuit — air or moisture"},{rank:6,text:"63HS pressure sensor/transducer reading falsely high"}],checks:["Connect gauges — compare actual high-side pressure to 63HS reading","Verify water flow — pump running, valves open, strainer clear","Measure water ΔT across the PWFY unit — should see expected temperature rise/drop","Check subcooling — very high subcooling may indicate overcharge","Inspect water-side HX for fouling — may need chemical cleaning"],branches:[{condition:"No water flow",target:"Restore flow — pump, valves, strainer"},{condition:"63HS doesn't match gauges",target:"Replace 63HS pressure transducer"},{condition:"Subcooling very high",target:"Recover excess refrigerant"},{condition:"Water HX fouled",target:"Chemical clean the water-side heat exchanger"}]}},{code:"PWFY-2000",category:"PWFY",desc:"Pump interlock error",action:"Pump interlock open while system operating.",details:{meaning:"The pump interlock contact is open — the PWFY unit requires proof that the water circulation pump is running before it will operate. This interlock prevents the unit from running without water flow, which would freeze or overheat the water-side heat exchanger.",causes:[{rank:1,text:"Water pump is not running — no flow, interlock stays open"},{rank:2,text:"Pump interlock relay or flow switch has failed"},{rank:3,text:"Wiring between pump interlock and PWFY control board is broken"},{rank:4,text:"Pump interlock not wired — left open during installation"},{rank:5,text:"Pump is running but flow switch doesn't sense flow — air lock or low flow"}],checks:["Verify the water pump is running — check pump power, starter, and rotation","Check the pump interlock wiring to the PWFY control board — verify continuity when pump runs","If using a flow switch, verify it closes when flow is present — check for air lock","Check if the interlock was wired during installation — sometimes left open on new installs","Temporarily jump the interlock to test — but only while monitoring water flow"],branches:[{condition:"Pump not running",target:"Start pump — check breaker, starter, motor"},{condition:"Pump running but interlock open",target:"Check flow switch — clean, adjust, or replace. Check for air lock"},{condition:"Interlock not wired",target:"Wire pump interlock per PWFY installation manual"}]}},{code:"PWFY-2134",category:"PWFY",desc:"Abnormal water temp (TH6) exceeded 85°C",action:"Check water flow and TH6 sensor.",details:{meaning:"The water temperature sensor TH6 is reading above 85°C (185°F) — dangerously high for the water-side heat exchanger. Either the water is actually this hot (possible in heating mode with no flow) or TH6 is reading incorrectly. This protection prevents damage to the heat exchanger and piping.",causes:[{rank:1,text:"No water flow — heat accumulates in the HX with no circulation"},{rank:2,text:"TH6 thermistor failed — reading falsely high"},{rank:3,text:"Water flow too low — not enough to carry away heat"},{rank:4,text:"Source water temperature extremely high — boiler loop issue"},{rank:5,text:"Water-side HX fouled — reduced heat transfer causes localized overheating"}],checks:["Check water flow immediately — verify pump is running","Measure actual water temperature with a contact thermometer — compare to TH6 reading","If no flow, restore flow before restarting","Check TH6 resistance — compare to thermistor spec chart","Check water strainer for blockage"],branches:[{condition:"No water flow",target:"Restore flow — pump, valves, strainer. Let water temp normalize before restarting"},{condition:"TH6 reads wrong vs actual temp",target:"Replace TH6 thermistor"},{condition:"Water actually very hot",target:"Check water source — boiler setpoint, mixing valve, loop isolation"}]}},{code:"PWFY-2135",category:"PWFY",desc:"Water source HX frozen — TH6/TH8 reading 2°C",action:"Check water flow. Check TH6 and TH8 sensors.",details:{meaning:"The water-side heat exchanger is at or near freezing — TH6 and/or TH8 are reading 2°C (36°F). In heating mode, the PWFY extracts heat from water, and if the water flow is too low or water temperature too cold, the HX can freeze and crack. This is a critical protection.",causes:[{rank:1,text:"Water flow lost or too low — not enough heat input to prevent freezing"},{rank:2,text:"Source water temperature too cold — ground loop or cooling tower water near freezing"},{rank:3,text:"No antifreeze in water loop — water at risk of freezing"},{rank:4,text:"TH6 or TH8 thermistor reading falsely low"},{rank:5,text:"System running in heating mode with inadequate water source temperature"}],checks:["Check water flow immediately — pump running? Valves open?","Measure entering water temperature — if below 40°F (4°C) without antifreeze, freezing risk is real","Check glycol concentration in water loop — should be adequate for local climate","Compare TH6 and TH8 readings to actual water temps with contact thermometer","Check water strainer for ice or blockage"],branches:[{condition:"No water flow",target:"Restore flow — DO NOT restart until water temp rises above 5°C"},{condition:"Source water genuinely near freezing",target:"Add antifreeze to loop, or increase source water temp before operating"},{condition:"Thermistors reading wrong",target:"Replace TH6 and/or TH8 — verify with actual water temp"},{condition:"HX may be frozen",target:"Do NOT run compressor — let water flow thaw the HX first. Check for leaks after thaw"}]}},{code:"PWFY-4102",category:"PWFY",desc:"Open phase fault",action:"Check all 3 phases.",details:{meaning:"One of the three power phases is missing or has dropped out. The PWFY unit requires all three phases for the compressor and may use 3-phase for the water pump. Running on two phases will destroy the compressor motor. The unit locks out to protect itself.",causes:[{rank:1,text:"Fuse blown on one phase"},{rank:2,text:"Breaker tripped or partially tripped on one phase"},{rank:3,text:"Loose connection on one phase — wire, lug, or breaker terminal"},{rank:4,text:"Utility power loss on one phase"},{rank:5,text:"Contactor with burned/pitted contacts — one phase not passing through"}],checks:["Measure voltage L1-L2, L2-L3, L1-L3 at the unit — all three should be within ±10% of each other","Check all fuses — pull and test continuity","Check breaker — ensure fully ON, not in tripped position","Inspect all power connections for tightness — especially at breaker, disconnect, and terminal block","Check contactor contacts — look for pitting or burning"],branches:[{condition:"One voltage reading is zero or very low",target:"Trace that phase back — fuse, breaker, connection, or utility"},{condition:"Fuse blown",target:"Replace fuse — investigate why it blew (short, ground fault, or overload)"},{condition:"Contactor contacts burned",target:"Replace contactor"}]}},{code:"PWFY-4115",category:"PWFY",desc:"Power supply abnormal",action:"Check mains voltage.",details:{meaning:"The incoming power supply voltage is outside acceptable limits — either too high or too low. The PWFY unit's power electronics need stable voltage to operate safely. Abnormal voltage can damage the inverter board and other electronics.",causes:[{rank:1,text:"Supply voltage too low — brownout or undersized wiring"},{rank:2,text:"Supply voltage too high — utility overvoltage or transformer tap wrong"},{rank:3,text:"Voltage fluctuating — unstable utility or generator power"},{rank:4,text:"Loose power connections causing voltage drop under load"},{rank:5,text:"Generator power with poor voltage regulation"}],checks:["Measure supply voltage at the unit under load and at no-load — should be within ±10% of nameplate","Check voltage at the main panel — is the utility supply stable?","Inspect all power connections for tightness","Check wire gauge — may be undersized for the run length","If on a generator, check voltage regulation and frequency"],branches:[{condition:"Voltage too low under load",target:"Check wire sizing, connections, and utility supply"},{condition:"Voltage too high",target:"Check utility supply or transformer tap setting"},{condition:"Voltage fluctuating",target:"Install voltage stabilizer or address utility issue"}]}},{code:"PWFY-4220",category:"PWFY",desc:"Bus voltage error",action:"108=low <200VDC, 109=high >380V, 1=PAM damage, 121=replace inverter board.",details:{meaning:"The DC bus voltage inside the inverter is out of range. Detail code 108 = bus voltage below 200VDC (under-voltage), 109 = above 380V (over-voltage), 1 = PAM module damage, 121 = inverter board failure. The DC bus is created by rectifying incoming AC power — problems here indicate power supply or inverter hardware issues.",causes:[{rank:1,text:"Detail 108: Low incoming AC voltage — DC bus can't reach proper level"},{rank:2,text:"Detail 109: High incoming AC voltage or regenerative energy spike during deceleration"},{rank:3,text:"Detail 1: PAM (Power Active Module) has failed — internal component damage"},{rank:4,text:"Detail 121: Inverter board hardware failure — needs replacement"},{rank:5,text:"DC bus capacitors degraded — can't hold proper voltage"}],checks:["Note the detail code — determines the diagnosis path","Measure incoming AC voltage at the unit — verify within spec","For detail 108: check power supply, connections, wire sizing","For detail 109: check for voltage spikes, possible regenerative energy issue","For detail 1 or 121: inverter board needs replacement — order correct part"],branches:[{condition:"Detail 108 — low bus voltage",target:"Fix incoming AC voltage — check supply, wiring, connections"},{condition:"Detail 109 — high bus voltage",target:"Check AC supply for overvoltage. May need braking resistor for regen energy"},{condition:"Detail 1 — PAM damage",target:"Replace inverter board assembly"},{condition:"Detail 121 — inverter board failure",target:"Replace inverter board"}]}},{code:"PWFY-4230",category:"PWFY",desc:"Heat sink temp exceeded 85°C",action:"Check airflow, inverter fan, THHS thermistor.",details:{meaning:"The inverter heat sink temperature has exceeded 85°C (185°F). The power electronics generate heat during operation, and the heat sink must be cooled by an internal fan. If the heat sink overheats, the inverter will be damaged.",causes:[{rank:1,text:"Inverter cooling fan failed — not spinning or running slow"},{rank:2,text:"Heat sink fins clogged with dust or debris"},{rank:3,text:"Ventilation around the unit restricted — enclosed space too tight"},{rank:4,text:"THHS heat sink thermistor fault — reading falsely high"},{rank:5,text:"Inverter running at high load in high ambient — thermal capacity exceeded"}],checks:["Check inverter cooling fan — is it running? Spinning freely?","Clean heat sink fins — remove dust and debris","Verify adequate ventilation around the PWFY unit","Check THHS thermistor — compare to actual heat sink temp with contact probe","Check unit ambient temperature — is the equipment room overheating?"],branches:[{condition:"Fan not running",target:"Replace inverter cooling fan"},{condition:"Heat sink clogged",target:"Clean heat sink and restart"},{condition:"THHS reads wrong",target:"Replace THHS thermistor"},{condition:"Room too hot",target:"Improve ventilation — add exhaust fan or louvers"}]}},{code:"PWFY-4250",category:"PWFY",desc:"Overcurrent — inverter IPM or compressor lock",action:"101=IPM, 102=ACCT 34.5A peak / 16A rms. Check compressor or inverter board.",details:{meaning:"The inverter detected an overcurrent condition. Detail 101 = IPM (Intelligent Power Module) internal protection tripped — the module itself sensed excess current. Detail 102 = ACCT sensor detected 34.5A peak or 16A rms, exceeding safe limits. Either the compressor is locked/failing or the inverter hardware is damaged.",causes:[{rank:1,text:"Compressor mechanically locked — seized bearings or internal failure"},{rank:2,text:"Compressor winding short — partial short between phases"},{rank:3,text:"IPM module damaged (detail 101) — power transistors failed"},{rank:4,text:"Inverter board failure — drive circuit sending wrong signals"},{rank:5,text:"Liquid refrigerant slugging the compressor — hydraulic lock"},{rank:6,text:"Wiring issue between inverter and compressor — loose or shorted"}],checks:["Note detail code — 101 = IPM, 102 = ACCT sensor","Megohm test compressor windings to ground — check for ground fault","Measure compressor winding resistance (U-V, V-W, U-W) — should be balanced","Check wiring between inverter output and compressor terminals","If detail 101, the IPM module inside the inverter may need replacement","Check for liquid flood-back — verify superheat is positive"],branches:[{condition:"Compressor windings shorted or grounded",target:"Replace compressor"},{condition:"Compressor windings OK but IPM tripped",target:"Check inverter board IPM module — may need inverter board replacement"},{condition:"Detail 102 — ACCT overcurrent",target:"Check compressor and wiring — if both good, replace ACCT sensor or inverter board"},{condition:"Liquid slugging suspected",target:"Check metering device, superheat, and TXV bulb position"}]}},{code:"PWFY-5102",category:"PWFY",desc:"Thermistor TH22 failure",action:"Check TH22 connection and resistance.",details:{meaning:"Thermistor TH22 (discharge pipe temperature sensor) is reading out of range, open, or shorted. TH22 monitors the compressor discharge temperature — critical for high-temp protection and capacity control on PWFY units.",causes:[{rank:1,text:"TH22 connector loose or disconnected from control board"},{rank:2,text:"TH22 thermistor failed — open or shorted"},{rank:3,text:"Wiring damaged between TH22 and control board"},{rank:4,text:"TH22 not properly mounted on discharge pipe"}],checks:["Check TH22 connector on the control board — ensure seated","Disconnect TH22 and measure resistance — compare to thermistor spec chart","Verify TH22 is clamped against the discharge pipe with thermal contact","Inspect wiring for damage"],branches:[{condition:"Resistance out of spec",target:"Replace TH22 thermistor"},{condition:"Connector loose",target:"Reseat and verify reading"},{condition:"Resistance OK, connector OK",target:"Suspect control board thermistor input — replace board"}]}},{code:"PWFY-5103",category:"PWFY",desc:"Thermistor TH13 or TH23 failure",action:"Check TH13/TH23 connection and resistance.",details:{meaning:"Either TH13 (suction pipe temperature) or TH23 (liquid pipe temperature) thermistor has failed. These sensors are critical for superheat calculation and refrigerant flow monitoring on the PWFY unit.",causes:[{rank:1,text:"TH13 or TH23 connector loose on control board"},{rank:2,text:"Thermistor failed — open or shorted"},{rank:3,text:"Wiring damage between sensor and board"},{rank:4,text:"Sensor not properly mounted against the pipe"}],checks:["Check both TH13 and TH23 connectors on the control board","Disconnect each and measure resistance — compare to spec chart","Verify both are clamped against their respective pipes with thermal paste","Inspect wiring for damage"],branches:[{condition:"One thermistor out of spec",target:"Replace the faulty thermistor (TH13 or TH23)"},{condition:"Both read correctly",target:"Check connectors and board — may be input circuit failure"}]}},{code:"PWFY-5104",category:"PWFY",desc:"Thermistor TH11 failure",action:"Check TH11 connection and resistance.",details:{meaning:"Thermistor TH11 has failed — this sensor monitors outdoor/ambient air temperature or a specific refrigerant circuit temperature on the PWFY unit. Without this reading, the control board can't adjust capacity or protection thresholds for ambient conditions.",causes:[{rank:1,text:"TH11 connector disconnected from control board"},{rank:2,text:"TH11 thermistor failed — open or shorted"},{rank:3,text:"Wiring damaged"},{rank:4,text:"Wrong replacement thermistor installed"}],checks:["Check TH11 connector on control board","Disconnect and measure resistance — compare to spec for current temperature","Inspect wiring for damage","Verify correct thermistor type if previously replaced"],branches:[{condition:"Resistance out of spec",target:"Replace TH11 with correct thermistor type"},{condition:"Connector issue",target:"Reseat connector, clean pins if corroded"},{condition:"Resistance OK",target:"Suspect control board input failure"}]}},{code:"PWFY-5106",category:"PWFY",desc:"Thermistor TH6 failure",action:"Check TH6 connection and resistance.",details:{meaning:"Thermistor TH6 (water temperature sensor) has failed. TH6 is critical on PWFY units — it monitors the water-side heat exchanger temperature for freeze protection and overheat protection. Without TH6, the unit can't protect the water HX from damage.",causes:[{rank:1,text:"TH6 connector loose or disconnected from control board"},{rank:2,text:"TH6 thermistor failed — open or shorted"},{rank:3,text:"TH6 well or pocket corroded — sensor not making good contact"},{rank:4,text:"Wiring damaged between TH6 and board"}],checks:["Check TH6 connector on control board","Disconnect and measure resistance — compare to thermistor chart for current water temp","Check TH6 sensor well — ensure sensor is fully inserted and well is not corroded","Inspect wiring for damage, especially in wet areas near water piping"],branches:[{condition:"Resistance out of spec",target:"Replace TH6 water temperature sensor"},{condition:"Sensor well corroded or damaged",target:"Replace sensor well and sensor — ensure watertight seal"},{condition:"Resistance OK",target:"Check board input circuit — may need board replacement"}]}},{code:"PWFY-5108",category:"PWFY",desc:"Thermistor TH8 failure",action:"Check TH8 connection and resistance.",details:{meaning:"Thermistor TH8 (second water temperature sensor) has failed. TH8 works with TH6 to monitor water temperatures across the heat exchanger — typically measures leaving or return water temperature. Together, TH6 and TH8 provide the water ΔT for capacity and freeze protection calculations.",causes:[{rank:1,text:"TH8 connector loose on control board"},{rank:2,text:"TH8 thermistor failed — open or shorted"},{rank:3,text:"Sensor well issue — not inserted properly or corroded"},{rank:4,text:"Wiring damage in wet area near piping"}],checks:["Check TH8 connector on control board","Disconnect and measure resistance — compare to spec for current water temp","Verify sensor is fully seated in its well","Inspect wiring — especially near water connections where moisture is common"],branches:[{condition:"Resistance out of spec",target:"Replace TH8 thermistor"},{condition:"Sensor well problem",target:"Replace well and sensor, ensure proper seal"},{condition:"Resistance OK, connector OK",target:"Suspect board input circuit"}]}},{code:"PWFY-5110",category:"PWFY",desc:"Thermistor THHS failure",action:"Check THHS connection and resistance.",details:{meaning:"The THHS (heat sink thermistor) has failed. This sensor monitors the inverter heat sink temperature for thermal protection. Without it, the unit can't detect inverter overheating and must shut down as a precaution.",causes:[{rank:1,text:"THHS connector loose on inverter or control board"},{rank:2,text:"THHS thermistor failed — open or shorted"},{rank:3,text:"Wiring damaged between THHS and board"},{rank:4,text:"THHS not properly mounted against heat sink surface"}],checks:["Check THHS connector — ensure firmly seated","Disconnect and measure resistance — should read a reasonable value for current heat sink temp","Verify THHS is mounted flat against the heat sink with thermal compound","Inspect wiring for damage"],branches:[{condition:"Resistance out of spec",target:"Replace THHS thermistor"},{condition:"Not mounted properly",target:"Re-mount with thermal compound against heat sink"},{condition:"Resistance OK",target:"Check board input — may need board replacement"}]}},{code:"PWFY-5201",category:"PWFY",desc:"High pressure sensor fault",action:"Verify pressure >1 bar. Check 63HS transducer.",details:{meaning:"The 63HS high-pressure transducer is reading abnormally — either the sensor output is out of its expected voltage range, or the pressure reading doesn't make sense for current operating conditions. This is a sensor fault, not necessarily a pressure fault.",causes:[{rank:1,text:"63HS pressure transducer failed — giving out-of-range voltage output"},{rank:2,text:"63HS wiring damaged or connector loose on control board"},{rank:3,text:"System has lost all refrigerant — transducer reading vacuum/atmosphere"},{rank:4,text:"Schrader valve leak at transducer port — transducer isolated from system pressure"}],checks:["Connect gauges — verify actual system pressure is above 1 bar","Check 63HS transducer wiring and connector at the control board","Measure transducer output voltage — should correspond to actual pressure per spec","Check for refrigerant leak at the transducer Schrader fitting"],branches:[{condition:"System has pressure but transducer reads wrong",target:"Replace 63HS pressure transducer"},{condition:"System has no pressure",target:"Major leak — find and repair, evacuate and recharge"},{condition:"Connector loose",target:"Reseat connector and verify reading"}]}},{code:"PWFY-5202",category:"PWFY",desc:"Pressure sensor fault",action:"Check pressure sensor wiring.",details:{meaning:"A pressure sensor (high or low side) is not communicating properly with the control board. The sensor's electrical signal is missing, erratic, or outside the expected voltage range. This could be any pressure transducer on the PWFY unit.",causes:[{rank:1,text:"Pressure sensor wiring disconnected or damaged"},{rank:2,text:"Pressure sensor connector corroded or not seated on board"},{rank:3,text:"Pressure sensor/transducer internal failure"},{rank:4,text:"Control board sensor input circuit failure"}],checks:["Check all pressure sensor connectors on the control board","Trace wiring from each transducer to the board — look for breaks or damage","Measure sensor output voltage — should change with pressure changes","Connect gauges to verify actual system pressures are reasonable"],branches:[{condition:"Wiring disconnected",target:"Reconnect and verify sensor reading"},{condition:"Sensor output doesn't change with pressure",target:"Replace pressure sensor"},{condition:"Wiring and sensor OK",target:"Suspect control board input circuit"}]}},{code:"PWFY-5301",category:"PWFY",desc:"Current sensor fault",action:"115=low output current <1.5A rms during inverter operation.",details:{meaning:"The current sensor (ACCT) is reading less than 1.5A rms while the inverter is actively driving the compressor. The compressor should be drawing significantly more than 1.5A when running. Either the sensor has failed, the compressor isn't actually running despite the inverter commanding it, or there's a wiring issue between the inverter and compressor.",causes:[{rank:1,text:"ACCT current sensor failed — not detecting current flow"},{rank:2,text:"ACCT sensor not properly installed — not clamped around the correct wire"},{rank:3,text:"Compressor contactor not pulling in — inverter commands run but compressor doesn't start"},{rank:4,text:"Wiring between inverter output and compressor is disconnected"},{rank:5,text:"ACCT sensor connector loose on inverter board"}],checks:["Verify the compressor is actually running — listen, feel for vibration, check amp clamp on power leads","Check ACCT sensor is clamped around the correct compressor power lead — one wire only","Check ACCT connector on the inverter/control board","If compressor not running, check contactor, wiring, and inverter output","Measure compressor amps with an external clamp meter for comparison"],branches:[{condition:"Compressor running but ACCT reads low",target:"ACCT sensor fault — replace or reposition sensor"},{condition:"Compressor not running",target:"Check contactor, wiring from inverter to compressor"},{condition:"ACCT connector loose",target:"Reseat connector and verify reading during operation"}]}}];// ── Mitsubishi Commissioning Steps ──
const mitsubishiCommissioningSteps=[{step:"Pre-Check",title:"Pre-Commissioning Checklist",icon:"📋",items:["Verify all indoor and outdoor units are correct model per design","Confirm refrigerant piping is pressure tested (600 psi nitrogen, 24 hr hold) and leak-free","Triple evacuate to 500 microns — break with dry nitrogen between pulls","Verify all branch controllers (BC) are installed and wired","All control wiring connected: M-NET (TB3/TB7), MA remote controllers, power supply","Condensate drain piping connected, trapped where required, and tested","All ductwork connected and air filters installed","Line voltage verified within spec at all disconnects"]},{step:"Step 1",title:"Address & DIP Switch Setup",icon:"🔢",items:["Set outdoor unit address on SW1 (rotary) — unit 0 is master","Set indoor unit M-NET addresses on SW1/SW2 (each unit unique, 01-50)","Set BC controller addresses on SW1 — must match system layout drawing","Verify SW3, SW5, SW7 DIP switch settings per installation manual for each unit type","PWFY units: set SW5 for refrigerant type and capacity","If using MA remote controllers: set master/sub via SW on controller PCB"]},{step:"Step 2",title:"Power Up Sequence",icon:"⚡",items:["Power up ALL indoor units and BC controllers FIRST","Verify LED1 (green) is ON on each indoor PCB — confirms power","Power up outdoor unit(s) — allow minimum 8 hours crankcase heater soak before first run","Outdoor LED1 (green) ON = power OK","Check for immediate fault codes on any unit — resolve before proceeding","Voltage spec: 208/230V single phase = 187-253V | 380-415V 3-phase = within 10%"]},{step:"Step 3",title:"Auto Address / Test Run",icon:"📡",items:["Initiate auto-address from outdoor unit or central controller","System scans M-NET bus and registers all connected units","Verify unit count matches design — if units missing, check M-NET wiring and addresses","Run initial test operation from outdoor unit or controller","Check each indoor unit responds — fan runs, LEV open
