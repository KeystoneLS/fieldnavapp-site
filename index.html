bel:"Displayed when under multizone controller"}]},{label:"Locked-button message",mode:"1E(2E)",firstCode:"10",description:"What happens when a user presses a button locked by central control.",options:[{secondCode:"01",label:"Key lock icon blinks 5 seconds (default)"},{secondCode:"02",label:"Full message: 'Under Centralized Control'"}]}]},{category:"Filter & Maintenance",icon:"🧹",settings:[{label:"Filter sign setting",mode:"10(20)",firstCode:"0",description:"Set filter type to match installed filter. Controls when 'Clean Filter' icon appears.",proTip:"Verify which filter type is installed before changing. Hours shown are light/heavy contamination thresholds.",options:[{secondCode:"01",label:"Standard filter: 200 hrs / 100 hrs (default)"},{secondCode:"02",label:"Long life filter: 2,500 hrs / 1,250 hrs"},{secondCode:"03",label:"Ultra long life: 10,000 hrs / 5,000 hrs"}]},{label:"Filter cleaning sign display",mode:"10(20)",firstCode:"3",description:"Show or hide the filter cleaning reminder. Auto-hidden when Auto-clean Panel is connected.",options:[{secondCode:"01",label:"Displayed (default)"},{secondCode:"02",label:"Not displayed"}]}]},{category:"Presence / Floor Sensors",icon:"👤",settings:[{label:"Presence sensor sensitivity (FXFQ/FXUQ)",mode:"11(21)",firstCode:"6",description:"Adjust sensitivity of the infrared presence sensor.",options:[{secondCode:"01",label:"High sensitivity (default)"},{secondCode:"02",label:"Low sensitivity"},{secondCode:"03",label:"Standard sensitivity"},{secondCode:"04",label:"Sensor disabled"}]},{label:"Floor sensor temperature compensation",mode:"11(21)",firstCode:"8",description:"Weighted average between suction air and floor sensor for units with IR floor sensor.",options:[{secondCode:"01",label:"Suction air only (floor sensor disabled)"},{secondCode:"02",label:"Priority on suction air temperature"},{secondCode:"03",label:"Standard — average of suction + floor (default)"},{secondCode:"04",label:"Priority on floor temperature"}]},{label:"Floor sensor offset",mode:"11(21)",firstCode:"9",description:"Adjust if unit is near a wall or high-temp floor source.",options:[{secondCode:"01",label:"-4°C (-7.2°F)"},{secondCode:"02",label:"-2°C (-3.6°F)"},{secondCode:"03",label:"0°C — no offset (default)"},{secondCode:"04",label:"+2°C (+3.6°F)"}]}]}];const daikinCommissioningSteps=[{step:"Pre-Check",title:"Pre-Commissioning Checklist",icon:"📋",items:["Compressor shipping brackets removed (yellow, under compressor blankets — 2 per compressor)","Stop valves securely closed & system pressure tested to 550 psi (450 psi if FXTQ units present) for 24 hrs min","Triple evacuate to 500 microns or less — break with dry nitrogen between each pull","All liquid lines measured — 'Additional Refrigerant Charge' calculated and weighed in (or 50% for Auto Charge)","Stop valves opened after charge","All remote controllers installed and control wiring connected at terminal blocks","All condensate drain piping connected and insulated","Refrigerant lines fully insulated including flare nut connections at indoor units","All ductwork connected and air filters installed","Line voltage verified within spec at all system components"]},{step:"Step 11-12",title:"Power Up Sequence",icon:"⚡",items:["Power up ALL indoor units and branch selector boxes FIRST — verify green PCB status LED is flashing","Verify all remote controllers have a display (status LEDs should be OFF at this point)","Power up condenser(s) — minimum 6 hours for crankcase heaters before commissioning","Initialization runs automatically: 12-20 min — H2P flashing + H3P solid during init","Init complete: H2P goes out, H3P remains solid","If H2P won't clear after 30 min: turn on a remote controller to see error code, cycle condenser power","Voltage spec: 208/230V = 187-253V | 460V 3PH = 416-508V | all 3 phases within 2%","U1 error on single module = reversed phase — swap L2 and L3 to correct"]},{step:"Step 13",title:"Verify Communications (Count Units)",icon:"📡",items:["Use Monitor Mode on condenser PCB to count and verify all indoor units and BS boxes","Count fan coils: Press MODE 1x → SET 5x → RETURN (count binary LED pattern)","Count BS boxes: Press MODE 1x → SET 6x → RETURN (count binary LED pattern)","Binary LED reading: H1P=1, H2P=2, H3P=4, H4P=8, H5P=16, H6P=32 (read right to left)","Forced Fan ON test: Hold MODE 5 sec (H1P solid) → SET 5x → RETURN → SET → RETURN → RETURN — fans not running = units not communicating","Communication fix: verify 16VDC at control wiring terminals, check F1/F2 connections, cycle condenser power + press RESET on PCB"]},{step:"Step 14",title:"Field Settings Before Charge",icon:"⚙️",items:["Set static pressure on all ducted fan coils BEFORE Check Operation or Auto Charge","FXMQ-PB: Use Auto Adjust (11-7-03) or Manual Static (13-6-##) — not both. Factory default is 07 (100 Pa / 0.40 inWG)","FXDQ: Change 13(23)-5 from 01 to 02 (High static — recommended for all FXDQ ducted)","FXFQ/FXUQ/FXHQ/FXAQ cassette: Set ceiling height at 13(23)-0-## (01=Standard, 02=High 1, 03=High 2)","FXFQ/FXZQ/FXUQ/FXEQ discharge direction: 13(23)-1 (01=4-way, 02=3-way, 03=2-way + blank-off kit)","Condenser high static fan setting (ducted condenser): Hold MODE → SET 18x → RETURN → SET → RETURN → RETURN → fans run at 0.32 in.wg."]},{step:"Step 15",title:"Refrigerant Charging",icon:"🧪",items:["Manual charge preferred — weigh in total calculated 'Additional Refrigerant Charge' through liquid service port","Charge calculation: A (liquid line footage × factor) + B (model-specific) + C (connection ratio adder)","If vacuum insufficient: use 'Additional Refrigerant Charge Mode' — Hold MODE (H1P solid) → SET 20x → RETURN → SET → RETURN → RETURN → charge through liquid port with liquid stop valve CLOSED","Auto Charge: Cool mode (OD 32-109°F, ID 50-90°F) — charges and stops automatically | Heat mode — manual termination required","Auto Charge: Press TEST once → hold TEST 5 sec (H2P flash) → wait for cool/heat mode indication → press TEST within 5 min to confirm","Auto Charge status codes: PE=almost done | PA=bottle empty (5 min to swap) | P9=complete (press MODE to end) | P2=interrupted (check stop valves, tank, indoor airflow)","Record all refrigerant amounts on the access panel label. Label ALL liquid line sizes and lengths."]},{step:"Step 16",title:"Check Operation Mode",icon:"✅",items:["All remote controllers must be OFF before starting — U3 error if any are on","Hold TEST button 5 sec until H2P flashing + H7P solid — Check Op takes 45-60 min","Check Operation always runs in COOL mode","Sequence: Pressure equalization → Cooling start → Stop valve check → Judgement (wiring, charge, piping) → Pump down → Standby → Complete","Error E3/E4/F3/F6/UF during check op: open all stop valves","Error U1: reversed or open phase — swap L2/L3 or check power wiring","Error UF: refrigerant piping and control wiring mismatch — verify consistency","Error E3/F6/UF: overcharge — recover refrigerant and recalculate","Error E4/F3: undercharge — recalculate and add refrigerant","Error U3: check operation not performed — run it","Error U7/U4/UF/UH: remove wire from Q1-Q2 terminals (single outdoor system)"]},{step:"Step 17",title:"Additional Field Settings",icon:"🔧",items:["Set Master remote controller: On heat pump systems, press ON/OFF on BRC1E72 to wake display — 'MASTER CONTROLLED' icon flashes — press MODE once on intended master (icon disappears on master, stays solid on slaves)","To change master: hold MODE 5 sec on current master — all controllers re-enter master config mode","Wireless master: point wireless remote at fan coil, hold MODE 4 sec — listen for 2x beep","T1-T2 float switch (condensate pump): MUST change 12(22)-1 from 01 to 03 (N.C. auto reset) — without this, unit will display alarm and cannot be turned on","Sensor priority: 10(20)-2-03 for RC sensor only (FXTQ air handlers, high ceilings, fresh air mixing)","Fan thermo-off config: 12(22)-3 (heat) and 12(22)-6 (cool) — 01=LL, 02=user set, 03=off","O.A. Processor discharge temp: Mode 14(24), FC 3=cooling, FC 4=heating"]},{step:"Step 18",title:"Commissioning Completion",icon:"🏁",items:["Operate system in COOL and HEAT mode to verify operation (heat mode prohibited above 75.2°F OA temp)","Heat recovery systems: cycle every zone to verify branch selector boxes are working","Configure and program centralized control systems after VRVIII system is fully operational","Leave copies of VRV IOM documents on site with end user and contractor","Document all refrigerant charge amounts, liquid line lengths, and commissioning date on access panel label"]}];const daikinErrorCodes=[// ── Indoor Unit (A-prefix) ──
{code:"A0",category:"Indoor",desc:"External protection device activated (T1-T2)",action:"Check T1-T2 terminals. Verify mode 12(22)-1 setting matches actual wiring. If set to 03 with no device, remove jumper or change setting.",details:{meaning:"An external safety or interlock device wired to the indoor unit's T1-T2 terminals has opened. Daikin VRV indoor units have T1-T2 inputs for fire alarm shutoffs, smoke detectors, external thermostats, or other safety devices. Field setting mode 12(22)-1 tells the PCB what to expect — if set to 03 (external device expected) but nothing is wired, the open circuit triggers A0.",causes:[{rank:1,text:"Field setting 12(22)-1 set to 03 but no external device is wired — open T1-T2 circuit"},{rank:2,text:"Fire alarm or smoke detector interlock has activated — building safety system triggered"},{rank:3,text:"External thermostat or interlock device wiring is broken or disconnected"},{rank:4,text:"T1-T2 jumper wire fell off during service"},{rank:5,text:"External device has failed — contacts stuck open"}],checks:["Check T1-T2 terminals on the indoor unit — is there a device wired or a jumper installed?","Check field setting mode 12(22)-1 — if set to 03 with no device, change to 00 or install a jumper across T1-T2","If a fire alarm interlock is wired, check if the building fire system is in alarm","Test continuity across the external device — should be closed circuit during normal operation","Check wiring between the external device and T1-T2 for breaks"],branches:[{condition:"No device wired, setting is 03",target:"Change field setting 12(22)-1 to 00 or install jumper across T1-T2"},{condition:"Fire alarm in active alarm state",target:"Address building fire alarm — A0 will clear when alarm resets"},{condition:"Device wired but contacts open",target:"Test or replace external device — check wiring continuity"}]}},{code:"A1",category:"Indoor",desc:"Indoor unit PCB (EEPROM) abnormality",action:"Cycle power. If persists, replace indoor PCB (A1P).",details:{meaning:"The indoor unit's main PCB (A1P) has detected an EEPROM data error — the onboard memory that stores configuration, calibration, and operating parameters is corrupted or unreadable. This can happen from power surges, age, or a manufacturing defect.",causes:[{rank:1,text:"Power surge or brown-out corrupted EEPROM data"},{rank:2,text:"PCB age — EEPROM has limited write cycles and can degrade"},{rank:3,text:"PCB manufacturing defect — rare but possible"},{rank:4,text:"Loose or corroded connections causing intermittent power to the PCB"}],checks:["Power cycle the indoor unit completely — off for 60 seconds, then restore power","If A1 clears after power cycle, monitor for recurrence — consider a surge protector","Check for corrosion or damage on the indoor PCB","If A1 persists after power cycle, the PCB (A1P) needs replacement"],branches:[{condition:"Clears after power cycle",target:"Monitor — likely a transient power event. Install surge protection"},{condition:"Persists after power cycle",target:"Replace indoor PCB (A1P). Transfer all DIP switch and field settings"}]}},{code:"A3",category:"Indoor",desc:"Drain level — float switch tripped during cooling thermo-on",action:"Check power (208-230V), float switch (S1L), drain pump (M1P), drain piping slope. Connectors: FXFQ-T float=X15A pump=X10A, FXMQ-PB float=X15A pump=X25A.",details:{meaning:"The condensate float switch (S1L) tripped while the indoor unit was actively cooling — condensate water has risen to the alarm level. The compressor stops for this unit but other units continue. This is different from AF (which trips when compressor is already off). A3 means the drain system can't keep up during active cooling.",causes:[{rank:1,text:"Drain line clogged — algae, sludge, or debris blockage downstream"},{rank:2,text:"Drain pump (M1P) has failed — motor burned out or impeller stuck"},{rank:3,text:"Float switch (S1L) stuck in alarm position — needs cleaning"},{rank:4,text:"Drain piping has upward slope or sag trapping water"},{rank:5,text:"Power supply issue at drain pump — check 208-230V at connector"}],checks:["Check drain pan for standing water — if full, drain is blocked downstream","Clear drain line — nitrogen blow-out, wet/dry vac, or chemical treatment","Test drain pump (M1P) — pour water in pan and verify pump activates","Check float switch (S1L) — manually lift and release to test operation","Verify power at pump connector: FXFQ-T=X10A, FXMQ-PB=X25A","Check drain piping slope — must slope downward with no sags"],branches:[{condition:"Drain pan full, line blocked",target:"Clear drain blockage, flush line, install algae tablets"},{condition:"Pump not running",target:"Check power at connector (X10A or X25A). Replace pump if power is present but pump is dead"},{condition:"Float switch stuck",target:"Clean float switch mechanism — replace S1L if stuck"}]}},{code:"A6",category:"Indoor",desc:"Fan motor lock / overload / overcurrent",action:"Check for obstruction. Check connector (X20A most models, X8A for FXMQ07-12PB). Spin fan by hand. Motor resistance: FG-GND ≥1MΩ, Vsp-GND ≥100kΩ.",subcodes:[{code:"A6-01",desc:"Fan motor locked"},{code:"A6-10",desc:"Fan motor overcurrent"},{code:"A6-11",desc:"Fan position detection error"},{code:"A6-20",desc:"Fan motor status abnormality (FXTQ-TA — motor limit or trip)"},{code:"A6-21",desc:"Low indoor airflow (FXTQ-TA — RPM 50-150 repeatedly)"}],details:{meaning:"The indoor fan motor has either locked up, drawn excessive current, or its position/speed feedback signal is abnormal. Subcodes help pinpoint: A6-01 = mechanically locked, A6-10 = overcurrent, A6-11 = position detection failure, A6-20/21 = FXTQ cassette-specific motor issues. The PCB shuts down the fan to prevent motor damage or fire.",causes:[{rank:1,text:"Physical obstruction in the fan wheel — debris, ice, or foreign object"},{rank:2,text:"Fan motor connector (X20A or X8A) loose or disconnected"},{rank:3,text:"Fan motor bearing failure — motor won't spin freely"},{rank:4,text:"Fan motor winding short — draws overcurrent (A6-10)"},{rank:5,text:"Hall sensor or position feedback circuit failed (A6-11)"},{rank:6,text:"PCB fan output circuit failure"}],checks:["Power off and spin the fan wheel by hand — it should rotate freely with no grinding","Check for debris, ice, or obstructions in the fan housing","Check fan motor connector: X20A on most models, X8A on FXMQ07-12PB","Measure motor insulation: FG to GND should be ≥1MΩ, Vsp to GND ≥100kΩ","If motor spins freely and connections are good, check PCB fan output voltage"],branches:[{condition:"Fan won't spin by hand",target:"Replace fan motor — bearing seized or internal obstruction"},{condition:"Fan spins freely, connector loose",target:"Reseat connector and test"},{condition:"Insulation resistance below spec",target:"Replace fan motor — winding insulation breakdown"},{condition:"Motor and connections OK",target:"Check PCB output — may need PCB replacement"}]}},{code:"A7",category:"Indoor",desc:"Swing flap motor abnormality (system continues)",action:"Check 208-230V at connector (X9A FXFQ, X36A others). Check limit switch and flap-cam mechanism.",details:{meaning:"The swing flap (louver/vane) motor that directs airflow has failed or its position switch isn't reporting correctly. This is a non-critical fault — the system continues operating but airflow direction control is lost. The flap may be stuck in one position.",causes:[{rank:1,text:"Flap motor connector disconnected — no power to motor"},{rank:2,text:"Flap motor failed — motor burned out"},{rank:3,text:"Limit switch broken or out of adjustment — motor can't detect position"},{rank:4,text:"Flap mechanism jammed — cam or linkage stuck"},{rank:5,text:"No voltage at connector — PCB output issue"}],checks:["Check voltage at connector: X9A on FXFQ, X36A on other models — should see 208-230V","Manually move the flap/vane — it should swing freely","Check limit switch — verify it clicks at end of travel","Check flap cam mechanism for broken or jammed parts"],branches:[{condition:"No voltage at connector",target:"Check PCB output — may need PCB replacement or fuse check"},{condition:"Voltage present but motor doesn't move",target:"Replace flap motor"},{condition:"Mechanism jammed",target:"Clear jam, lubricate cam mechanism, check for broken linkage"}]}},{code:"A8",category:"Indoor",desc:"Power supply voltage abnormality",action:"Verify 208-230V ±10% at unit. Check for open phase or unbalance >6V. FXMQ-PB trips at ≤150V or ≥386V.",details:{meaning:"The indoor unit's power supply voltage is outside acceptable limits. Most Daikin VRV indoor units run on 208-230V and tolerate ±10%. If voltage drops below ~187V or exceeds ~253V, the PCB triggers A8. On FXMQ-PB models, limits are tighter: ≤150V or ≥386V. Phase imbalance >6V between phases also triggers this.",causes:[{rank:1,text:"Supply voltage too low — brownout, undersized wiring, or loaded circuit"},{rank:2,text:"Supply voltage too high — utility overvoltage"},{rank:3,text:"Open phase — one of the power legs is missing"},{rank:4,text:"Phase voltage imbalance greater than 6V between legs"},{rank:5,text:"Loose power connections causing voltage drop under load"}],checks:["Measure voltage at the indoor unit terminal block — should be 208-230V ±10%","Check all phases — measure L1-L2, L2-L3, L1-L3 and compare. Imbalance should be <6V","Check voltage under load vs no-load — large drop indicates wiring or connection issue","Inspect power connections for tightness at breaker, junction boxes, and unit terminals","For FXMQ-PB: voltage must be between 150V and 386V"],branches:[{condition:"Voltage below spec",target:"Check wire sizing, connection tightness, and utility supply"},{condition:"Voltage above spec",target:"Check transformer tap or utility — may need voltage regulator"},{condition:"One phase missing",target:"Trace missing phase — check breaker, fuse, connections"}]}},{code:"A9",category:"Indoor",desc:"Electronic expansion valve (EEV) abnormality",action:"Check EEV connection at X7A. Check coil resistance.",subcodes:[{code:"A9-01",desc:"EEV coil error or disconnected connector"},{code:"A9-02",desc:"Refrigerant leakage — EEV cannot hold closed, replace valve body"}],details:{meaning:"The indoor unit's electronic expansion valve has a problem. A9-01 means the EEV coil is open/shorted or the connector (X7A) is disconnected — the PCB can't drive the valve. A9-02 is more serious: the EEV valve body can't hold closed, allowing refrigerant to leak through when the unit should be off. A9-02 requires valve replacement.",causes:[{rank:1,text:"EEV connector X7A loose or disconnected from indoor PCB"},{rank:2,text:"EEV coil failed — open or shorted winding (A9-01)"},{rank:3,text:"EEV valve body worn or contaminated — can't seal closed (A9-02)"},{rank:4,text:"Wiring between PCB and EEV damaged"},{rank:5,text:"PCB EEV driver circuit failed"}],checks:["Check connector X7A on the indoor PCB — reseat firmly","Measure EEV coil resistance — compare to spec (typically 30-60Ω depending on model)","For A9-02: check if refrigerant flows through the indoor coil when unit is commanded OFF — if coil stays cold, valve is leaking through","Check wiring between X7A connector and EEV coil for damage"],branches:[{condition:"A9-01 with loose connector",target:"Reseat X7A and clear fault"},{condition:"A9-01 with open coil",target:"Replace EEV coil — verify resistance after replacement"},{condition:"A9-02 — valve leaking through",target:"Replace entire EEV valve body — coil alone won't fix this"}]}},{code:"AF",category:"Indoor",desc:"Drain level above limit — float switch tripped (compressor off)",action:"Check drain piping for upward slope. Check humidifier (if installed) for leaks. System continues operating.",details:{meaning:"The drain float switch tripped while the compressor was already off for this unit. Unlike A3 (which trips during active cooling), AF means condensate accumulated during a period when the unit wasn't actively dehumidifying — possibly from a humidifier leak, drain piping with upward slope allowing backflow, or a very slow drain that hasn't cleared from the previous cycle.",causes:[{rank:1,text:"Drain piping has upward slope or trap — water flowing back into the pan"},{rank:2,text:"Humidifier installed on the unit is leaking into the drain pan"},{rank:3,text:"Drain line partially blocked — pan didn't fully drain between cycles"},{rank:4,text:"Float switch stuck in alarm position from previous A3 event"}],checks:["Check drain piping — look for any upward runs or sags that could trap water or cause backflow","If a humidifier is installed, check for leaks — disconnect and see if AF clears","Clear drain line and verify full drainage","Check float switch — clean and test operation"],branches:[{condition:"Drain pipe slopes upward",target:"Rework drain piping to maintain continuous downward slope"},{condition:"Humidifier is leaking",target:"Repair or replace humidifier — seal connection to indoor unit"},{condition:"Residual blockage",target:"Flush drain line, install algae tablets"}]}},{code:"AJ",category:"Indoor",desc:"Capacity setting error",action:"Install capacity setting adaptor on replacement PCB.",details:{meaning:"The indoor unit's capacity setting doesn't match the expected configuration. On Daikin VRV, when replacing an indoor PCB, a capacity setting adaptor (small plug-in module) must be installed on the new board to tell it what size/model it's controlling. Without this adaptor, the PCB doesn't know the unit's capacity and throws AJ.",causes:[{rank:1,text:"Indoor PCB was replaced but capacity setting adaptor was not installed"},{rank:2,text:"Wrong capacity adaptor installed — doesn't match the unit model"},{rank:3,text:"Capacity adaptor not seated properly on the new PCB"},{rank:4,text:"Adaptor pins corroded or damaged"}],checks:["Verify the capacity setting adaptor is installed on the indoor PCB","Check the adaptor part number matches the indoor unit model","Reseat the adaptor firmly — ensure all pins are making contact","If adaptor is missing, order the correct one for the unit model from the nameplate"],branches:[{condition:"No adaptor installed",target:"Install correct capacity setting adaptor for the unit model"},{condition:"Wrong adaptor",target:"Replace with correct adaptor matching the unit model/capacity"},{condition:"Adaptor installed but AJ persists",target:"Reseat adaptor, clean pins — if still fails, try a new adaptor"}]}},// ── Indoor Unit (C-prefix) ──
{code:"C4",category:"Indoor",desc:"Heat exchanger liquid pipe thermistor abnormality",action:"Check thermistor resistance and connection. Replace if open/short.",details:{meaning:"The liquid pipe thermistor on the indoor heat exchanger is reading out of range, open, or shorted. This sensor monitors the liquid refrigerant temperature entering/leaving the indoor coil — critical for superheat/subcooling calculations and EEV control.",causes:[{rank:1,text:"Thermistor connector disconnected from indoor PCB"},{rank:2,text:"Thermistor failed — open or short circuit"},{rank:3,text:"Thermistor not clamped properly against the liquid pipe"},{rank:4,text:"Wiring damaged between thermistor and PCB"}],checks:["Check thermistor connector on indoor PCB — reseat firmly","Disconnect and measure resistance — compare to Daikin thermistor chart for ambient temp (typically 10kΩ at 25°C)","Verify thermistor is secured against the liquid pipe with thermal paste and insulation","Inspect wiring for damage"],branches:[{condition:"Open or short circuit",target:"Replace liquid pipe thermistor"},{condition:"Resistance normal, connector good",target:"Check PCB thermistor input — may need PCB replacement"}]}},{code:"C5",category:"Indoor",desc:"Heat exchanger gas pipe thermistor abnormality",action:"Check thermistor resistance and connection. Replace if open/short.",details:{meaning:"The gas pipe thermistor on the indoor heat exchanger is out of range. This sensor monitors the suction gas temperature leaving the indoor coil — used for superheat monitoring and protection against liquid flood-back to the compressor.",causes:[{rank:1,text:"Thermistor connector disconnected from indoor PCB"},{rank:2,text:"Thermistor failed — open or short circuit"},{rank:3,text:"Thermistor not properly mounted on the gas pipe"},{rank:4,text:"Wiring damage"}],checks:["Check thermistor connector on indoor PCB","Disconnect and measure resistance — compare to thermistor spec chart","Verify mounting against gas pipe with thermal contact","Inspect wiring for damage"],branches:[{condition:"Open or short",target:"Replace gas pipe thermistor"},{condition:"Resistance normal",target:"Check mounting and PCB input circuit"}]}},{code:"C6",category:"Indoor",desc:"Combination error — indoor PCB and fan PCB",action:"Check harness between main and fan PCBs. Replace defective PCB.",details:{meaning:"The indoor main PCB (A1P) and the fan control PCB can't communicate or are incompatible. Some Daikin VRV indoor units have a separate fan control board connected via harness to the main board. If the harness is loose or one board is the wrong revision, this error appears.",causes:[{rank:1,text:"Harness between main PCB and fan PCB is loose or disconnected"},{rank:2,text:"Main PCB and fan PCB are incompatible versions/revisions"},{rank:3,text:"One PCB was replaced with wrong part number"},{rank:4,text:"Harness damaged — broken wire or corroded pin"}],checks:["Check the harness connection between main PCB (A1P) and fan PCB — reseat both ends","Verify both boards are correct part numbers for this indoor unit model","Inspect harness for damage — broken pins, corrosion, or pinched wire","If one board was replaced, confirm the replacement matches the other board's revision"],branches:[{condition:"Harness loose",target:"Reseat harness at both ends and power cycle"},{condition:"Board mismatch after replacement",target:"Order correct PCB revision to match the existing board"},{condition:"Harness damaged",target:"Replace harness — check pin alignment at both ends"}]}},{code:"C9",category:"Indoor",desc:"Suction air thermistor / remote sensor abnormality",action:"Check thermistor connection and resistance. Check remote sensor wiring if installed.",details:{meaning:"The return air (suction) thermistor built into the indoor unit, or an external remote room sensor wired to the unit, is reading out of range. If a remote wall-mounted sensor is installed, the fault may be in the remote sensor or its wiring rather than the built-in thermistor.",causes:[{rank:1,text:"Built-in suction air thermistor disconnected or failed"},{rank:2,text:"Remote room sensor wiring is broken or shorted"},{rank:3,text:"Remote sensor has failed — open or short"},{rank:4,text:"Wrong sensor type installed — resistance doesn't match spec"}],checks:["Check if a remote room sensor is installed — if so, check its wiring first","Disconnect thermistor and measure resistance — compare to spec (typically 10kΩ at 25°C)","If remote sensor installed, disconnect it and test the built-in sensor to isolate the fault","Check connector on indoor PCB"],branches:[{condition:"Remote sensor installed and wiring faulty",target:"Repair remote sensor wiring or replace remote sensor"},{condition:"Built-in thermistor failed",target:"Replace suction air thermistor"},{condition:"Both sensors fail test",target:"Check PCB input circuit"}]}},{code:"CA",category:"Indoor",desc:"Discharge air thermistor abnormality",action:"Check thermistor connection and resistance.",details:{meaning:"The discharge (supply) air thermistor is reading out of range. This sensor measures the temperature of the air leaving the indoor unit — used for comfort control and discharge air temperature limiting. Not all indoor models have this sensor.",causes:[{rank:1,text:"Thermistor disconnected from indoor PCB"},{rank:2,text:"Thermistor failed — open or short"},{rank:3,text:"Wiring damaged"},{rank:4,text:"Thermistor dislodged from mounting position in airstream"}],checks:["Check thermistor connector on indoor PCB","Disconnect and measure resistance","Verify thermistor is positioned in the discharge airstream","Check wiring for damage"],branches:[{condition:"Open or short",target:"Replace discharge air thermistor"},{condition:"Dislodged from position",target:"Re-mount in correct position in discharge airstream"}]}},{code:"CE",category:"Indoor",desc:"Infrared presence/floor sensor error (system continues)",action:"Check sensor connection. Clean sensor lens. System continues operating.",details:{meaning:"The infrared presence detection or floor temperature sensor has a fault. This is a comfort feature sensor — it detects occupancy or floor surface temperature to optimize airflow direction. Non-critical: the system continues operating normally but loses the smart sensing feature.",causes:[{rank:1,text:"Sensor lens dirty — can't detect properly"},{rank:2,text:"Sensor connector disconnected from indoor PCB"},{rank:3,text:"Sensor has failed"},{rank:4,text:"Sensor blocked by an obstruction"}],checks:["Clean the sensor lens — dust and dirt buildup affect IR detection","Check sensor connector on indoor PCB","Verify nothing is blocking the sensor's field of view","If cleaning doesn't help, replace the sensor"],branches:[{condition:"Lens was dirty",target:"Clean and monitor — should clear on its own"},{condition:"Sensor failed",target:"Replace sensor — system will still operate without it"}]}},{code:"CJ",category:"Indoor",desc:"Remote controller thermistor abnormality",action:"Check RC thermistor. May need RC replacement.",details:{meaning:"The thermistor inside the wired remote controller is reading out of range. When the system is set to use the remote controller's sensor for room temperature (instead of the indoor unit's return air sensor), a failed RC thermistor means the system can't read room temperature.",causes:[{rank:1,text:"Remote controller thermistor has failed — open or short"},{rank:2,text:"Remote controller PCB issue — sensor circuit failed"},{rank:3,text:"RC wiring issue — signal can't reach indoor unit"}],checks:["Check if the remote controller displays a room temperature — if blank or wrong, sensor is faulty","Try switching the temperature source to the indoor unit's sensor temporarily (field setting)","If accessible, check RC thermistor resistance","Try replacing the remote controller"],branches:[{condition:"RC shows no temperature",target:"Replace remote controller"},{condition:"Need immediate operation",target:"Switch field setting to use indoor unit return air sensor instead of RC sensor"}]}},// ── Outdoor Unit (E-prefix) ──
{code:"E1",category:"Outdoor",desc:"Outdoor unit main PCB abnormality",action:"Cycle power. If persists, replace outdoor main PCB.",details:{meaning:"The outdoor unit's main control PCB (A3P) has detected an internal error — EEPROM corruption, processor fault, or hardware failure. This is the brain of the outdoor unit and controls all compressor, valve, and fan operations.",causes:[{rank:1,text:"Power surge or lightning damaged the PCB"},{rank:2,text:"EEPROM data corrupted — configuration lost"},{rank:3,text:"PCB component failure — age or manufacturing defect"},{rank:4,text:"Moisture or insect damage on the PCB"}],checks:["Power cycle the outdoor unit — off for 60+ seconds, restore power","Visually inspect the outdoor PCB for burnt components, corrosion, or insect damage","Check for moisture in the electrical compartment","If E1 persists after power cycle, PCB replacement is required"],branches:[{condition:"Clears after power cycle",target:"Monitor — install surge protector to prevent recurrence"},{condition:"Persists",target:"Replace outdoor main PCB (A3P). Transfer all DIP switch settings and field settings"}]}},{code:"E3",category:"Outdoor",desc:"High pressure switch actuation",action:"Check stop valves fully open. Check refrigerant charge. Check condenser airflow.",subcodes:[{code:"E3-01/-03/-05",desc:"High pressure switch actuated (Master/Slave1/Slave2)"},{code:"E3-02/-04/-06",desc:"High pressure — refrigerant overcharge or closed stop valve"},{code:"E3-13/-14/-15",desc:"Liquid stop valve check error"},{code:"E3-18",desc:"Overall retry of high pressure switch"}],details:{meaning:"The high-pressure cutout switch has tripped — system pressure exceeded the safety limit. This is one of the most common Daikin VRV faults. Subcodes identify the specific module (master/slave) and whether it's a switch trip, overcharge detection, or stop valve issue. E3 locks out the compressor to prevent damage.",causes:[{rank:1,text:"Liquid stop valve not fully open — most common on new installs or after service"},{rank:2,text:"Dirty condenser coil — can't reject heat"},{rank:3,text:"Condenser fan not running or running slow"},{rank:4,text:"System overcharged with refrigerant"},{rank:5,text:"Non-condensibles (air) in system — from improper evacuation"},{rank:6,text:"High ambient temperature exceeding unit rating"}],checks:["Check ALL stop valves — liquid AND gas — verify fully open (back-seated)","Clean condenser coil — wash with approved coil cleaner","Verify all condenser fans are running at correct speed","Connect gauges — check high-side pressure and subcooling","Check refrigerant charge — high subcooling may indicate overcharge","Check subcode to identify which module (master/slave) is affected"],branches:[{condition:"Stop valve not fully open",target:"Open valve fully and restart — this is the #1 cause of E3 on new installs"},{condition:"Dirty condenser",target:"Clean coil thoroughly, verify all fans running"},{condition:"Subcooling very high (overcharged)",target:"Recover excess refrigerant to achieve spec subcooling"},{condition:"E3-13/-14/-15 stop valve check error",target:"Stop valve is likely partially closed — verify fully open"}]}},{code:"E4",category:"Outdoor",desc:"Low pressure sensor error",action:"Check refrigerant charge. Check for restrictions. Check LP sensor.",details:{meaning:"The low-pressure sensor on the outdoor unit is reading abnormally low or the sensor itself has failed. Low suction pressure means the evaporator is starved of refrigerant — either there's not enough charge, a restriction in the liquid line, or the sensor is giving a false reading.",causes:[{rank:1,text:"Low refrigerant charge — leak in the system"},{rank:2,text:"Restriction in liquid line — filter drier, kink, or blocked EEV"},{rank:3,text:"LP pressure sensor/transducer failed — false reading"},{rank:4,text:"All indoor units off — no demand, pressure drops"},{rank:5,text:"Gas stop valve partially closed"}],checks:["Connect gauges — compare actual low-side pressure to sensor reading on the controller","Check refrigerant charge — low charge = low suction pressure","Check for restrictions — feel along liquid line for temperature drops","Verify LP sensor connector is seated on outdoor PCB","Check all stop valves are fully open"],branches:[{condition:"Gauge matches sensor, pressure genuinely low",target:"Check charge — look for leaks, check EEVs for restriction"},{condition:"Gauge normal but sensor reads low",target:"Replace LP pressure sensor/transducer"},{condition:"All indoor units off",target:"Normal if no demand — E4 should clear when units call"}]}},{code:"E5",category:"Outdoor",desc:"Inverter compressor motor lock",action:"Check for mechanical lock. Check compressor wiring. Check inverter PCB.",details:{meaning:"The inverter tried to start the compressor but detected a locked rotor — the motor isn't turning. This could be a mechanically seized compressor, a wiring issue preventing proper motor drive, or an inverter board failure. The inverter will retry a limited number of times before locking out.",causes:[{rank:1,text:"Compressor mechanically seized — bearing failure or internal damage"},{rank:2,text:"Compressor wiring issue — loose terminal, corroded connection"},{rank:3,text:"Inverter PCB failure — can't drive the compressor motor properly"},{rank:4,text:"Liquid slugging — hydraulic lock from liquid refrigerant"},{rank:5,text:"Extreme high-side pressure preventing startup"}],checks:["Check compressor wiring at terminals — tighten and check for corrosion","Measure compressor winding resistance (U-V, V-W, U-W) — should be balanced and low ohms","Megohm test compressor to ground — should be >1MΩ","Check inverter PCB for burnt components or error LEDs","Equalize system pressure and retry — if compressor was flooded, let it warm up"],branches:[{condition:"Windings shorted or unbalanced",target:"Compressor has failed — replace compressor"},{condition:"Megohm test fails",target:"Compressor grounded — replace compressor"},{condition:"Windings OK, starts after pressure equalization",target:"Investigate why pressures were extreme — check EEVs and stop valves"},{condition:"Windings OK, inverter shows damage",target:"Replace inverter PCB"}]}},{code:"E7",category:"Outdoor",desc:"Outdoor fan motor abnormality",action:"Check for obstruction. Check fan motor harness. Check IPM on inverter PCB.",details:{meaning:"The outdoor fan motor has failed to run, is drawing excessive current, or its feedback signal is missing. On Daikin VRV, the outdoor fan is often DC brushless and driven by the inverter PCB's IPM (Intelligent Power Module). Problems can be the motor, the wiring, or the IPM itself.",causes:[{rank:1,text:"Physical obstruction — debris, ice, or foreign object in fan blade"},{rank:2,text:"Fan motor harness disconnected or damaged"},{rank:3,text:"Fan motor bearing failure — won't spin freely"},{rank:4,text:"Fan motor winding failure"},{rank:5,text:"IPM on inverter PCB failed — can't drive the fan motor"}],checks:["Power off and check fan blade — spin by hand, should rotate freely","Check for debris, ice, or obstructions around the fan","Check fan motor harness connection at the inverter/main PCB","Measure fan motor winding resistance — compare to spec","Check IPM section of inverter PCB for damage or error LEDs"],branches:[{condition:"Fan blocked or won't spin freely",target:"Clear obstruction or replace fan motor (bearing failure)"},{condition:"Harness disconnected",target:"Reconnect and verify fan runs"},{condition:"Motor OK but IPM damaged",target:"Replace inverter PCB"}]}},{code:"E9",category:"Outdoor",desc:"EEV coil abnormality (Y1E, Y2E, Y3E)",action:"Check EEV coil connections and resistance.",details:{meaning:"One of the outdoor unit's electronic expansion valve coils (Y1E, Y2E, or Y3E) has failed or is disconnected. The outdoor unit has multiple EEVs controlling refrigerant flow to different circuits. An open or shorted coil means the valve can't be controlled.",causes:[{rank:1,text:"EEV coil connector loose or disconnected from outdoor PCB"},{rank:2,text:"EEV coil failed — open winding"},{rank:3,text:"Wiring between PCB and EEV coil damaged"},{rank:4,text:"PCB EEV driver circuit failure"}],checks:["Identify which EEV is faulting — Y1E, Y2E, or Y3E","Check the coil connector at the outdoor PCB — reseat","Measure EEV coil resistance — compare to spec (typically 30-60Ω)","Inspect wiring for damage, especially where it passes through the unit housing"],branches:[{condition:"Connector loose",target:"Reseat connector and clear fault"},{condition:"Coil resistance open or shorted",target:"Replace EEV coil"},{condition:"Coil OK, connector OK",target:"Check PCB driver output — may need PCB replacement"}]}},// ── Outdoor Unit (F-prefix) ──
{code:"F3",category:"Outdoor",desc:"Discharge pipe high temp / compressor overheat",action:"Check refrigerant charge, stop valves, condenser airflow, EEV operation.",subcodes:[{code:"F3-01/-03/-05",desc:"Discharge pipe high temp (Master/Slave1/Slave2)"},{code:"F3-20/-21/-22",desc:"Compressor overheat (Master/Slave1/Slave2)"}],details:{meaning:"The compressor discharge temperature has exceeded the safety limit, or the compressor body temperature is too high. F3-01/-03/-05 = discharge pipe sensor detected overheat. F3-20/-21/-22 = compressor body overheat. Both indicate the compressor is working too hard or not getting enough cooling from suction gas.",causes:[{rank:1,text:"Low refrigerant charge — compressor overheats without suction gas cooling"},{rank:2,text:"Stop valve partially closed — restricted flow"},{rank:3,text:"Dirty condenser coil — high head pressure forces high discharge temp"},{rank:4,text:"EEV malfunction — not feeding enough refrigerant to evaporator"},{rank:5,text:"Discharge pipe thermistor fault — reading falsely high"},{rank:6,text:"Condenser fan not running — no heat rejection"}],checks:["Check refrigerant charge — connect gauges, check superheat and subcooling","Verify ALL stop valves (liquid and gas) are fully open","Check condenser coil cleanliness and fan operation","Check EEV operation — verify valves are opening properly","Check discharge pipe thermistor reading vs actual temperature","Check subcode to identify master vs slave module"],branches:[{condition:"Low charge confirmed",target:"Find and repair leak, recharge to nameplate spec"},{condition:"Stop valve partially closed",target:"Open fully — this is a very common cause"},{condition:"Condenser dirty or fan down",target:"Clean coil, repair/replace fan motor"},{condition:"Thermistor reads wrong",target:"Replace discharge pipe thermistor"}]}},{code:"F4",category:"Outdoor",desc:"Wet alarm — liquid refrigerant in compressor",action:"Check EEV operation. Check refrigerant charge. Check for liquid flood-back.",details:{meaning:"Liquid refrigerant is returning to the compressor — the suction line is carrying liquid instead of gas. This can cause severe compressor damage (liquid can't be compressed). The system detects this by monitoring suction superheat — zero or negative superheat means liquid is present.",causes:[{rank:1,text:"Indoor EEV stuck open — flooding refrigerant back to compressor"},{rank:2,text:"System overcharged — excess liquid has nowhere to go"},{rank:3,text:"Outdoor EEV malfunction — improper refrigerant metering"},{rank:4,text:"Indoor units running at very low load — not evaporating all refrigerant"},{rank:5,text:"Suction pipe thermistor fault — false wet alarm"}],checks:["Check suction superheat — should be positive (typically 5-15°F). Zero or negative = liquid flood-back","Check indoor EEV operation — use monitor mode to verify valve positions","Check refrigerant charge — overcharge can cause liquid flood-back at low loads","Check suction pipe thermistor — compare reading to actual pipe temperature","Check if fault occurs at low ambient — liquid may accumulate in outdoor coil"],branches:[{condition:"Superheat is zero/negative",target:"Check indoor EEVs — one may be stuck open. Check for overcharge"},{condition:"Overcharged system",target:"Recover excess refrigerant"},{condition:"Only at low ambient",target:"Check low-ambient operation settings and crankcase heater"}]}},{code:"F6",category:"Outdoor",desc:"Refrigerant overcharged",action:"Recover excess refrigerant. Recalculate charge from piping lengths.",subcodes:[{code:"F6-02",desc:"Refrigerant overcharged (confirmed)"}],details:{meaning:"The system has determined it is overcharged with refrigerant. High subcooling at the condenser outlet is the primary indicator. Daikin VRV calculates the expected charge from piping lengths and indoor unit count — if actual operating conditions show significantly more refrigerant than expected, F6 is triggered.",causes:[{rank:1,text:"Too much refrigerant added during charging — piping length calculation was wrong"},{rank:2,text:"Auto-charge procedure was interrupted and restarted, adding double charge"},{rank:3,text:"Wrong piping length entered during commissioning — charge calculation off"},{rank:4,text:"HP sensor reading falsely high — system thinks it's overcharged"}],checks:["Recalculate the correct charge from actual piping lengths (use Daikin charge calculator)","Check subcooling at condenser outlet — very high subcooling confirms overcharge","Recover excess refrigerant to match the calculated charge amount","Check HP sensor reading against gauges — rule out false reading"],branches:[{condition:"Subcooling confirms overcharge",target:"Recover refrigerant to calculated spec amount"},{condition:"HP sensor reads wrong",target:"Replace HP sensor — recalibrate"},{condition:"Piping length was entered wrong",target:"Correct piping length in field settings and recalculate charge"}]}},// ── Outdoor Unit (H/J-prefix) ──
{code:"H3",category:"Outdoor",desc:"Harness error — outdoor main PCB to inverter PCB",action:"Check harness between A3P/A6P. Reseat connectors.",details:{meaning:"The communication harness between the outdoor main PCB (A3P) and the inverter PCB (A6P) is faulty. These two boards must communicate constantly — the main board tells the inverter what speed to run the compressor, and the inverter reports back operating data.",causes:[{rank:1,text:"Harness connector loose at A3P or A6P end"},{rank:2,text:"Harness cable damaged — broken wire or pinched during service"},{rank:3,text:"Connector pins corroded or bent"},{rank:4,text:"One PCB replaced with wrong revision — harness pinout mismatch"}],checks:["Reseat harness connectors at both the main PCB (A3P) and inverter PCB (A6P)","Inspect harness for physical damage — kinked, pinched, or cut wires","Check connector pins for corrosion or bending","Verify both PCBs are correct revision for this unit model"],branches:[{condition:"Loose connector",target:"Reseat firmly and power cycle"},{condition:"Damaged harness",target:"Replace harness"},{condition:"PCB revision mismatch",target:"Order correct PCB to match the existing board"}]}},{code:"H7",category:"Outdoor",desc:"Outdoor fan motor signal detection error",action:"Check fan motor harness and signal feedback.",details:{meaning:"The outdoor fan motor's speed/position feedback signal is missing or abnormal. DC brushless fan motors send a speed signal back to the PCB — if this signal is lost, the PCB can't confirm the fan is actually running or at the correct speed.",causes:[{rank:1,text:"Fan motor harness disconnected or loose"},{rank:2,text:"Fan motor Hall sensor failed — no feedback signal"},{rank:3,text:"Fan motor has failed — not spinning"},{rank:4,text:"Harness wire damaged between motor and PCB"}],checks:["Check fan motor harness connection at the PCB — reseat","Verify fan is actually spinning when commanded","Check harness for damage","If fan spins but signal is lost, Hall sensor in motor has failed — replace motor"],branches:[{condition:"Harness loose",target:"Reseat and test"},{condition:"Fan not spinning",target:"Check motor, blade obstruction, motor winding resistance"},{condition:"Fan spins but no feedback",target:"Replace fan motor (Hall sensor failed)"}]}},{code:"H9",category:"Outdoor",desc:"Outdoor air thermistor (R1T) abnormality",action:"Check R1T thermistor connection and resistance.",details:{meaning:"The outdoor ambient air temperature sensor (R1T) is reading out of range. This sensor tells the system what the outdoor temperature is — critical for compressor speed control, defrost logic, and capacity calculations.",causes:[{rank:1,text:"R1T connector disconnected from outdoor PCB"},{rank:2,text:"R1T thermistor failed — open or short"},{rank:3,text:"Wiring damaged — weather exposure or rodent damage"},{rank:4,text:"R1T mounted in direct sunlight or near heat source — false high reading"}],checks:["Check R1T connector on outdoor PCB — reseat","Disconnect R1T and measure resistance — compare to Daikin thermistor chart","Inspect wiring for weather damage","Verify R1T is mounted in the proper location — protected from direct sun"],branches:[{condition:"Open or short",target:"Replace R1T thermistor"},{condition:"Mounted in bad location",target:"Relocate to proper position per installation manual"}]}},{code:"J3",category:"Outdoor",desc:"Discharge pipe thermistor (R21T/R22T) or compressor body (R8T)",action:"Check thermistor connections and resistance values.",details:{meaning:"One of the outdoor discharge pipe thermistors (R21T or R22T) or the compressor body thermistor (R8T) is out of range. These sensors protect the compressor from overheating. R21T/R22T monitor discharge pipe temp, R8T monitors the compressor shell.",causes:[{rank:1,text:"Thermistor connector loose on outdoor PCB"},{rank:2,text:"Thermistor failed — open or short circuit"},{rank:3,text:"Thermistor dislodged from its mounting position"},{rank:4,text:"Wiring damaged"}],checks:["Identify which sensor is faulting — R21T, R22T, or R8T","Check connector at outdoor PCB","Disconnect and measure resistance — compare to spec chart","Verify sensor is properly mounted against the pipe or compressor body"],branches:[{condition:"Open or short",target:"Replace the faulty thermistor"},{condition:"Dislodged",target:"Re-mount with thermal paste and secure clamp"}]}},{code:"J5",category:"Outdoor",desc:"Accumulator inlet thermistor (R3T) abnormality",action:"Check R3T connection and resistance.",details:{meaning:"The accumulator inlet thermistor (R3T) is out of range. This sensor monitors the suction gas temperature before it enters the accumulator — used for superheat calculation and compressor protection against liquid flood-back.",causes:[{rank:1,text:"R3T connector loose on outdoor PCB"},{rank:2,text:"Thermistor failed — open or short"},{rank:3,text:"Wiring damaged"}],checks:["Check R3T connector on outdoor PCB","Disconnect and measure resistance","Inspect wiring for damage"],branches:[{condition:"Open or short",target:"Replace R3T thermistor"},{condition:"Connector issue",target:"Reseat or replace connector"}]}},{code:"J6",category:"Outdoor",desc:"Heat exchanger deicer thermistor (R7T) abnormality",action:"Check R7T connection and resistance.",details:{meaning:"The deicer thermistor (R7T) on the outdoor heat exchanger is out of range. R7T monitors coil temperature for defrost initiation and termination in heating mode. Without it, the system can't properly manage defrost cycles.",causes:[{rank:1,text:"R7T connector loose on outdoor PCB"},{rank:2,text:"Thermistor failed"},{rank:3,text:"Sensor dislodged from the outdoor coil"},{rank:4,text:"Wiring damaged by weather"}],checks:["Check R7T connector on outdoor PCB","Disconnect and measure resistance","Verify sensor is mounted against the outdoor coil in correct position"],branches:[{condition:"Open or short",target:"Replace R7T thermistor"},{condition:"Dislodged from coil",target:"Re-mount against the coil with thermal contact"}]}},{code:"J7",category:"Outdoor",desc:"Subcooling HX liquid pipe thermistor (R5T)",action:"Check R5T connection and resistance.",details:{meaning:"The subcooling heat exchanger liquid pipe thermistor (R5T) is out of range. R5T monitors the liquid temperature leaving the subcooling circuit — critical for ensuring proper subcooling before refrigerant reaches the indoor units.",causes:[{rank:1,text:"R5T connector loose"},{rank:2,text:"Thermistor failed"},{rank:3,text:"Wiring damaged"}],checks:["Check R5T connector on outdoor PCB","Disconnect and measure resistance","Inspect wiring"],branches:[{condition:"Open or short",target:"Replace R5T"},{condition:"Connector issue",target:"Reseat connector"}]}},{code:"J8",category:"Outdoor",desc:"Heat exchanger liquid pipe thermistor (R4T)",action:"Check R4T connection and resistance.",details:{meaning:"The outdoor heat exchanger liquid pipe thermistor (R4T) is out of range. R4T monitors liquid temperature at the outdoor coil — used for subcooling calculation in cooling mode and evaporating temperature monitoring in heating mode.",causes:[{rank:1,text:"R4T connector loose"},{rank:2,text:"Thermistor failed"},{rank:3,text:"Wiring damaged"}],checks:["Check R4T connector on outdoor PCB","Disconnect and measure resistance","Inspect wiring"],branches:[{condition:"Open or short",target:"Replace R4T"},{condition:"Connector issue",target:"Reseat connector"}]}},{code:"J9",category:"Outdoor",desc:"Heat exchanger gas pipe thermistor (R6T)",action:"Check R6T connection and resistance.",details:{meaning:"The outdoor heat exchanger gas pipe thermistor (R6T) is out of range. R6T monitors gas temperature at the outdoor coil — important for capacity control and defrost management.",causes:[{rank:1,text:"R6T connector loose"},{rank:2,text:"Thermistor failed"},{rank:3,text:"Wiring damaged"}],checks:["Check R6T connector on outdoor PCB","Disconnect and measure resistance","Inspect wiring"],branches:[{condition:"Open or short",target:"Replace R6T"},{condition:"Connector issue",target:"Reseat connector"}]}},{code:"JA",category:"Outdoor",desc:"High pressure sensor open/short",action:"Check HP sensor wiring and connector.",details:{meaning:"The high-pressure sensor (transducer) on the outdoor unit has an open or short circuit — the sensor itself has failed, not that the pressure is abnormally high. Without this sensor, the system can't monitor discharge pressure for safety protection.",causes:[{rank:1,text:"HP sensor connector disconnected from outdoor PCB"},{rank:2,text:"HP sensor/transducer has failed internally"},{rank:3,text:"Wiring damaged between sensor and PCB"},{rank:4,text:"Connector pins corroded"}],checks:["Check HP sensor connector on outdoor PCB — reseat","Measure sensor output voltage — should change with pressure","Check wiring for damage","Inspect connector for corrosion"],branches:[{condition:"Connector loose",target:"Reseat and verify reading"},{condition:"No output or fixed output",target:"Replace HP pressure sensor"}]}},{code:"JC",category:"Outdoor",desc:"Low pressure sensor open/short",action:"Check LP sensor wiring and connector.",details:{meaning:"The low-pressure sensor (transducer) has an open or short circuit — sensor hardware failure, not a pressure issue. Without this sensor, suction pressure monitoring and superheat calculations are disabled.",causes:[{rank:1,text:"LP sensor connector disconnected from outdoor PCB"},{rank:2,text:"LP sensor has failed internally"},{rank:3,text:"Wiring damaged"},{rank:4,text:"Connector corrosion"}],checks:["Check LP sensor connector on outdoor PCB — reseat","Measure sensor output voltage","Check wiring for damage"],branches:[{condition:"Connector loose",target:"Reseat and verify"},{condition:"Sensor failed",target:"Replace LP pressure sensor"}]}},// ── Outdoor Unit (L-prefix) ──
{code:"L1",category:"Outdoor",desc:"Inverter PCB abnormality (overcurrent, power transistors, ROM)",action:"Check inverter PCB. Check compressor wiring. May need PCB replacement.",details:{meaning:"The inverter PCB (A6P) has detected a critical internal error — overcurrent in the power transistors, ROM checksum failure, or hardware malfunction. This board converts DC bus power into variable-frequency AC to drive the compressor. L1 is a serious fault that usually requires PCB replacement.",causes:[{rank:1,text:"Power surge damaged the inverter PCB power transistors"},{rank:2,text:"Compressor winding short — caused overcurrent through the inverter"},{rank:3,text:"Inverter PCB component failure — age or defect"},{rank:4,text:"ROM/firmware corruption on the inverter PCB"},{rank:5,text:"Moisture or contamination on the PCB"}],checks:["Check compressor wiring first — loose or shorted compressor terminals can blow inverter components","Measure compressor winding resistance and megohm to ground — a shorted compressor will destroy a new inverter PCB","Inspect inverter PCB for visually burnt or damaged components","Check for moisture or contamination in the electrical compartment","If compressor checks OK, replace inverter PCB"],branches:[{condition:"Compressor windings shorted/grounded",target:"Replace compressor FIRST, then inverter PCB — installing new PCB with bad compressor will destroy it"},{condition:"Compressor OK, inverter damaged",target:"Replace inverter PCB (A6P)"},{condition:"Moisture damage",target:"Dry compartment, seal entry points, replace PCB"}]}},{code:"L4",category:"Outdoor",desc:"Radiation fin temperature rise (inverter PCB)",action:"Check inverter PCB cooling. Clean fins. Check ambient conditions.",details:{meaning:"The heat sink (radiation fins) on the inverter PCB has exceeded its temperature limit. The inverter generates heat when driving the compressor — the heat sink must be cooled by airflow from the outdoor fan. L4 means the heat sink is overheating.",causes:[{rank:1,text:"Heat sink fins clogged with dust or debris — reduced cooling"},{rank:2,text:"Outdoor fan not running — no airflow across heat sink"},{rank:3,text:"Very high ambient temperature — exceeds cooling capacity"},{rank:4,text:"Heat sink thermal compound dried out — poor thermal transfer"},{rank:5,text:"Heat sink thermistor reading falsely high"}],checks:["Clean the inverter heat sink fins — remove dust and debris","Verify outdoor fan is running when the compressor operates","Check ambient temperature — may be operating above rated conditions","Check heat sink thermistor reading vs actual temperature"],branches:[{condition:"Heat sink dirty",target:"Clean fins thoroughly and restart"},{condition:"Fan not running",target:"Fix fan motor issue (see E7)"},{condition:"Ambient too high",target:"Provide shade or additional ventilation for the outdoor unit"}]}},{code:"L5",category:"Outdoor",desc:"Inverter compressor instantaneous overcurrent",action:"Check compressor wiring. Check for mechanical lock.",details:{meaning:"The inverter detected a sudden current spike from the compressor — an instantaneous overcurrent event. This could be a momentary mechanical resistance, a wiring fault, or a compressor starting to fail. The inverter shuts down instantly to protect its power transistors.",causes:[{rank:1,text:"Compressor terminal connection loose — arcing causes current spikes"},{rank:2,text:"Compressor starting to seize — intermittent mechanical resistance"},{rank:3,text:"Liquid slugging — slug of liquid refrigerant hit the compressor"},{rank:4,text:"Compressor winding starting to short — intermittent turn-to-turn short"},{rank:5,text:"Inverter PCB power stage degraded"}],checks:["Check compressor terminal connections — tighten all terminals","Measure compressor winding resistance — check for balance and shorts","Megohm test to ground","Check for liquid flood-back — verify positive superheat","If wiring and compressor check OK, monitor for recurrence — may be intermittent mechanical issue"],branches:[{condition:"Loose terminal found",target:"Tighten and clean terminal — apply anti-oxidant compound"},{condition:"Windings unbalanced or low resistance",target:"Compressor is failing — plan replacement"},{condition:"Intermittent, all checks OK",target:"Monitor closely — increasing frequency means compressor is deteriorating"}]}},{code:"L8",category:"Outdoor",desc:"Inverter compressor overcurrent",action:"Check compressor winding resistance. Check power supply.",details:{meaning:"The compressor is drawing sustained overcurrent — not a spike like L5, but a continuous high-current condition. The compressor is working too hard or has an electrical issue. This is more serious than L5 and indicates a persistent problem.",causes:[{rank:1,text:"Compressor winding partial short — draws excess current"},{rank:2,text:"Low supply voltage — compressor draws more current to compensate"},{rank:3,text:"Compressor mechanical wear — increased friction"},{rank:4,text:"Extremely high head pressure — compressor overloaded"},{rank:5,text:"Inverter PCB output stage issue"}],checks:["Measure compressor winding resistance (U-V, V-W, U-W) — should be balanced, typically <1Ω per phase","Megohm test to ground — should be >1MΩ","Check supply voltage at outdoor disconnect — within ±10%","Connect gauges — check for abnormally high head pressure","Check compressor current with clamp meter during operation"],branches:[{condition:"Windings unbalanced or shorted",target:"Replace compressor"},{condition:"Low voltage",target:"Fix power supply — wire sizing, connections, utility"},{condition:"High head pressure",target:"Address cause — condenser, fan, overcharge"}]}},{code:"L9",category:"Outdoor",desc:"Inverter compressor startup abnormality",action:"Check compressor and inverter PCB. May indicate compressor failure.",details:{meaning:"The inverter attempted to start the compressor but failed to achieve proper rotation. Unlike E5 (locked rotor), L9 may indicate the compressor started but couldn't maintain operation, or the inverter couldn't synchronize with the compressor motor.",causes:[{rank:1,text:"Compressor bearing wear — can start but can't maintain speed"},{rank:2,text:"Inverter PCB losing synchronization with compressor"},{rank:3,text:"Low supply voltage during startup"},{rank:4,text:"Excessive liquid refrigerant in compressor at startup"},{rank:5,text:"Compressor wiring issue — intermittent connection"}],checks:["Check compressor wiring connections","Measure winding resistance and megohm to ground","Check supply voltage during startup attempt","Verify crankcase heater is working — liquid accumulation causes startup issues","Check inverter PCB for error LEDs or visible damage"],branches:[{condition:"Compressor tests bad",target:"Replace compressor"},{condition:"Starts sometimes, fails others",target:"Check crankcase heater, check for liquid migration. Monitor for worsening"},{condition:"Inverter PCB shows damage",target:"Replace inverter PCB after confirming compressor is good"}]}},{code:"LC",category:"Outdoor",desc:"Transmission error — inverter PCB to outdoor main PCB",action:"Check harness between PCBs. Reseat connectors.",details:{meaning:"The inverter PCB (A6P) and the outdoor main PCB (A3P) have lost communication. Similar to H3 but detected from the inverter side. The harness between these boards carries critical control data.",causes:[{rank:1,text:"Harness connector loose at either end"},{rank:2,text:"Harness cable damaged"},{rank:3,text:"Connector pin corrosion"},{rank:4,text:"Inverter or main PCB communication circuit failure"}],checks:["Reseat harness at both A3P and A6P ends","Inspect harness for damage","Check connector pins for corrosion","If persists after reseating, swap harness if possible"],branches:[{condition:"Harness loose",target:"Reseat and power cycle"},{condition:"Harness OK, persists",target:"Check both PCBs — replace the one with failed comm circuit"}]}},// ── Outdoor Unit (P-prefix) ──
{code:"P1",category:"Outdoor",desc:"Power supply voltage imbalance / open phase",action:"Check all 3 phases. Verify voltage within spec at disconnect.",details:{meaning:"The 3-phase power supply to the outdoor unit has a phase imbalance or one phase is missing. Voltage imbalance causes motor overheating and can destroy compressors. Daikin VRV monitors all three phases and shuts down if the imbalance exceeds the threshold.",causes:[{rank:1,text:"One phase has dropped out — fuse blown, breaker tripped, or utility issue"},{rank:2,text:"Significant voltage imbalance between phases — utility or wiring issue"},{rank:3,text:"Loose connection on one phase causing intermittent dropout"},{rank:4,text:"Contactor with one set of burnt contacts"}],checks:["Measure voltage L1-L2, L2-L3, L1-L3 at the outdoor disconnect — all should be within ±10% of each other","Check all fuses if present","Inspect contactor contacts for pitting or burning","Tighten all power connections from breaker to unit","Check voltage at the main panel to rule out utility issue"],branches:[{condition:"One phase missing",target:"Trace and restore missing phase — fuse, breaker, connection"},{condition:"Voltages unbalanced >10%",target:"Check utility supply, transformer, and connections"},{condition:"Contactor contacts burned",target:"Replace contactor"}]}},{code:"PJ",category:"Outdoor",desc:"Field setting error / PCB combination mismatch",action:"After outdoor PCB replacement, verify DIP switch settings match model. Check spare PCB settings table.",details:{meaning:"The outdoor PCB field settings (DIP switches) don't match the unit model, or the PCB combination (main + inverter) is incorrect for this unit. Most commonly occurs after a PCB replacement when the technician didn't properly configure the DIP switches for the specific model.",causes:[{rank:1,text:"DIP switches not set correctly after PCB replacement"},{rank:2,text:"Wrong PCB installed — part number doesn't match the unit model"},{rank:3,text:"Main PCB and inverter PCB are incompatible revisions"},{rank:4,text:"DIP switches accidentally bumped during service"}],checks:["Check the outdoor unit model number on the nameplate","Reference the spare PCB settings table in the service manual — set ALL DIP switches per the table","Verify the replacement PCB part number matches what's specified for this model","Check that main PCB and inverter PCB are compatible revisions"],branches:[{condition:"DIP switches wrong",target:"Correct all DIP switches per the service manual settings table and power cycle"},{condition:"Wrong PCB installed",target:"Order and install correct PCB for the unit model"}]}},// ── System (U-prefix) ──
{code:"U0",category:"System",desc:"Refrigerant shortage alarm (system continues)",action:"Check for leaks. Verify charge amount. System continues operating but at reduced capacity.",subcodes:[{code:"U0-05/-06",desc:"Refrigerant shortage alarm"},{code:"U0-08/-09/-10",desc:"Shortage detected (Master/Slave1/Slave2)"}],details:{meaning:"The system has detected low refrigerant charge based on operating conditions (low superheat, low suction pressure, or low subcooling). Unlike a hard lockout, the system continues running at reduced capacity. This is an early warning — address it before it becomes a hard fault (E4).",causes:[{rank:1,text:"Refrigerant leak — flared connections, brazed joints, or valve stems"},{rank:2,text:"System was undercharged during initial commissioning"},{rank:3,text:"Slow leak that has reduced charge over time"},{rank:4,text:"Pressure sensor drift — reading lower than actual (rare)"}],checks:["Connect gauges — check suction pressure and superheat","Check subcooling at condenser outlet","Perform leak check — electronic detector at all connections, especially flares and service valves","Check subcode to identify which module detected the shortage","Verify charge amount against nameplate + piping length calculation"],branches:[{condition:"Leak found",target:"Repair leak, evacuate, and recharge to calculated spec"},{condition:"No leak found, charge is low",target:"System was undercharged — add refrigerant to spec"},{condition:"Charge seems correct",target:"Check pressure sensors — may need recalibration"}]}},{code:"U1",category:"System",desc:"Reverse phase / open phase",action:"Swap L2 and L3 at disconnect. Check all 3 phases present. On multi-module: use Monitor Mode 1-17 to identify which unit.",subcodes:[{code:"U1-01/-05/-07",desc:"Reverse/open phase (Master/Slave1/Slave2)"},{code:"U1-04/-06/-08",desc:"Reverse phase at power-on"}],details:{meaning:"The 3-phase power is either in the wrong rotation sequence (reverse phase) or one phase is missing (open phase). Reverse phase will run the compressor and fans backwards, causing immediate damage. The system locks out for protection.",causes:[{rank:1,text:"Phases wired in wrong sequence — common after electrical work or new installation"},{rank:2,text:"One phase is missing — blown fuse, tripped breaker, loose wire"},{rank:3,text:"Utility power phase rotation changed after outage"}],checks:["Use a phase rotation meter to verify correct sequence","Measure all three phase-to-phase voltages — all should be present and balanced","On multi-module systems, use Monitor Mode 1-17 to identify which specific outdoor unit is affected","Swap L2 and L3 at the disconnect to correct phase rotation"],branches:[{condition:"Phase rotation reversed",target:"Swap any two of the three phases at the disconnect"},{condition:"One phase missing",target:"Check fuses, breaker, and connections for the missing phase"}]}},{code:"U2",category:"System",desc:"Power supply insufficient / instantaneous failure",action:"Check power supply stability. Check capacitors on outdoor PCB.",details:{meaning:"The outdoor unit experienced a momentary power interruption or voltage dip — the DC bus voltage dropped below the minimum threshold. This could be a utility power quality issue or aging capacitors on the outdoor PCB that can't filter momentary dips.",causes:[{rank:1,text:"Utility power quality issue — momentary voltage sag or brownout"},{rank:2,text:"DC bus capacitors on outdoor PCB are aging — can't hold voltage through dips"},{rank:3,text:"Loose power connections causing intermittent voltage drops"},{rank:4,text:"Large motor loads nearby causing voltage dips when starting"}],checks:["Check power supply voltage stability — monitor with a recording meter if possible","Inspect DC bus capacitors on outdoor PCB — look for bulging or leaking","Check all power connections for tightness","Check if the issue correlates with other equipment starting (elevators, pumps, etc.)"],branches:[{condition:"Capacitors bulging or leaking",target:"Replace DC bus capacitors on outdoor PCB"},{condition:"Utility power quality issue",target:"Install voltage stabilizer or contact utility"},{condition:"Loose connections",target:"Tighten all power connections from panel to unit"}]}},{code:"U3",category:"System",desc:"Check Operation not executed or failed",action:"Ensure ALL RCs are OFF. Run Check Operation (hold TEST 5 sec).",subcodes:[{code:"U3-02",desc:"Check op failed due to indoor unit error"},{code:"U3-03",desc:"Test operation not conducted"},{code:"U3-04",desc:"Abnormal end"},{code:"U3-05",desc:"Premature end — IDU error U4/U9"},{code:"U3-06",desc:"Premature end — normal transmission error"},{code:"U3-07",desc:"Premature end — transmission error"},{code:"U3-08",desc:"Premature end — all units transmission error"}],details:{meaning:"The required Check Operation (test run) after commissioning was either not performed or failed to complete. Daikin VRV requires a successful Check Operation before the system will run normally. Hold the TEST button for 5 seconds on the outdoor unit to initiate. All remote controllers must be OFF during the test.",causes:[{rank:1,text:"Check Operation was never run after installation"},{rank:2,text:"Remote controllers were left ON during Check Operation"},{rank:3,text:"Indoor unit had an error that prevented test completion"},{rank:4,text:"Communication error between indoor and outdoor during test"},{rank:5,text:"Test was interrupted by power loss"}],checks:["Turn OFF all remote controllers — every single one must be off","Hold the TEST button on the outdoor unit for 5 seconds to start Check Operation","Monitor for errors during the test — check subcodes for what went wrong","If U3-02, fix the indoor unit error first, then re-run Check Operation","If U3-05 through U3-08, fix communication wiring first"],branches:[{condition:"Never run",target:"Turn all RCs off, hold TEST 5 sec — let Check Operation complete"},{condition:"Indoor unit error (U3-02)",target:"Fix the indoor error code first, then re-run"},{condition:"Communication error",target:"Fix F1/F2 wiring, then re-run Check Operation"}]}},{code:"U4",category:"System",desc:"Transmission error — indoor to outdoor",action:"Check F1/F2 communication wiring between IDUs and ODU. Verify 24VDC on F1/F2.",details:{meaning:"The indoor and outdoor units can't communicate on the F1/F2 DIII-NET communication bus. This is one of the most common Daikin VRV faults, especially on new installations. F1/F2 carries 24VDC communication signals between all units in the system.",causes:[{rank:1,text:"F1/F2 wiring disconnected, broken, or shorted"},{rank:2,text:"F1 and F2 wires swapped (reversed polarity)"},{rank:3,text:"F1/F2 wire shorted to ground or to each other"},{rank:4,text:"Outdoor unit not powered — no 24VDC on F1/F2 bus"},{rank:5,text:"Indoor unit PCB communication circuit failure"},{rank:6,text:"Communication wire run too long or wrong gauge"}],checks:["Verify 24VDC is present on F1/F2 terminals at the outdoor unit — if not, outdoor PCB may be the issue","Check F1/F2 wiring at every indoor unit and outdoor unit terminal block","Verify F1 goes to F1 and F2 goes to F2 — no polarity reversal","Check for shorts — measure F1 to ground and F2 to ground with power off","Verify communication wire is shielded and grounded at one end only (outdoor unit)"],branches:[{condition:"No 24VDC on F1/F2",target:"Check outdoor unit power and main PCB — it provides bus voltage"},{condition:"Wiring reversed",target:"Correct F1/F2 polarity and restart"},{condition:"Wire damaged or shorted",target:"Repair or replace F1/F2 communication cable"}]}},{code:"U5",category:"System",desc:"Transmission error — RC to indoor unit",action:"Check RC wiring. Check RC PCB. Try replacement RC.",details:{meaning:"The wired remote controller cannot communicate with its indoor unit. The remote controller connects via a separate communication cable. This is isolated from the F1/F2 bus — it's just the controller-to-indoor unit link.",causes:[{rank:1,text:"Remote controller wiring disconnected or damaged"},{rank:2,text:"Remote controller PCB failure"},{rank:3,text:"Indoor unit PCB remote controller input failure"},{rank:4,text:"Wrong remote controller model — incompatible with this indoor unit"}],checks:["Check wiring between remote controller and indoor unit — verify connections at both ends","Try a known-good remote controller to isolate the fault","Check for voltage at the remote controller terminals on the indoor unit","Verify the remote controller model is compatible"],branches:[{condition:"Wiring fault",target:"Repair or replace remote controller wiring"},{condition:"RC swapped and works",target:"Replace faulty remote controller"},{condition:"No RC works",target:"Indoor unit PCB remote input may be failed"}]}},{code:"U7",category:"System",desc:"Transmission error between outdoor units",action:"Check Q1/Q2 wiring between outdoor modules. Check 2-51 master/slave setting. Single outdoor: remove Q1-Q2 jumper wire.",subcodes:[{code:"U7-01",desc:"External control adaptor error"},{code:"U7-02",desc:"External control adaptor alarm"},{code:"U7-03",desc:"Master-Slave1 transmission error"},{code:"U7-04",desc:"Master-Slave2 transmission error"},{code:"U7-05",desc:"Multi system error"},{code:"U7-06",desc:"Address setting error (slave 1 and 2)"},{code:"U7-07",desc:"4+ outdoor units in same system"},{code:"U7-11",desc:"IDU connection capacity error for test operation"}],details:{meaning:"Communication has failed between outdoor unit modules in a multi-outdoor system. Outdoor modules communicate on Q1/Q2 wiring (separate from F1/F2). Subcodes identify whether it's master-slave communication, address settings, or external control adaptor issues.",causes:[{rank:1,text:"Q1/Q2 wiring between outdoor modules disconnected or damaged"},{rank:2,text:"Master/slave field setting (2-51) not set correctly on one or more modules"},{rank:3,text:"On single outdoor systems: Q1-Q2 jumper wire needs to be removed"},{rank:4,text:"Address conflict — slave units have duplicate addresses"},{rank:5,text:"More than 3 outdoor units on one system (max is usually 3)"}],checks:["Check Q1/Q2 wiring between all outdoor modules — verify connections","Verify field setting 2-51 — one unit must be master, others slave (unique addresses)","If single outdoor unit, verify no Q1-Q2 jumper is present (remove if found)","Check subcodes to identify which specific module or issue","Verify total outdoor modules doesn't exceed system maximum (typically 3)"],branches:[{condition:"Q1/Q2 wiring issue",target:"Repair inter-unit communication wiring"},{condition:"Master/slave settings wrong",target:"Correct field setting 2-51 on each module"},{condition:"Single unit with jumper",target:"Remove Q1-Q2 jumper wire"}]}},{code:"U8",category:"System",desc:"Transmission error — main/sub remote controllers",action:"Check wiring between main and sub RCs.",details:{meaning:"When multiple remote controllers are wired to the same indoor unit or group (main + sub controllers), they communicate with each other. U8 means this controller-to-controller communication has failed.",causes:[{rank:1,text:"Wiring between main and sub remote controllers is broken or loose"},{rank:2,text:"One remote controller has failed"},{rank:3,text:"Main/sub designation not set correctly on the controllers"}],checks:["Check wiring between the main and sub remote controllers","Verify main/sub settings on each controller — only one can be main","Try disconnecting the sub controller — if error clears, sub controller is the issue"],branches:[{condition:"Wiring fault",target:"Repair wiring between controllers"},{condition:"Sub controller faulty",target:"Replace sub remote controller"}]}},{code:"U9",category:"System",desc:"Other indoor unit in system has an error",action:"Check all other indoor units for active error codes. Fix the source error.",details:{meaning:"This indoor unit is reporting U9 because a DIFFERENT indoor unit on the same system has an active error. U9 is a relay code — this unit is fine, but it's telling you something else in the system is broken. Find and fix the actual error on the other unit.",causes:[{rank:1,text:"Another indoor unit on the same refrigerant system has an active fault"},{rank:2,text:"The faulted unit may have caused the outdoor unit to stop, affecting all indoor units"}],checks:["Check ALL other indoor units on this system for active error codes","Check the outdoor unit for error codes","Use the centralized controller or check each RC to find the unit with the actual fault","Fix the source error — U9 will clear automatically when the other unit's error is resolved"],branches:[{condition:"Found the faulted unit",target:"Fix that unit's specific error code — U9 will clear"},{condition:"Can't find the error",target:"Check outdoor unit error history — may show which indoor unit caused the issue"}]}},{code:"UA",category:"System",desc:"Improper combination / connection error",action:"Check indoor-outdoor unit compatibility.",subcodes:[{code:"UA-17",desc:"Excessive indoor units connected"},{code:"UA-18",desc:"Wrong model indoor units"},{code:"UA-20",desc:"Improper outdoor unit combination"},{code:"UA-21",desc:"Connection error"},{code:"UA-29",desc:"BSV branch selector connected to heat pump system (HR only)"},{code:"UA-31",desc:"Multi-unit combination error"},{code:"UA-38",desc:"Daikin Altherma IDU detected"},{code:"UA-50/-51",desc:"RA/hydrobox combination errors"}],details:{meaning:"The system detected an incompatible combination of equipment. Daikin VRV is strict about which indoor units can connect to which outdoor units, capacity ratios, and whether heat pump (HP) vs heat recovery (HR) components are mixed. The subcodes pinpoint the specific mismatch.",causes:[{rank:1,text:"Indoor unit model not compatible with this outdoor unit series"},{rank:2,text:"Too many indoor units connected — exceeds maximum count or capacity ratio"},{rank:3,text:"Heat recovery BS box connected to
