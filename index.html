ermistor connector loose on inverter board"},{rank:2,text:"Thermistor failed — open or shorted"},{rank:3,text:"Inverter PBA1 board connector damaged"}],checks:["Check heatsink thermistor connector on inverter PBA1","Measure thermistor resistance — should be ~10kΩ at 25°C","Inspect wiring between thermistor and PCB"],branches:[{condition:"Connector loose",target:"Reseat thermistor connector"},{condition:"Thermistor failed",target:"Replace thermistor — or replace inverter PBA1 if integral"}]}},{code:"E485",category:"Outdoor",desc:"Inverter 1 input current sensor error",action:"Input current sensor fault. Check CT sensor wiring on main PBA.",details:{meaning:"The input current sensor (CT) on the main PBA is reading abnormally. This sensor monitors total unit input current for overload protection.",causes:[{rank:1,text:"CT sensor connector loose on main PBA"},{rank:2,text:"CT sensor failed"},{rank:3,text:"Main PBA input circuit fault"}],checks:["Check CT sensor wiring and connector on main PBA","Compare PCB current reading to actual clamp meter measurement","Inspect CT sensor for physical damage"],branches:[{condition:"Connector loose",target:"Reseat CT sensor connector on main PBA"},{condition:"CT sensor failed",target:"Replace CT sensor — or replace main PBA if integral"}]}},{code:"E500",category:"Outdoor",desc:"IPM (inverter module) overheating",action:"Inverter power module overheated. Check heatsink fan, airflow, and ambient temp.",details:{meaning:"The inverter power module (IPM) has overheated beyond its safe operating temperature. The IPM contains the power transistors that drive the compressor. Overheating can destroy these components.",causes:[{rank:1,text:"Heatsink fan not running or running slow"},{rank:2,text:"Heatsink fins clogged with dust"},{rank:3,text:"High ambient temperature exceeding unit rating"},{rank:4,text:"Compressor drawing excessive current — overloading IPM"}],checks:["Verify heatsink cooling fan is running","Clean heatsink fins — remove dust buildup","Check ambient temperature — is it within rated range?","Check compressor current draw — compare to spec"],branches:[{condition:"Heatsink fan not running",target:"Replace heatsink fan or check its power supply on PCB"},{condition:"Heatsink dirty",target:"Clean thoroughly — error should clear after cooldown"},{condition:"High ambient + high load",target:"Improve ventilation around unit — consider shade structure"}]}},// ── Protection ──
{code:"E407",category:"Outdoor",desc:"High pressure protection shutdown",action:"HP switch or sensor tripped. Check refrigerant charge, condenser airflow, fan operation. Check for restrictions.",details:{meaning:"The high-pressure protection has shut down the compressor. System pressure exceeded the HP switch setpoint or HP sensor threshold. This is a critical safety protection.",causes:[{rank:1,text:"Condenser coil dirty — unable to reject heat"},{rank:2,text:"Condenser fan not running"},{rank:3,text:"System overcharged with refrigerant"},{rank:4,text:"Stop valve partially closed — liquid or gas side"},{rank:5,text:"Non-condensibles (air) in the system"}],checks:["Check condenser coil condition — clean if dirty","Verify all condenser fans are running at full speed","Check stop valves — both liquid and gas must be fully open","Connect gauges — check high-side pressure and subcooling","Check refrigerant charge level against nameplate + piping additions"],branches:[{condition:"Dirty condenser",target:"Clean coil and verify fan operation"},{condition:"Stop valve closed",target:"Open fully — this is the #1 cause on new installs"},{condition:"Overcharged",target:"Recover excess refrigerant to proper charge"},{condition:"All checks OK",target:"Check for non-condensibles — recover, evacuate, recharge"}]}},{code:"E410",category:"Outdoor",desc:"Low pressure protection / refrigerant leakage",action:"LP below threshold. Check for leaks, low charge, restricted liquid line, or frozen evaporator.",details:{meaning:"Low pressure has dropped below the protection threshold, indicating refrigerant loss, restriction, or evaporator airflow problem. The compressor is locked out to prevent damage.",causes:[{rank:1,text:"Refrigerant leak — low charge"},{rank:2,text:"Liquid line restriction — clogged filter drier, kinked pipe, or stuck EEV"},{rank:3,text:"Indoor unit evaporator frozen or airflow blocked"},{rank:4,text:"Gas stop valve partially closed"}],checks:["Connect gauges — check low-side pressure","Check refrigerant charge — low superheat/low subcooling indicates low charge","Feel along liquid line for temperature drops indicating restriction","Check indoor unit filters and evaporator for ice","Verify all stop valves are fully open"],branches:[{condition:"Low charge confirmed",target:"Leak test all joints and connections — repair, evacuate, recharge"},{condition:"Restriction found",target:"Replace filter drier or clear restriction — check EEV operation"},{condition:"Evaporator frozen",target:"Defrost evaporator — find root cause (low charge, dirty filter, fan failure)"}]}},{code:"E416",category:"Outdoor",desc:"Discharge temperature protection shutdown",action:"Compressor discharge temp exceeded limit. Check charge, EEV operation, and discharge sensor.",details:{meaning:"Compressor discharge temperature exceeded the safe limit (typically >120°C). High discharge temp indicates the compressor is running hot, often from low charge, poor suction cooling, or excessive compression ratio.",causes:[{rank:1,text:"Low refrigerant charge — insufficient suction gas cooling"},{rank:2,text:"EEV not opening properly — starving evaporator"},{rank:3,text:"Discharge temperature sensor detached from pipe"},{rank:4,text:"High compression ratio — very high head pressure or very low suction"}],checks:["Check refrigerant charge — low charge is the most common cause","Verify EEV operation — check coil resistance and opening","Confirm discharge temp sensor is firmly attached to pipe","Check both high and low side pressures"],branches:[{condition:"Low charge",target:"Leak test, repair, evacuate, and recharge"},{condition:"EEV stuck",target:"Check EEV coil and wiring — replace EEV if faulty"},{condition:"Sensor detached",target:"Reattach sensor — this causes false high readings"}]}},{code:"E425",category:"Outdoor",desc:"Phase reversal / failure — 3-phase wiring error",action:"Input power phase sequence wrong or missing phase. Swap any two phases at disconnect. Check all 3 phases present.",details:{meaning:"The outdoor unit detected incorrect phase sequence (phase reversal) or a missing phase on the 3-phase power supply. The unit will not start with reversed phases as it would run the compressor backward.",causes:[{rank:1,text:"Two phases swapped at the disconnect or breaker"},{rank:2,text:"One phase lost — blown fuse, tripped breaker, or loose connection"},{rank:3,text:"Phase detection circuit on PCB failed"}],checks:["Measure voltage between all three phase pairs — L1-L2, L2-L3, L1-L3","Verify all three phases are present and balanced","Check fuses and breaker for all three phases","Check power wiring connections at disconnect and unit terminals"],branches:[{condition:"Phase reversed",target:"Swap any two of the three phases at the disconnect switch"},{condition:"Phase missing",target:"Restore lost phase — check fuses, breakers, contactors"},{condition:"All phases present and correct",target:"Check phase detection circuit on PCB — may need PCB replacement"}]}},{code:"E428",category:"Outdoor",desc:"Abnormal compression ratio",action:"Compression ratio out of acceptable range. Check refrigerant charge and system restrictions.",details:{meaning:"The ratio between discharge pressure and suction pressure is outside the acceptable range. An abnormal compression ratio stresses the compressor and indicates a system imbalance.",causes:[{rank:1,text:"Low refrigerant charge — suction pressure drops while head stays high"},{rank:2,text:"Restriction in liquid line causing low suction"},{rank:3,text:"Condenser issue causing high head pressure"}],checks:["Connect gauges — check both high and low side pressures","Calculate compression ratio — discharge absolute / suction absolute","Check refrigerant charge and subcooling"],branches:[{condition:"Low suction pressure",target:"Check for low charge or restriction — see E410 diagnostics"},{condition:"High head pressure",target:"Check condenser — see E407 diagnostics"}]}},{code:"E438",category:"Outdoor",desc:"EVI (economizer) EEV leakage",action:"Economizer expansion valve leaking internally. Check EEV and intercooler for internal leakage.",details:{meaning:"The economizer (EVI) electronic expansion valve is leaking refrigerant internally when it should be closed. This allows uncontrolled refrigerant flow through the subcooler circuit.",causes:[{rank:1,text:"EEV valve seat worn or damaged — not sealing when closed"},{rank:2,text:"Debris in EEV preventing full closure"}],checks:["Check EVI circuit temperatures — outlet should not be cold when EEV is commanded closed","Check EEV coil resistance — should be within spec","Monitor economizer superheat during operation"],branches:[{condition:"EEV leaking through when closed",target:"Replace economizer EEV assembly"},{condition:"EEV coil issue",target:"Replace EEV coil — if valve still leaks, replace entire EEV"}]}},{code:"E439",category:"Outdoor",desc:"Refrigerant leakage detected",action:"System detected significant refrigerant loss. Perform leak test on all joints. Check charge.",details:{meaning:"The system has detected significant refrigerant loss through pressure and temperature analysis. This is an active leak detection feature that monitors operating parameters for signs of charge loss.",causes:[{rank:1,text:"Refrigerant leak at brazed joints, flare connections, or Schrader valves"},{rank:2,text:"Leak at indoor unit heat exchanger or EEV"},{rank:3,text:"Leak at service valve packing or caps"}],checks:["Perform electronic leak test on all joints, flares, and connections","Check Schrader valve caps and service valve packing","Check indoor unit connections and heat exchangers","Verify charge level with gauges — compare subcooling/superheat to spec"],branches:[{condition:"Leak found",target:"Repair leak, pressure test, evacuate, and recharge to spec"},{condition:"No leak found but charge low",target:"Perform nitrogen pressure test — check for slow leaks"}]}},{code:"E440",category:"Outdoor",desc:"Heating mode restricted — outdoor temp >30°C",action:"Outdoor temp too high for heating operation. Normal protection. Will resume when conditions allow.",details:{meaning:"Heating mode operation is restricted because the outdoor ambient temperature exceeds 30°C. This is a normal operating protection — the unit cannot efficiently provide heating when outdoor temps are very high.",causes:[{rank:1,text:"Outdoor temperature genuinely above 30°C — normal protection"},{rank:2,text:"Outdoor ambient sensor reading incorrectly high"}],checks:["Verify actual outdoor temperature with separate thermometer","Check if outdoor ambient sensor (E221) is reading correctly"],branches:[{condition:"Outdoor temp actually above 30°C",target:"Normal protection — heating will resume when outdoor temp drops"},{condition:"Sensor reading wrong",target:"Check outdoor ambient thermistor — see E221"}]}},{code:"E441",category:"Outdoor",desc:"Cooling mode restricted — outdoor temp <-10°C",action:"Outdoor temp too low for standard cooling. Normal low-ambient protection.",details:{meaning:"Cooling mode operation is restricted because the outdoor ambient temperature is below -10°C. This is a normal low-ambient protection to prevent compressor damage and liquid slugging.",causes:[{rank:1,text:"Outdoor temperature genuinely below -10°C — normal protection"},{rank:2,text:"Outdoor ambient sensor reading incorrectly low"}],checks:["Verify actual outdoor temperature with separate thermometer","Check if outdoor ambient sensor (E221) is reading correctly"],branches:[{condition:"Outdoor temp actually below -10°C",target:"Normal protection — cooling will resume when temp rises. Install low-ambient kit if cooling is required at low temps"},{condition:"Sensor reading wrong",target:"Check outdoor ambient thermistor — see E221"}]}},{code:"E452",category:"Outdoor",desc:"ZPC detection circuit or power failure",action:"Zero-point crossing detection failure. Check power supply quality and PCB.",details:{meaning:"The zero-point crossing (ZPC) detection circuit has failed. This circuit monitors the AC power waveform for synchronization and power quality. A failure indicates a power supply issue or PCB fault.",causes:[{rank:1,text:"Poor power quality — voltage distortion, noise, or instability"},{rank:2,text:"ZPC detection circuit on PCB failed"},{rank:3,text:"Power supply interruption or brown-out"}],checks:["Check incoming power quality — voltage should be stable and within spec","Look for sources of electrical noise nearby (VFDs, welders, generators)","Check power supply connections at the unit"],branches:[{condition:"Power quality issue found",target:"Install power conditioner or isolate unit from noise source"},{condition:"Power OK",target:"Replace outdoor main PCB — ZPC circuit has failed"}]}},// ── EEPROM / Config ──
{code:"E503",category:"Outdoor",desc:"Service valve closure check alert",action:"Service valve may be closed. Verify liquid and gas service valves are fully open.",details:{meaning:"The unit has detected that a service valve may be closed. During startup self-check, pressure and temperature readings indicate restricted flow consistent with a closed valve.",causes:[{rank:1,text:"Liquid service valve not opened after installation or service"},{rank:2,text:"Gas service valve not opened"},{rank:3,text:"False detection due to sensor error"}],checks:["Check both liquid and gas service valves — verify fully open (back-seated)","Connect gauges to verify pressures are equalized"],branches:[{condition:"Valve found closed",target:"Open valve fully — restart unit"},{condition:"Both valves already open",target:"Check pressure sensors — may be false alarm. Clear error and monitor"}]}},{code:"E504",category:"Outdoor",desc:"Compressor operation self-diagnosis error",action:"Compressor failed self-test. Check compressor windings and power connections.",details:{meaning:"The compressor failed its self-diagnostic test during startup. The unit runs a brief test of the compressor and inverter before normal operation, and detected an abnormality.",causes:[{rank:1,text:"Compressor winding issue — high resistance or imbalance"},{rank:2,text:"Inverter board output problem"},{rank:3,text:"Poor power supply quality during self-test"}],checks:["Check compressor winding resistance — all three phase pairs should be balanced","Megger test compressor to ground","Check power supply voltage stability"],branches:[{condition:"Windings abnormal",target:"Replace compressor"},{condition:"Windings OK",target:"Check inverter board — replace if self-test keeps failing"}]}},{code:"E505",category:"Outdoor",desc:"High pressure sensor self-diagnosis error",action:"HP sensor failed self-test. Check sensor wiring and calibration.",details:{meaning:"The high-pressure sensor failed its self-diagnostic check. During startup, the PCB tests the HP transducer and found it reading outside expected parameters.",causes:[{rank:1,text:"HP pressure transducer failed or drifted out of calibration"},{rank:2,text:"Transducer wiring issue"},{rank:3,text:"PCB input circuit fault"}],checks:["Connect gauges — compare actual pressure to sensor reading","Check HP transducer connector on PCB","Check transducer wiring for damage"],branches:[{condition:"Sensor reading does not match gauges",target:"Replace HP pressure transducer"},{condition:"Reading matches but self-test fails",target:"Check PCB — may need replacement"}]}},{code:"E506",category:"Outdoor",desc:"Low pressure sensor self-diagnosis error",action:"LP sensor failed self-test. Check sensor wiring and calibration.",details:{meaning:"The low-pressure sensor failed its self-diagnostic check. During startup, the PCB tests the LP transducer and found it reading outside expected parameters.",causes:[{rank:1,text:"LP pressure transducer failed or drifted out of calibration"},{rank:2,text:"Transducer wiring issue"},{rank:3,text:"PCB input circuit fault"}],checks:["Connect gauges — compare actual pressure to sensor reading","Check LP transducer connector on PCB","Check transducer wiring for damage"],branches:[{condition:"Sensor reading does not match gauges",target:"Replace LP pressure transducer"},{condition:"Reading matches but self-test fails",target:"Check PCB — may need replacement"}]}},{code:"E554",category:"Outdoor",desc:"Complete refrigerant leakage from outdoor unit",action:"System has lost all refrigerant. Major leak. Locate and repair leak, evacuate, and recharge.",details:{meaning:"The system has lost all or nearly all refrigerant. Pressure readings indicate the system is essentially at atmospheric pressure. This is a major leak requiring immediate attention.",causes:[{rank:1,text:"Major refrigerant leak — large joint failure, pipe break, or heat exchanger rupture"},{rank:2,text:"Service valves left closed and system pumped down unintentionally"},{rank:3,text:"Slow leak that accumulated over time"}],checks:["Connect gauges — verify system is at or near atmospheric pressure","Perform visual inspection for obvious leak points (oil stains)","Pressure test with nitrogen to locate leak"],branches:[{condition:"Major leak found",target:"Repair leak, pressure test, evacuate to 500 microns, recharge to full spec"},{condition:"Service valves closed",target:"Open valves — but investigate why system was pumped down"}]}},{code:"E560",category:"System",desc:"Outdoor unit option switch setting error",action:"DIP switch or option setting incorrect on outdoor PCB. Verify settings per installation manual.",details:{meaning:"One or more DIP switches or option settings on the outdoor unit PCB are set incorrectly for the installed system configuration.",causes:[{rank:1,text:"DIP switches not set per installation manual for this model/configuration"},{rank:2,text:"Option switch changed accidentally during service"},{rank:3,text:"Wrong outdoor unit model paired with current system"}],checks:["Reference installation manual for correct DIP switch settings","Compare current switch positions against required settings for this system","Verify outdoor unit model matches system design"],branches:[{condition:"If switches are incorrect",target:"→ Set DIP switches per installation manual and power cycle"},{condition:"If settings correct but error persists",target:"→ Replace outdoor main PCB"}]}},{code:"E563",category:"System",desc:"Old firmware indoor unit in module installation",action:"Indoor unit MICOM firmware too old for module config. Update firmware to v161222 or later.",details:{meaning:"An indoor unit's MICOM firmware is too old to support the current module configuration. Firmware must be v161222 or newer.",causes:[{rank:1,text:"Indoor unit has factory firmware that predates module support"},{rank:2,text:"Replacement indoor unit PCB shipped with older firmware"}],checks:["Check indoor unit firmware version via field {code:"E702",category:"Indoor",desc:"EEV closing error (1st detection)",action:"EEV closing issue detected on first check. May self-correct. If E152 follows, replace EEV.",details:{meaning:"The electronic expansion valve failed to close on the first detection attempt. This is an early warning — the system will retry. If the valve still fails to close, it will escalate to E152 (confirmed fault). The EEV may have a temporary obstruction or intermittent coil issue.",causes:[{rank:1,text:"Temporary debris or contaminant partially blocking the EEV valve seat"},{rank:2,text:"Intermittent EEV coil connector issue"},{rank:3,text:"EEV beginning to fail mechanically"}],checks:["Monitor for escalation to E152 — if E702 clears on its own, the issue may be intermittent","Check EEV coil connector for secure fit","Measure EEV coil resistance (typically 30-60Ω)"],branches:[{condition:"If E702 clears on retry",target:"Monitor unit — may indicate early signs of contamination or valve wear"},{condition:"If E152 follows",target:"Confirmed EEV failure — replace EEV assembly"}]}},{code:"E703",category:"Indoor",desc:"EEV opening error (1st detection)",action:"EEV opening issue detected on first check. May self-correct. If E151 follows, replace EEV.",details:{meaning:"The electronic expansion valve failed to open on the first detection attempt. This is an early warning — the system will retry. If the valve still fails to open, it will escalate to E151 (confirmed fault). The EEV may be temporarily stuck or have an intermittent wiring issue.",causes:[{rank:1,text:"EEV temporarily stuck closed — debris or corrosion"},{rank:2,text:"Intermittent EEV coil connector issue"},{rank:3,text:"EEV stepping motor beginning to fail"}],checks:["Monitor for escalation to E151 — if E703 clears on its own, the issue may be intermittent","Check EEV coil connector for secure fit","Measure EEV coil resistance (typically 30-60Ω)"],branches:[{condition:"If E703 clears on retry",target:"Monitor unit — may indicate early valve wear or contamination"},{condition:"If E151 follows",target:"Confirmed EEV failure — replace EEV assembly"}]}},// ── Hydro Kit (EHS) ──
{code:"E901",category:"Hydro Kit",desc:"EHS water inlet sensor error",action:"Water inlet thermistor disconnected or shorted. Check connection on hydro kit PCB.",details:{meaning:"The Eco Hot System (EHS) water inlet temperature sensor is reading out of range. This sensor monitors return water temperature entering the hydro kit heat exchanger.",causes:[{rank:1,text:"Sensor connector loose or disconnected on hydro kit PCB"},{rank:2,text:"Thermistor element failed — open or shorted"},{rank:3,text:"Wiring damaged between sensor and PCB"}],checks:["Check water inlet sensor connector on hydro kit PCB","Measure thermistor resistance — should be ~10kΩ at 25°C (77°F)","Inspect wiring for damage or pinched insulation"],branches:[{condition:"Open or short circuit",target:"Replace water inlet temperature sensor"},{condition:"Connector loose",target:"Reseat connector and verify reading returns to normal"}]}},{code:"E902",category:"Hydro Kit",desc:"EHS water outlet sensor error",action:"Water outlet thermistor disconnected or shorted. Check connection on hydro kit PCB.",details:{meaning:"The EHS water outlet temperature sensor is reading out of range. This sensor monitors leaving water temperature — critical for capacity control, high-limit protection, and Legionella prevention cycles.",causes:[{rank:1,text:"Sensor connector loose or disconnected on hydro kit PCB"},{rank:2,text:"Thermistor element failed — open or shorted"},{rank:3,text:"Wiring damaged between sensor and PCB"}],checks:["Check water outlet sensor connector on hydro kit PCB","Measure thermistor resistance — should be ~10kΩ at 25°C (77°F)","Verify sensor is properly mounted on outlet pipe with good thermal contact"],branches:[{condition:"Open or short circuit",target:"Replace water outlet temperature sensor"},{condition:"Connector loose",target:"Reseat connector and verify reading returns to normal"}]}},{code:"E904",category:"Hydro Kit",desc:"EHS water tank sensor error",action:"Storage tank thermistor fault. Check sensor and wiring.",details:{meaning:"The EHS domestic hot water storage tank temperature sensor is reading out of range. This sensor monitors tank water temperature for setpoint control and Legionella prevention heating cycles.",causes:[{rank:1,text:"Tank sensor connector disconnected from hydro kit PCB"},{rank:2,text:"Tank sensor element failed — common due to constant hot water exposure"},{rank:3,text:"Sensor pocket corroded or sensor not properly inserted in tank well"}],checks:["Check tank sensor connector on hydro kit PCB","Measure thermistor resistance — should be ~10kΩ at 25°C (77°F)","Verify sensor is fully inserted into tank thermowell/pocket","Check for corrosion at sensor pocket"],branches:[{condition:"Sensor reads open/short",target:"Replace tank temperature sensor"},{condition:"Sensor not fully inserted",target:"Reinsert sensor into thermowell — ensure good thermal contact"}]}},{code:"E907",category:"Hydro Kit",desc:"EHS freezing protection error",action:"Water temp approaching freezing. Check glycol concentration and water flow rate.",details:{meaning:"The EHS has detected water temperature approaching freezing — freeze protection has activated. If water freezes inside the plate heat exchanger, it will crack and require replacement. This is a critical protection fault.",causes:[{rank:1,text:"Glycol concentration too low or no glycol in the primary circuit"},{rank:2,text:"Water pump failure — no circulation during cold weather"},{rank:3,text:"Power outage during freezing conditions — system couldn't run freeze protection"},{rank:4,text:"Outdoor unit installed in extremely exposed location"}],checks:["CRITICAL: Check glycol concentration with refractometer — must be adequate for local climate","Verify water pump is running — check for power at pump","Check water circuit for air locks preventing circulation","Verify system has power and can run freeze protection automatically"],branches:[{condition:"Low or no glycol",target:"Drain and refill primary circuit with correct glycol concentration for local climate"},{condition:"Pump not running",target:"Repair or replace circulation pump — freeze protection requires water flow"},{condition:"System was powered off",target:"NEVER power off hydro kit in winter — freeze protection requires power"}]}},{code:"E911",category:"Hydro Kit",desc:"EHS flow switch error",action:"Water flow switch not closing. Check water flow rate, pump, and flow switch wiring.",details:{meaning:"The EHS water flow switch has not closed — insufficient water flow detected through the heat exchanger. System will not operate without confirmed water flow to prevent freeze damage or overheating.",causes:[{rank:1,text:"Circulation pump not running or failed"},{rank:2,text:"Air lock in water circuit — system not properly purged"},{rank:3,text:"Flow switch stuck open or failed"},{rank:4,text:"Strainer/filter clogged — restricting water flow"},{rank:5,text:"Isolation valves closed"}],checks:["Verify circulation pump is running — check voltage at pump terminals","Check system water pressure — top up if low","Purge air from the water circuit at all high points","Clean strainer/filter if fitted","Verify all isolation valves are fully open"],branches:[{condition:"Pump not running",target:"Check pump power supply, capacitor, and wiring — replace pump if motor is failed"},{condition:"Pump runs but no flow",target:"Purge air locks, check for blockages, open valves"},{condition:"Flow confirmed but switch won't close",target:"Replace flow switch"}]}},{code:"E913",category:"Hydro Kit",desc:"EHS flow switch error (non-reoperatable)",action:"Persistent flow switch failure. Requires manual restart after fixing flow issue.",details:{meaning:"Persistent EHS flow switch failure that requires manual intervention. The system has detected repeated flow switch trips and has locked out. Unlike E911, this code will NOT auto-reset — you must fix the root cause and manually restart the system.",causes:[{rank:1,text:"Underlying E911 const samsungCommissioningSteps=[{step:"Pre-Check",title:"Pre-Commissioning Checklist",icon:"📋",items:["Verify all indoor and outdoor units match design documents","Confirm refrigerant piping is pressure tested (600 psi nitrogen, 24hr hold) and leak-free","Triple evacuate to 500 microns — break with dry nitrogen between pulls","Verify all MCU (Multi Connection Unit) boxes are installed and wired","All communication wiring connected: F1/F2 comm bus between all units","Condensate drain piping connected, trapped where required, and tested","All ductwork connected and air filters installed","Line voltage verified at all disconnects — 208-230V or 460V per nameplate","Allow 8+ hours of crankcase heater operation before first startup"]},{step:"Step 1",title:"MCU Address & DIP Switch Setup",icon:"🔧",items:["Set MCU rotary switches — each MCU must have a unique address (01-16)","Set MCU port DIP switches ON for each connected indoor unit port","Verify OFF for unused MCU ports (E216 if port ON but no unit)","Set master outdoor unit address as 00 (factory default)","Set slave outdoor units to sequential addresses (01, 02, etc.)","Verify branch selector box (C-Box) DIP switch settings if heat recovery","Double-check: no duplicate addresses anywhere in the system"]},{step:"Step 2",title:"Auto Pipe Pairing",icon:"📡",items:["Power on ALL outdoor, indoor, and MCU units — wait 5 minutes","On master outdoor unit, press K2 button on main PBA 13 times","7-segment display will indicate pipe pairing has started","Operation takes 25-55 minutes depending on indoor unit count (max 2 hours)","Each indoor unit will cycle through refrigerant to map piping connections","When complete, verify all indoor units are paired — check SNET Pro if available","If E213 displays: pairing failed or incomplete — re-run after checking piping","Pro tip: Hold K2 for 2 seconds or more to save settings after pairing"]},{step:"Step 3",title:"System Configuration",icon:"⚙️",items:["Use SNET Pro 2 service tool or wi lure",action:"Check for power supply issues. Inspect PCB for burnt components. Replace indoor PCB.",details:{meaning:"Communication IC on indoor PCB has failed. Hardware fault requiring PCB replacement.",causes:[{rank:1,text:"Power surge damaged IC"},{rank:2,text:"IC failed from age"},{rank:3,text:"Moisture damage"}],checks:["Inspect PCB for burnt components or corrosion","Power cycle","If persists, replace PCB"],branches:[{condition:"IC failed",target:"Replace indoor PCB"}]}},{code:"F31",category:"Outdoor",desc:"Outdoor PCB EEPROM error — stored data corrupted",action:"Power cycle outdoor unit completely (all phases off 30 sec). If persists, replace outdoor main PCB. Record model/serial.",details:{meaning:"Outdoor PCB EEPROM data corrupted. Full power cycle (all phases off 30 sec) may reset.",causes:[{rank:1,text:"Power surge corrupted EEPROM"},{rank:2,text:"EEPROM degraded"}],checks:["Power cycle completely — all phases off 30+ seconds","Record model/serial before replacement"],branches:[{condition:"Clears after power cycle",target:"Monitor — install surge protector"},{condition:"Persists",target:"Replace outdoor main PCB"}]}},// ── Compressor / Current Errors (H-Series) ──

ation"],branches:[{condition:"Major leak",target:"Find and repair leak, evacuate, recharge"},{condition:"Restriction",target:"Locate and clear restriction"}]}},{code:"H07",category:"Outdoor",desc:"Compressor motor abnormality — position detection failure",action:"Check compressor power wiring U/V/W connections. Verify inverter board output. Check for open winding.",details:{meaning:"The inverter can't detect the compressor motor rotor position — it can't synchronize with the motor for proper drive.",causes:[{rank:1,text:"U/V/W power wiring loose at compressor terminals"},{rank:2,text:"Open winding in compressor motor"},{rank:3,text:"Inverter board position detection circuit failure"}],checks:["Check U/V/W connections at compressor terminals — tighten","Measure winding resistance — balanced?","Check inverter board"],branches:[{condition:"Loose terminal",target:"Tighten and clean"},{condition:"Open winding",target:"Replace compressor"}]}},{code:"H08",category:"Outdoor",desc:"Compressor overcurrent at CT sensor — sustained high amps",action:"Check CT current transformer on compressor lead. Verify compressor current vs nameplate. Check for mechanical load issue.",details:{meaning:"The CT (current transformer) sensor is detecting sustained high current from the compressor — above normal operating limits.",causes:[{rank:1,text:"Compressor mechanically overloaded"},{rank:2,text:"Compressor winding degradation"},{rank:3,text:"CT sensor fault — false reading"}],checks:["Measure compressor current with clamp meter — compare to nameplate","Check CT sensor on compressor lead","Verify operating pressures are normal"],branches:[{condition:"Current genuinely high",target:"Check pressures, compressor health"},{condition:"CT sensor reads wrong",target:"Replace CT sensor"}]}},{code:"H14",category:"Outdoor",desc:"Suction gas superheat abnormality — too low or too high",action:"Check EEV operation and opening. Verify refrigerant charge. Check suction temp sensor accuracy. May indicate
